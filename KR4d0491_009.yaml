body:
  text: 石田文集卷九元馬祖常撰序送劉文可之官汝州序曩余在潁汝間識泰山劉君文可時文可尉新蔡縣甞騎駵駒戴武冠手大鳴鏑腰長刀驍勇勁悍闔縣狗䑕不敢竊發余方疑文可直一武士爾於文吏事盖廓如也又七八年余策試京師每與搢紳學士論才噐人即先以泰山劉君為稱首無一人或短之余又疑斯人者特鄉里姓字之同者也非余向之汝潁間所識者也以是乏造請之禮焉一日闖門而謂余舎人曰前新蔡尉劉君来余起走階戺下進諸賔位拜既歴敘往時余先大夫官淮南行事暨尊俎歌詩風流講射御田原教種樹農桑諸論著文字數真如詘五指而信之也余於是尤賢之重諗之曰昔君尉縣河外不過如幽并豪侯等而今也蜚聲稱文儒雖學術之力而何功之亟也劉君曰不然丈夫子一蹴而當女子百躍我視之尚為不力何亟也且我前年尉一縣今貳一郡子知其道乎令甲嵗造楮幣若干置工官秩視外縣令丞上凡工官嵗造楮幣患不給至大中天官氏以我是司我倍其嵗之入而不勦民以自衒属考官最乃吏我為二千石亞今將之官子其序以表我遂序之曰昔也武而今也文昔也縣而今也郡河南成周之墟周南汝墳之化不泯我聖天子文教隆盛似周成王要必刑措而後制禮作樂君官河南日當喋喋問文獻衣冠家掇拾周之逸書以須上之徵則余也又將操觚牘以俟送牛國寳罷政光學北歸序余嘗覿乎山之木有所發蒙焉隠於中曾未啟也頃之友人國寳牛君告余曰我將去潁州願子有言以贈余應之曰趙夫子唱古學於君之邦君之行殆欲大肆其所學而充其志耶敢以山木之說辱行李夫大山之産羣木也其當嶧負麓廣坂長谷風日所煦清淑所㑹是木也必挺聳條暢繁蔚充盛入雲刺天百仞千尺本可柱一作棟宇末可几豆其或窮崖絶壑隂寒是集槄栲雜植叢淮一作蘿互樛是木也必盤錯擁腫離竒符婁一作俯僂不克茂達不中規矩寧元氣滋液之不均即將厚地孕育之不類耶抑亦所樹立有利否也何同是木而材不材如是哉今君之潁川當漢魏時為名郡天下髙節之士率十五六出潁川彬彬如鄒魯間其流風餘韻尚未艾也今趙夫子豈其人耶君所謂風日所煦清淑所㑹者也將見上徵明堂之材於潁水之上矣余方離竒符婁一作俯僂以待爨事送崔少中序談者謂近世治賦之臣率多弄刀筆畫籌䇿日夜屑屑析毫毛利害飛文舞書陽與隂掇一有豪傑魁偉之士學古之人以仁義為說者則羣笑目譏指號狂惑斥去恐後太師長史燕國崔君以今年春提舉山東鐵冶將行天山馬祖常曰子好仁義說久矣持仁義說往山東冶賦是舞干羽而戰也是擊鍾磬而田也或曰不然夫操戈以入人之室雖三尺童子亦將召徒而拒之使之端委執綏揖讓下車而問館焉則盜跖有所不敢辭道之於天下如是哉道之於天下如是哉遂系以詩曰衣之華兮雖絅而章道之華兮雖闇而光有美一人兮佩玉鏘鏘捨我而他其何可忘國語類記序結繩不施書契有作科斗鳥獸之迹籕篆𨽻兮及今之書雜然並傳觀乎黄帝帝嚳而下迨晉楚列國其間貨錢刀布鼎彛敦簠誌記銘刻文字形畫之殊極六書制作之變曾不少相襲而其聲音文義相生相成百世一道我國家造蒙古書因天地自然之數以成一代之書求合乎先王之意而不柅於人宜乃列之學官置博士弟子員教授不廢是以近世之士鼔篋而游學宫者嘗比於孔氏之徒焉太僕經歴持廣平張大卿所著國語類記若干卷来請曰是書實古轉注之義為多切講此有年矣大卿乃能綴緝本末成一家言凡國語之引物連類假借旁通者班班具焉子盍為我序之祖常曩讀曲臺所記及漢急就章諸篇等知世之古今文字論列辨博纎悉畢載何則其資寡者其中窳其籍厚者其内充則大卿之為是書後世稽古者尚有考焉送人南歸序下邳翟君志道解易𤣥既成書進之闕下天子喜其勤詔丞相府特與提舉儒學官凡儒服者咸推為榮仍悔其已由雜道進而崇君之進以正也率恧於君而因求君之學不已遂謂𤣥義出老子孔子徒所不道揚雄遭漢厄運訑訑諸儒間著太𤣥深諉於易其名義悉與易不類宋周邵程朱四家論道理傳天下後世者往往常以二書不並稱今翟君挈四聖一賢之要歸而比之其有以越乎人矣以余為識翟君請問之余謝不能乃自為書遺之曰夫士之博於文久矣彼百氏肆曼衍雄深荒忽鬼怪之辭髙說天人下援俚諺鈎貫旁出漁獵小道蔚乎其相稽也曄乎其相徵也駸駸乎其外襮而中窽也訾訾乎其出侈而入嗇也為士者靡不掇拾其精華而芟剔其蔓稉也辟則津焉民有趨父難病川之不可徒涉也而曰必求杠梁而不乗桴則可乎否耶其利害炳炳明矣且復諗翟君曰君將再一作往東南游東南有勝國故都去今世尚邇其遺老猶在中必有如箕子者且為我訊之洪範之與易易之與揚雄太𤣥果何如也遂抗手而别游經歴字序游氏為河南望族河南祖常父母邦也宜知游氏為甚悉始辨章公起家以清徳素業教諸子皆恭儉守家法傳數十年不殄而愈熾以及其孫僎僎年弱冠即筮仕為監修國史㕘軍宣政院經歴僎曰子知吾家世吾且有請先是翰林姚公名余曰僎矣而字則未有也願有以字我祖常曰惟古之道冠而字於阼階禮之意以責成人也今子官於朝有年矣庸藉乎字為也雖然子有命所不敢辭請字曰嘉賔夫僎主人之二一作貳也古之人相見而禮飲也主有僎而賔有介焉僎能修主人之辭以致乎賔賔以授介介亦有以復焉於是乎宣禮節合文章觀辭命整容體油油然大順生人道成矣嗚呼其義顧不深哉是則曰嘉賔如之何不可尚思有以實之李氏夀桂堂詩序燕趙古稱多彈絲趾躧慷慨悲歌之士風聲氣俗表裡并代田獵騎射以為生常報死感激以為壯偉居秦之世趙及韓魏東方諸國糜爛蹈藉人㡬於無而燕獨存其筋角棗栗之富督元之饒傳數十世而不衰豈亦召公始封之國邑人人愛之而不肯去譬如甘棠而勿翦勿伐者也我國家都全燕之地以恒碣為城以瀚海為隍生聚教養十百於古萬方之珍怪貨寳璆琳琅玕珊瑚珠璣翡翠玳瑁象犀之品江南吴越之髹漆刻鏤荆楚之金錫齊魯之柔纊纎縞崑崙波斯之童奴冀之名馬皆焜煌可喜馳人心神則得為民而居其地者天下㡬何人哉得為民而又居其地且又不為彼物俱化者盖真鮮矣或曰王畿之民匪華車服美室屋則不足以樂承平而崇理治矣矧有恱親心而婉順其好者乎詎可亟病某奢而深詬之也析津李氏正卿有母年八十矣以絍繡為工不廢有弟四人悉相孝友正卿甫昆季葺屋都邑之中以奉其母氏翰林待制趙君穆為書某某一作其室之名曰夀桂嗚呼若斯人者亦庶㡬能恱親者也亦庶㡬不為物化者也雖然非得載諸太史氏文字之末詩賦之間則其亦孰信之哉送李公敏之官序天子有意乎禮樂之事則人皆慕義向化矣延祐初詔舉進士三百人㑹試春官五十人或朔方于闐大食康居諸土之士咸囊書槖筆聨裳造庭而待問於有司於時可謂盛矣然其進之道雖則曰應詔對策皆不過文藝細碎矯誣情實求合乎有司而蘄得一官於天子也未聞其不為利禄而不干世用特立而獨行違今而趨古孟軻所謂雖無文王猶興者也余在河南即聞于闐人李君公敏能尊孔子之教而變其俗其學日肆以衍浸漬乎六經汪濊乎百家蔚然而為儒者流離困苦益自刻厲教授於青齊之間賴公卿大夫知其賢名薦牘交上用是乃起家而入官焉且公敏始有志乎古道也豈必欲公卿大夫之知哉公卿大夫之知而不可必也又豈為利禄世資舎其所有而要其所無者哉如此則孟軻謂雖無文王猶興者吾公敏是已余今盖知愧焉於其行故為序以别王夫人貞節序集賢待制兵部郎中喀喇庫庫之外祖姑王氏故贈上䕶軍瑯琊郡公之女故御史中丞薊國文正公女弟陜西行省郎中劉天瑞之夫人也夫人十四嵗嫁劉天瑞又十六年而夫死又二十六年所在有司上其事於丞相府旌其門焉嗚呼甚矣禮之可以善俗也古者婦人夫死已稱曰未亡人則是欲従而死也今王夫人始為顯官女與婦也則夙夜敬事修飾工容及其夫之沒也則疏布被體號泣若將終身嗚呼婦人之行盡如王夫人則俗豈有不善者乎然善俗之道視其上之禮如何耳上之禮既已敷錫道揚表異褒美書在官府名在州里凡所以為善俗之道者亦云至矣而搢紳學士讀古詩周禮先王善俗之意相属而為之詩以宣昭天子人倫之化且使民有所歌詠而觀感焉是亦搢紳學士之懿徳也為義固不偉歟送髙富卿學正歸滑州序諈諉以為辭骩骳以為學利於時而躓於道賤已而貴物夫豈謂儒者之要哉寡黙以為亷齪齪以為恭兹又豈謂儒者之要哉前年魏郡髙君富卿被省檄主光州學州人之子弟従而嚮道者數十人方駢進不已且將有来游来歌之士而髙君受代去學官故服孔氏之言者咸重不忍其舎吾黨而他適也咸重賢其操儒者之要而無彼二者之失也作為文章書諸幕帟以張於祖道之右祖常竊聞而私慕焉於其行贈以言曰君不躓於道不賤乎已使其在孔子之世則有顔淵閔子者為之依歸而取正焉斯能入善人之域矣不寡黙以為亷不齪齪以為恭使其在孟軻之世則亷必不如仲子之亷恭必不如栁下惠之不恭矣若然則髙君可不謂之儒者乎送聶道元詩序少之時隨親提攜往来宦游江淮之交纉古績文視世之進取不屑也及官浮光祖常年已二十矣旦夕侍出入吏来白事嘗従廰事後竊聴吏多以名呼私甚薄之獨聶君道元先子每特稱其字焉私又疑之請曰聶君特筐篋曹属獨字之何先子顧祖常而教之曰兒来前立吾誨汝盖聶君異他吏當休沐下直跡他吏皆縦酒呌號市中道元服澣衣而講律義於家不出也斯可敬矣汝無忘吾言後其名日大彰灼淮西山南部使者並檄聘之貢地官掾轉登臺郎奮迅騰拔出賛淮東憲府而祖常承大宗伯之職于朝道元喜且命曰先大夫知我我之行子豈無言乎搢紳之士咸已賦詩為贈矣子宜為序若夫壯詩人之情性惜執手之别離則詩序之製也因情性之所由以達乎人之親慨别離之相慕推今日以至于當時則兹序之所起也敢以是為道元送别詩序風憲宏綱序世祖肇建官制興起文物属命御史臺昭布體統振肅綱維正儀崇化靡不緝綏迨及列聖繼明屢揚寳訓亦靡不顯示常憲儆爾百官欽惟皇上日月中天燭見幽隠紹述祖宗成法申命臺端嚴兹糾劾不俾瘝官貽憂惸獨于是臺臣協恭奉職上體淵衷下宣風紀謂古象魏有法道路有徇今國家肅清憲綱汲引言路其見諸訓辭者光大深厚粲然有章宜編綴成書載在簡冊垂告内外俾當察視司持平者有所徵焉既奏上制曰可嗚呼盛哉凡我耳目之官尚知佩服之母怠卧雪齋文集序夫人之有文猶世之有樂焉樂之有髙下節奏清濁音聲及和平舒緩焦殺促短之不同因以卜其世之休咎象其徳之小大人之於文亦然然不能强為也賦天地中和之氣而又充之以聖賢之學大順至仁浹洽而化然後英華之著見於外者無乖戾邪僻忿懥淫哇之辭此皆理之自然者也非惟人之於文也雖物亦然華之大艷者必不實噐之過實者必不良必也稱乎求乎稱也則舎詩書六藝之文吾不敢它求焉袁君徳平之文可謂美矣優柔而不華典則而不質可以施之宗廟告之朝廷而今已死無及也其子杲游於國學以余嘗従其兄伯長甫官史館而伯長甫又好余甚者也請重序其父之文焉噫徳平之文世雖無知者抑何傷乎子杲兹行又槖而歸於越山之下一日太史占候言南方有光氣上達於天者其必徳平之文在其下也夫周剛善文集序六經之文尚矣先秦古文雖淳駁龎雜時戾於聖人然亦渾噩弗雕無後世誕詭骩骳不經之辭司馬遷耕牧河山之陽得中州布帛菽粟之常者而為史其言雄深唐韓愈挈其精㣲而振發於不羈嘻文亦豈易言哉栁宗元駕其說忿懥恚怨失於和平淮西雅謌晉問諸篇馳騁出入古今天人之間蔚乎一代之製而學士大夫皆宗師之宋以文名世歐王曾三氏降而下天下將分裂道不得全業文之士咸澆漓浮薄不足以經世而載道焉皇元隆平宣布文化姚燧元明善褎然在廷以文致位光顯而於今傳之周剛善彚其文數十篇俾予觀之質實而不窳藻麗而不華彈其思以志於文而未已者也兹將官南方故書以為文序而畧告之楊𤣥翁文臺序讀楊𤣥翁文臺再過得其辭之意義氣之音節盖隠君子之言也延祐初予售於有司是時以古文名者清河元公復初假予以言曰子之修辭㡬於古矣然於質實則過之於藻麗則乏矣予起應之曰祖常初無志於斯世功名之業聞古有所謂立言之士粗願學焉而弗舎之也今國家以文取四方士其進也不雜是以致此幸先生教之然稱以質實則祖常有未敢能兹十年餘矣藴而未發也力小勢在下信者寡而傳者或疑之間與東平曹子貞甫王繼學甫中山王儀伯甫蜀郡虞伯生甫相下許可用甫宣城貢仲章甫講求其說而猶以質實為難而不得一變斯文為歎也而今也𤣥翁之文隠君子之言也蔚然而充鏘然而和而怦然而有激也質實之域㡬其造矣乎乏於藻麗者不飾之耳君試以諗同志者何如也梁氏夀慶堂詩序監察御史梁克中請於馬祖常曰吾世家宛丘國家平宋吾父君用甫以應募戰有功進領闕户軍居閒嘗教克中昆季曰吾年幼氣實時􅟸於􅟸於疑誤弓刃出廣海瘴地與盜賊羣結艦連屐轉鬭相薄毒霧之塞也如盖帷猿狖交啼之悲如號一作鬼魅諸少年皆樂搆難俘殺為快計而吾獨被甲執盾以赴敵未嘗妄戮一人亦未嘗以所欲貴富者載諸心以殘人之子女貨賄辛勤来歸吾弟又奄先人之業以自殖而吾亦未嘗介於懐以求已私也若曹生泰平盛世慎自問學事親孝謹人人言天之報予善人恒有餘慶或者其有然乎克中佩父訓學未成而仕由御史大夫掾得官承務為江東亷訪司經歴進南臺御史遷西臺御史入為監察御史累階五品請於朝封吾父曰奉訓大夫禮部郎中飛騎尉宛丘縣男母閻氏宛丘縣君今夀皆八十丹頥素頷虞一作危坐堂上不穀之子三人孫男六人曾孫男女又六人侍膝旁怡愉甘㫖殆知喜而忘懼也元統元年冬十一月殿中侍御史呼喇台等以聞天子初一作賜尚尊酒偕所封制即賤臣之家以寵異之夫名與禄豈必賢者待之為榮哉雖不賢者亦待以為榮也韓詩曰曽子仕為吏以樂得養親雖禄不過鍾釜猶忻忻喜也曽子可謂不賢乎以彼其賢猶曰喜及禄養不賢者能勿喜乎克中又將求薦紳先生作為文章以繩天子之賜而助吾喜為母夀也干一言序吾意何如予曰子孝矣夫子孝矣夫天之報于子固有不得而知者惟明天子所以望于子者豈不曰孝子之於親也愛之以心敬之以義事之以道仁人之於民也必體父母以子之故器子為御史成子為孝人者政有望於子也子異時為名宰士為良公卿為民之賢父母一是心而已明天子之望子者如此子姑持予言為子父母夀其必亦喜無量惟賢者而後知此意也子謂何如克中曰然即書而為之序送雅勒呼㕘書之官静江詩序奎章閣㕘書雅勒呼字正卿取髙科登朝廷以文學才諝遇知於天子出貳郡治以宣上徳而修百姓之務亦可謂榮矣然而有為不懌者謂正卿宜在館閣華要與諏訪獻納發謀議佐政事而自効於静江荒逺僻隅山側洑海之地孰失之歟余為之言曰中州大夫士吏南越者往往不樂其土其仕皆有苟且而無憂勤之心以故其政事解㢮莫致其治教之意而蠻民與猺合盜廣西數郡罹其暴害天子宰相以静江重鎮守臣未易稱任又知正卿嘗家衡鄂壁於其壤識其山川巇坎之勢市里田土風謠習尚話言之變害利詭冒憸良之形制其傾搖蹂躙而導其善心必有素計也他日正卿以親老乞髙郵便養而天子宰相特有是命焉夫以嘗仕於朝出入禁籞為文學之臣而治其所居已安所有事之宜否皆已習熟之士專思一慮以勞其職以宣布上徳而無苟且以憂勤百姓之務余知其必能成在官之政為後来可守之法矣此正卿所當自致其治教之意而天子宰相之所以命正卿者也又孰失之歟然余聞往時廣西憲臣帥守嘗併力以勝盜勝則削骸戮孥矯䖍毒民使荆湘衡鄂兵以萬數卒殱焉正卿其特將除是而已耶抑用之為小異也豈亦制而導之亡素計猶不免為是也天子宰相任之之意其然耶孔子曰天下有道盜其先變乎亦嘗思於其言否耶繇鄂泝湘過衡抵静江吏者多中州大夫士正卿為余諗其賢者曰受命為吏大者專方鎮小者一郡一州起居靡有所失飲食不侈以妄雖越南與中州不大異也豈當以不樂而置官以不事利進襮耶倘曰余之言可豈得蠻猺之為盜哉噫亦其民之幸也已於是不懌者與館閣僚友及京師聲明之士各忻然為文章以美其行而勸其無久於外以致其去處之情而請余為之序正卿固喜任事者故次第其言以送之送簡管勾序中書以簡君實理管勾曲阜廟學將行請吾為送别詩序諾之二年弗即與之也及来京師告闕里孔子廟荒圮不治又請吾曰今而為之矣始簡君布衣褎然游公卿間公卿皆禮之雖小丈夫有所挾持不禮人者簡君亦能使之忘其挾持而禮之其交於人非有鉤連濡沬之巧也非有排難解紛之俠也平易以坦夷和樂而静專年彌久而情益真也時益躓而義愈篤也如斯而已矣彚類而觀之古之君子入道之域者爾由於是矣簡君讓曰不敢有是願先生終序之夫闕里廟不治公卿大夫士之事也子無憂其不治也彼佛老之人室廬觀闕丹雘塗飾圗所以事其師者欿焉若不終日公卿大夫士咸以文名而官榮庸有不治其師之廟而自豐其屋者哉子當求如奚斯者作詩以俟之送吳養元管勾還家省親序番昜吴生養元年弱冠循循務進理自將無世俗子弟華美之習吾嘗愛之今年中書署為曲阜先聖林廟管勾捧檄而喜告予祖常曰小人有親方夀而康寧今兹被檄非敢以尺寸之進為喜喜得升斗之禄逮親榮養也祖常聞之遽然色變而歎曰昔吾起草野戰藝於京師得一官則皆失怙恃矣後月給俸入及間拜錫賚嵗時市鮮新物品饋食堂上則追恨罔及自罪不孝以為不得奉一歡於膝下雖叨冒光寵適増愧赧而獲戾於清議迄今觀大夫士之家有侍其親之在官者憧憧於心也嚮者吾年未老大時聞生若言尚易今也吾年老大矣聞生若言得重無判於心乎子歸矣持吾言以諗其親則生之親將恱生之孝而喜吾之言可以為歡也同朝君子有能賦者請以此為序石田文集卷九
