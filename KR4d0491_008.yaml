body:
  text: 石田文集卷八元馬祖常撰銘致樂堂銘有母鞠我聿丱而弁于何申之翼翼其燕其燕其寧籩豆載馨于何將之承其氣聲嗟嗟婦子闕克相肖匪惟母宫汜布禰廟惟夫人受祉惟孝子錫類惟天可忱遲斯百厥世梁彦中家塋中致慤亭銘肅肅祖禰於昭厥靈曰既降止于牆于羮不顯孝思鑑我蠲饎昌爾孫子賔興于世書櫝銘農善銚鎛匠利斧斤其器既精其績惟勤以食以居可必於懵士不農匠崇文著書濟濟閒燕明世所須秘册於櫝經史百家内沐其澤外芬其華漆梓勒銘以告弟子我承庭訓敢不礪爾惟天精明不嗇于人惟物淫昏乃迷厥貞匪聖匪賢曷先我覺匪訓匪辭我孰従學曰我祖考奕葉顯揚革我世俗維文是將迨兹百年士而不民我辭諄諄庶大爾身書几銘木也材漆也堅工之良其成器也完吾克有之利於燕閒之觀居室銘苟居室也敬則疇之可訂苟學古也專則疇之不傳有幽者神有窮一作穹者天將寵綏之爾益勉旃止善堂銘維昔邃古厥民顓䝉弗跂于福弗鄰于凶鳥居獸食其行充充繄文字肇啟相我民止明靈宣昭曰人曰已以破其昏以迪其内衷以燭于盲以震于聾洽于大同止善之功遵誨堂銘其誨諄諄其遵訢訢以績以勤以資以殷王仁輔左丞徳符堂銘耕之澤澤穫之秷秷植之芸芸木之蕡蕡是謂徳符維善之趨有以考室矢銘以質之辴然亭銘維兹世人時化物還雜沓紛至攻于吾前吾乃應之而一辴然其辴者何不吴不敖不震不譁順受維嘉豈嘻笑之缺者耶李氏種徳堂銘錢鎛具農服田財貨集商懋遷維士進徳徳維賢種之于世世有年農商外求我乃天臯陶之道子勉旃龔友輔纉古齋銘古有道載諸辭我纉之徵於斯維友輔篤古學予為銘聴母藐允懐齋銘疇沃沃天是資稼以穫力之施道豈逺惟兹思佩我銘世乃師箴舟箴伐木于山既斧既鑚于綴以穎金于屋以編菅杵堊縷枲研桐之脂塗于木間以禦外波不觚而刳不趾而趨南國利之以載以居不車不廬越紀彌章矢溺溷濁汙海若之宫馮夷垂顛軒輕上下萬縆千纒不施其功卒不思改圗由是言之水豈不仁哉酒箴瓶曰何䲭夷脂韋敢侮予為清冽以實我纆徽以縆我手我肩我燥熇須我不我世須世將焚如彼殄天物而糜民食莫而之急世迷厥明不而之辟日甘其喙而毒其膓俾其尰瘍俾其呌狂古宗廟之事錫嘏受祉以洽神人罔淫之以詎出入兩宫經營公家以脂以韋不予之塗泥而蹈其近利而安其後譏何䲭夷之智為賛恭賛御書奎章閣記至順二年十一月七日上遣内侍至臣祖常門賜臣祖常御書奎章閣記碑本一幅者臣祖常冗瑣下品才識淺薄叨被光榮待罪風紀夙夜恐懼無涓埃補報於聰明之萬一不得斥逐則為大幸顧乃曲加天寵猥賜宸翰煥乎日月之光華郁乎雲漢之昭回羲畫八卦禹敘九疇雖有義有文亦不是過也何則羲有義而無文禹有文而無義必待周文箕子者出然後文義大備垂之無窮今皇帝陛下即位之明年開奎章閣布政四方大臣公卿以次進對少間則覽古文圗書綜覈古今求其治亂之原以施於天下以戒於羣成迺製奎章閣記俾工官鑱諸樂石兹皆萬萬世無疆之慮也猗歟盛哉臣祖常受賜不勝感戴聖徳北向百拜齋沐謹為四言詩以賛於後云皇帝明聖受天之命撫御四海民物遂性物性既遂太和雍熙雨暘咸宜于于施施清燕暇逸不遊不田刻文垂訓萬世是傳賤臣荷寵天光臨門寳藏私家以遺子孫臣拜稽首維聖作憲羲畫禹疇法天行健有義有文於昭日星豈惟修辭大同於經嗟臣螻蟻待罪風紀瘝官追罰幸不訶鄙乃重受錫天徳何報麋軀銜忠罔極覆燾吴宗師畫賛有毣毣之思而弗施有肅肅之容而自儀冠裳孔都登降拜移載以徳輿豐其道樞俾同我尚世之儒相實民之望豈囿於象者耶賛雙兔兔爰爰相伏蹲囿田塗宅丘原嗒彼罝儲頴功夀斯文圗爾形賛吳牛予觀牛之顛趾飲囓同於羔羊其為功也不類逺矣今目擊此卷不覺興嗟雜文丁君誄至順元年六月二十三日山北道亷訪丁君文苑卒嗚呼文苑學足以利人而不得大施而又夀不享年兹縉紳大夫所為痛也乃作誄曰有樹其柏孰培而斧有良其器孰陶而窳昔也聨裳荷天之光靡行匪短靡言匪章試官民庸摶其頑兇以煦其疲癃持斧冠豸而蛇虺弗嘬何辜于天而不遐年誰謂為之終其罔全服食之就耶藥石之不耶惟臧受祉果何修也飛羽天湄君柩之旗崇璞山碕君墓之碑酹莫余奠誌莫余辭爰封兹誄敢識余悲仁本堂解粤古先民孕善于中而契乎天倥侗不鑿質良而全潔然以名而不之貴靡然以利而弗之嗜憧憧往来不求不忮聖哲彌綸弼以仁義鰥虞在下瞽頑弗慈乃以孝烝之庳君弗弟而友道日至孝弟辨矣仁義治矣魯東家素王有子其徒揭示仁本範世立謨彼婦姑勃磎誶語帚箕而獨何居煦濡以愛飲食弗敬是又孝耶生先乎吾宗法是系敢不悌耶儒服者云行仁之本孝弟實始將由兹以達夫博施故又曰堯舜之道孝弟而已矣翕和雍熙陶陶怡怡比屋可封而刑措不用者顧不由世咸孝悌而仁哉我解仁本以斯義準吴氏之子尚佩惟允記河外事有計吏河外来稱河外斗菽三十千弱民持錢告糴大家大家亦無有菽日益貴民日益病而有司賦之日益亟也余方食投箸記其說且曰菽之比粟也奚急而病若是是履賤踊貴也有司賦之亟其謂何請子悉之吏曰子儒服者所謂治天下之事子盖懵懵也故事國馬食嵗徵諸内地而不給則漕河間鹽錯置郡邑算民之口而廩食之估當其直而以藁秸入之官又不給則差河北郡縣凡民數㡬可秣馬㡬俾馬就食於外今中山河間趙地百姓無糠籺救旦夕命人挈男女之里中不得易斗米其均賦於河外有以也子泥於古而昧於今而不知通變之道子不仕則已子而仕將見瘝官之罰集子之躬矣余言盡不可信耶夏乾禱雨文惟神靈馭雲氣呼吸雷雨變化罔測出入八極今本鄉神之祠宇在焉是神之所依歸也而祖常等耕鑿給食事神弗謹神其降咎以病吾人歟且沛澤不時稻苗將槁嵗或不登則何以供王賦而為神之粢盛乎神其鑒此也策㑹試策問聖王之設官也俾在位之臣咸稱厥職以亮天工者其法不越乎選舉而已皇元稽古立制用賢使能敘進差等成法具在夫事久將弊亦可變通者乎入官者日滋月積循名責實有不勝其煩然選舉乖方則瘝官病民曷術得以無二者之失乎命風紀擇可為守令者善矣然必求於資歴相當足以盡撫字之才乎漢世公卿二千石皆得辟舉可施於今乎課績良法也今以五事備責守令往往虚文考功可復乎州郡牧守限於品秩缺員者衆唐以来權行守誠激厲奬借之道獨不宜於今乎諸君子褎然舉首各悉其說擬廷試進士策問二首文武之道有國家者不可偏廢也文藝對策取學問之士我朝已行之矣獨武舉未講非所以備文武之道也方今四海億兆之衆藴畜才能者豈無其人乎夫武職子弟襲受世賞衣食為事游媚富貴使之將萬人率千夫其余一作於功勛之裔則至厚矣國家何賴焉兹將議立武舉以求草澤弓馬膂力之夫謀畧技能之士以應武選其策何先乎必功勛世臣之裔草澤有能之人兼用並置仍不戾於時宜何者為便益之道乎子大夫學通今古之制褎然来廷其悉以對朕將親覽焉朕纂承大業祇遹先猷畏天愛人罔敢不敬故屢詔有司各揚迺職使恩澤下流而吾民得以遂生而樂業斯朕之志也而聞有司瘝官者不一或貪墨不法以抵冒條禁或優游不事以苟年勞或保禄自營或矯情取譽亷恥之風㡬於不興且有官之士在民之上所以師表百姓而百姓賴以安者也而乃自治不嚴如是何以居人之上哉又古者刑不上大夫而官序有常庶績咸熈而今也風紀之司糾劾論治偷墮因循之俗日盛未見其振起者何歟豈公家審官之術未得其要歟抑毁譽交養不覈實歟將求激厲亷恥之道而期官士自治王澤下流而百姓安其策何自子大夫明古今之義其於事宜之體講之詳矣悉心以對母隠題跋書翟太素彈琴詩序後古堂上樂皆亡獨琴在今之琴雖盡非古意然猶愈於亡也省菴周先生謂余言汴士翟太素雅善鼔琴羣髦方聲其工被謌詩間子盍賦之予悼道不傳纉綴事方殷不能為韻語俾太素絃之省菴周先生其無庸病哉跋夫子擊磬圗天地日月不容繪畫而松雪翁寓意於翰墨之中吾固知其笑荷蕢之非真知聖者也恭題御書雪月二字上日御奎章閣聴天下之政盖所謂未明求衣日旰忘食者也恭已南面不邇聲色清燕之頃留神翰墨於昭回雲漢之章尤見天縦之聖也兹雪月二字詔賜中奉大夫侍御史臣嘉木巴事天子官侍御史持平綱紀憲法是賴非有清明之徳配彼雪月者則天子不以此官官之矣聖人在上量包天地么麽小臣智識狹陋曷足以窺之意者或萬一歟臣祖常又得陪侍御史下列乃属臣為賛遂告之以是俾其子孫寳承之以世其家焉記御史臺題名後天厯初有制命御史臺具石題名聖言渾灝有訓有戒天聴洞達照知物情而文字簡易盖堯舜都俞之㫖也天地之大日月之明何徳以象之臣趙世延既承詔為文至順三年某月日臺臣等謹敷宣徳意列載如上維時長貳曹属之次乃列於下後之来者尚徵於始而繼之也且人之善惡咸在是亦懲勸之義而不可廢也嗚呼慎之哉題松廰事藁畧後昔祖常承乏察院初官未熟時事往往篤信古道動輒得咎言秦州山移之變則得奉祠大社論特公丞相廢法擅權則謫官開平嬰虎口之毒擯斥五年幸遭逢天日清明更化張絃凡是同惡姦狀顯露善類彚進衆賢登朝而祖常忝備召用待罪詞垣暇日偶繙閱書簏見有章疏舊稿數十紙因繕寫成一編祖常詎敢賣直要譽庶亦存愛君憂時之萬一云耳名之曰松廰事稿畧者明其與同官論列者皆不記也至治三年端陽日浚儀馬祖常識題簡母墓銘金石之文銘壙尤難宋王安石最善銘下疑有脫誤可知其難也此簡氏銘郭貫所撰貫以篆名文亦簡不煩序人子之孝天之至性難哉跋姚照磨攷墓銘後御史臺属姚紱持其先世墓銘求予跋文予讀再過乃識于後始予考京邑鄉貢第二塲課包茅賦一篇紱實冠數百人又以才諝佐予禮部今又掾臺府祖常適官侍御史而紱陞充臺掌故則於其家世之傳文字之列宜知也且彭澤活人之衆如此紱之碩大顯達寧有既邪跋誠求堂詩得龍之嗜龍可以豢知馬之畏馬可以舞彼含氣之不靈而我得其情實用乎誠况靈於彼者可不以兹求邪記固始縣重建縣治記皇帝踐祚詔内外大小臣母曠厥官縣大夫同稽首曰予一二小臣才學不力罔有聞知奉天子明命辱守兹土夙夜寅畏如齋如疾恐不能上宣王風下成民功以遺邦之羞顧兹公署既庳且陋不克以居何以館王人何以聴臣事予一二人母循故常母爽等殺不刻不畫再營再搆寧不偉歟越明年改元落成凡為屋大小若干間為工始末若干日秋八月縣大夫走吏于光請記厥績將勒諸珉以耀後之人祖常曰作器必銘作事必記于以考古于以垂訓俾繼我者従事有稽也今賢大夫承流宣化之餘力不謀其私不肥其孥闢兹新堂照臨百里可無辭也哉惟固始為縣或國于周或侯于漢暨三國晉隋唐名制𨽻属山川職貢有圗經在皆不書記其邇於世者昔趙氏失徳江淮之交風燐宵明戍鬼晝悲乃若斯邑南窮山北盡淮陸可騎水可航田畝之甿躪磔者無慮十八九虎豹之所宫狐狸之所號故老遺人談之者尚蹙額而可可疑衍掩袂也迨我朝天昌景運奄有二國建制縣邑立官立師撫摩瘡痏寵綏俘遺不四十年陳蔡曹㲾吴楚甌越之民雜耕于野交居于郛于今稱沃壤然其人失鄉遂教習夷獠之俗動以利害相磨戞以舌吻相撼搖持短長日叢于官重不幸饒茗漆竹箭材木之利秔秫之精鑿鳥獸之毛革所以塞聦障明者靡不悉焉居官之位者難矣哉某年某月日某官等偕治是邑邑人宜之不敷不譁如子安父居無何奔走羣執事作兹役翬翬之堂翼翼之廡賔客有位庖厨有次豐而不奢華而不忒譬天造地設人未告勞又何變難為易如斯也非大夫之賢疇克爾哉盖嘗讀春秋魯莊公二十三年秋書丹桓宫楹明年春書刻桓宫桷禮曰諸侯黝堊又曰諸侯之桷斵之礱之于春秋于禮立教者三致意焉何則重禮制之或爽也今邑人宜大夫大夫有人民有社稷文有吏武有兵諧其神人罔有圯傾尚何以二魯諈諉為哉小石山記岳鎮之列居四方其間出雲氣神物變化靈異以之順成年榖滋益品類者大矣至於巒壑之美岩穴之秀木榮泉清珍禽竒獸之所託依往来仙真髙人之所棲宿是皆有以寓游觀樂放逸在君子之所不可廢者也淮以南諸山石礦而不瑩予得小如盎者一鑿噐實水植之其中亦磊落峻拔含蓄雄偉可喜也彼雖不能如岳鎮之大出雲氣光景神物變化要受封祭然世或欲楗淇竹以塞河決鍊五色以補天漏則予斯石也其能無尺寸之功歟留侯廟記國家著令凡先民之有功有徳於世者所在得祀焉彭城之留城有廟曰留侯之廟壊而不治神將無依其守趙君克明節制日之稍入勸民合力㑹財以集工徒盖茨完好垣墉旁周階庭室屋有翼有承丹漆黝堊弗麗於淫經用量制咸稱厥宜神棲孔良象設惟肅吉蠲従事牲醴碩鮮鄉之人祝禱即孚嵗無疵癘嘉生繁興民庶翕恱遂来求文刻石廟中圗以侈大神惠茂封邑於無極也嗚呼古者作事有記為教之意深矣大矣彼有務勦民以事鬼儌福以媚神者搢紳文儒之士固不欲書於册而告於衆矣兹能以禮祠其鄉之賢士大夫講俎豆之容者則是敬君之命而納民於道也則是非文法奔走之吏所能識也又可不載諸言辭以傳於世列其懿行美蹟宣著顯揚俾人有所徵而為善焉可乎否耶矧若侯之功徳卓偉郡國固宜通祀之乆矣余典禮之官也故為志以表之小圃記余環堵中治方一畛地横縦為小畦者二十一塍崑崙奴頗善汲晝日縆水十餘石井新浚土厚泉美灌注四通陽春土脈亦墳起古所謂滋液㵕漉何生不育者信矣哉雜蘆菔蔓菁葱薤諸種布分其間柵以稭薪限狗馬越入蹂躪圃在前時為故主馬廏土有糞合水之膏澤併漬之後菜熟芼羮以侑廩米之饋餉吾於世資盖寡取也如是足日計矣學子汪琯曰鑄鐵作齒綴於横木使土平細尤宜菜余謂不然土之力完則殖繁若力盡則亦不殖矣因為小圃記上都翰林分院記天子嵗省方留都丞相侍省中率百官咸以事従或分曹釐務辨位考工或陪扈出入起居供張設具或執櫜鞬備宿衛或視符璽金帛尚衣諸御物惟謹其為小心寅畏趨走奉命罔敢少怠而必至給沐更上之日迺得一休也惟詞臣獨無它為従容載筆給軺傳道路續食持書數囊吏空牘旬日不一署文書夙夜雖欲求細勞㣲勤以自効而亦無有然後知上之人不欲役其心使之精研於思慮而專以文字為職業非如衆有司務以集事為賢者也至治三年汶陽曹公子貞分直學士院實應従行祖常攝官待制聮属以階上日懼謭薄無以稱其官幸遭逢國家治康内外清謐臣鄰亷恥不煩訓誨蠻夷懐柔不待約束所以敷宣播告之辭猶慎且簡間為民為嵗而祠其詞之祝亦不誣神而夸故其意質而文又寡是以益積其藴蓄而不得肆發而為歌詩以形容國家太平之功乃更相與樂其秩之美而喜其被光寵於明世也吾徒之服是選者良亦榮矣夫良亦貴矣夫可不研精於思慮以俟上之召必蹈渾噩之實而列陳之則庶乎不戾於躬也不戾於躬則於古也近矣志諸壁因以存故實云聖清廟記大元建國全燕以御華夏永平為甸服股肱之郡至元十有八年世祖皇帝甫平江南五嵗矣即裹干戈放馬牛而不用大召名儒修禮樂之事敕有司咸秩無文于是永平郡臣以其邦為孤竹舊壤伯夷叔齊兄弟讓國之所逃者也列文以請大臣以聞上曰其命代言為書命以褒之諡曰清惠仁惠于今又五十年矣郡臣前後凡不計㡬人漫不兹省某年某官等乃狀上尚書曰郡境廟象清惠仁惠之神嵗無牲牢祭品不備領祠無官尚書秩宗伯禮有儀謹以告其曰㑹太常議制白丞相府符下永平曰夷齊求仁得仁廟食固宜嵗春秋蠲吉具儀有司行事符且署矣乃重白丞相府以孟軻稱伯夷聖之清者也孤竹其宗國也今既象設而廟食之宜以聖清名廟丞相府僉曰允哉嗚呼大道之鬱也則民烏得而知古豈獨民烏得而知古焉士盖有一二世不知其傳者大道之彰也則民不識金革戰鬭之暴内則有父子夫婦相與飾於禮節外則有官師之教朋友之交相與講於古豈獨知已之所傳又知當時之名世者而傳之是則永平之人遭逢國家之隆而沐浴大道之彰也吾將見行者讓途耕者讓畔學士相讓於俎豆工商相貸以噐貨而價不貳矣推本我世祖皇帝教化之意顧不由此歟邦之人尚礪其志而施於行哉母徒神之而已也願學齋記古之民生有世教迨成人而四民之業定矣於是有士者出而上得之以備公卿大夫之位其所施設於治政之具則推其身之所修而已後世庠序爼豆禮樂詩書先王之道一切不行民之生於時者率蔽於耳目見聞之習駛然各騖於資之所近情之所便而安之家殊人異而民志始苟矣上之人又無以一之嗟乎四民之業不分囂雜竒衺踰制不教之俗交拏其前士之有特立不遷於彼者真豪傑也哉盧龍王敬従義甫士而起家積官為禮部郎中矣迺表其讀書之室曰願學且曰古有云非曰能之願學焉非敢謂乃所願則學孔子也属同官馬祖常記之祖常讀職方乗按盧龍稱塞下地國家建國全燕盧龍畿甸之服聲名文物之所被王澤之所先非古盧龍矣矧舜州之壤孤竹之墟朝鮮之封其民固已熈洽於聖賢之域矣漢唐之君其徳不能逺故稱之為塞以塗墁其疆理之隘爾三光五岳醫無閭北鎮又東千里天地絪緼磅礴龎厚博大之氣鍾於其間區區以丈尺地量人物者小夫之智也今従義甫有士之行而有位於朝當世教化方興特立於聖賢之鄉而為天子之郎官有名於朝矣而朝之時曰書夕之時曰書猶名室曰願學鄉之人日迪従義甫之誨不遷於囂雜竒衺踰制不教之俗而皆願學焉將不煩乎官師之政而人悉為士矣若然則願學之功豈王氏所得私哉禮部合化堂題名記凡職事官悉有司也惟六官𨽻丞相府分領庶務頒降文書春官典禮古秩宗之職或謂之南省或謂之儀曹其視五官非獨有司之事焉天子祠郊廟則賛相中書論制度則與議朝覲㑹同之班簿聲名文物之品節咨辨位之名數稽載籍之推本莫不於是詳定焉褒崇旌異勸善成俗報徳尚賢尊右儒學之義咸敦大而涵煦之優柔而裕養之生而不殺之道存焉與夫饔膳醴齊之薦于上餼牽牲牢之饋于下以仁睦親以徳體物分吏以上四方之職貢專官以比四方之賔興嘉榖靈獸獻禎奏祥皆附以達彬彬乎華要之地而大夫士之髙選矣天厯已已皇帝御極之明年飭百官修職禮部奉命惟謹乃相告戒不敢怠於事登公堂而更相命曰傳所謂禮樂合天地之化者豈不謂兹類耶請用合化為禮部公堂之名記堂之始末遂署官員之名聨属之次於左方云令甲尚書三員侍郎二員員外二員主事二員令史十九人通事一人國字譯史二人西域譯史二人知印二人奏差十二人官並載其姓氏序遷之由令史以下因制以具名俾後之人有徵焉察院題名記審官之法既壊仕者雜出而天下始不治矣或因縁時貴以取進或多貲以交結變易詭詐佞媚側辟一朝居位而臨民民烏能償其積貪乎世祖皇帝至元五年立御史臺設監察御史振肅庶官糾劾貪邪以繩吏牘以除民瘼當是時宋尚未納土餽饟供給羽書四馳中原數十百州日以飛輓為事自漢唐之主觀之當以軍府為急而我世祖皇帝憂民方深不俾瘝官毒我黎庶則雖堯舜之明四目達四聰者豈過是哉列聖相承成法具在天厯皇帝登極顧御史大夫特穆爾布哈若曰内外非臺察則官以墨敗者無由而知貪何以懼姦何以發乎汝可於臺院殿院察院刻石以題名焉嗚呼天厯皇帝丕承世祖之謨烈詔臺臣三院題名者臣祖常才雖謭薄不識帝王之度要非夸以示人必勸之以善而懲之以不善也名既刻矣後来者有目為材御史者有否者則為御史者可不慎哉臣祖常於是而知天厯皇帝帝王之度也守院御史托克托王徳新請曰石既具矣請以爾言為察院題名記起自至元五年至至順三年監察御史姓名咸列于左云州判張君去思記在唐河東薛存義拜零陵令且行栁宗元贈以言曰凡吏於土者若知其職乎民之役非以役民而已也民之食於土者出其什一傭乎吏使司平於我也今受其直怠其事者天下皆然余每讀文至斯未嘗不掩卷太息也嗟乎三代而上長民者皆學士大夫知義禮有誠心愛民自能先之勞之而無倦隠然民之役也三代而下吏寡問學無惻隠之實罷軟者不勝任强幹者依勢作威公然役民而已矣惟元統至元間吾光州判官張將仕獨不然將仕質美性恬勇於行善先是淮兩田耎民荐阻饑無良者相扇就剽掠及是嵗稔猶狃前非所在竊發教柅化梗公私病之將仕以逐捕為已任盜不弭為牧民者責選良騎挽强弓挾勁箭率武夫即其巢穴逮之無遺由是惡少屏迹閭里以寧或訝判州不畏强禦能得盜必超擢將仕蹙然曰此吾職分内事耳何敢有功且不能令民不為盜致墮憲網今得其情徒切哀矜何敢有功其不伐如此暇日適泮宫遍觀黌宇見庖廩無次講堂不治司馬丞相祠圮毁謂士民曰廟以祀先聖先賢堂以厚有徳學校以育人材昔馬監州勸導州民闢草萊剪荆棘經營創始三十年于兹矣我後人乃不能繼其萬一殊可愧歎即日命匠鳩材完繕因司馬丞相之祠遂立三賢堂以楚孫叔敖齊相楊愔配食焉三賢者或生或封或隠於是將仕又以道礪其州人也已乃葺司夜之鼓已乃葺邏徼之司乃葺驛郵盖以儒道不崇人心不正縦擊鼓警姦何益於治姦知警矣然後嚴捕盜以警其未警者焉修驛郵以傳達文書焉四者所施有序以故州民徳之於其去也思之不置具狀跽余門丐文記實於珉余方闔門城西取篋中敗書冊㸃校存家學辭以未暇至于再三請益堅義不可辭乃曰張將仕由汴省宣使判吾光能使州民懐既去之思是可嘉也較諸受直怠事役民而已者邈乎其燕越矣後之来者考余文不誣尚踵之哉至元三年二月吉日資徳大夫前江南諸道行御史臺御史中丞馬祖常記殿中司題名記國朝官制御史臺立殿中侍御史雖三府大臣奏事殿中先相闗白大朝㑹則知百官序班於庭在臺則百官有故三日各令曹属報狀謂之曹狀云官獨簡貴平居無文書出則秉憲節為使一道故職是者必國人世臣之胄必由監察御史以次進它人不與也天厯皇帝在位顧臺臣若曰殿中侍御史題名無刻不宜爾可令自今以上至制官之始咸刻之於其署殿中侍御史索諾木博囉詣侍御史馬祖常言曰爾為侍御史時且以爾嘗學古文是記爾宜為之是為記攷之掌故殿中侍御史得凡若干人具載於後石田文集卷八
