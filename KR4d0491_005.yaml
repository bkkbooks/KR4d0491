body:
  text: 石田文集卷五元馬祖常撰樂府歌行元日應制萬年歡瑞氣祥雲擁龍光五色絳闕春迴析木天街秀潤日月重輝聖主垂衣坐治萬國盡衣冠朝㑹鵷行底濟濟鏘鏘喜瞻仙仗旌旗和風動洽九垓聽椒花獻頌白獸尊開采勝辛盤民物一時康泰樂府新裁曲譜鳯笙起彤庭雲靉青霄外隠隠嵩呼延祐與天同大南方賈客詞江岸琅玕悲帝婦雲光漏日波含霧瀧船春下鷓鴣林青幘蠻郎占龍户千尋髙杉生翠㣲北人去買椒葛衣鷄骨卜神銅鑄鼓却憶氷紈将北歸踏水車行松槽長長櫟木軸龍骨翻翻聲陸續老父踏車足生繭日中無飯倚車哭乾田犖确穉禾槁高天有雨不肯下富家操金射民田但喜市頭添米價人生莫作耕田夫好去公門為小胥日日得錢歌飲酒朝朝買絹與豪奴識字農夫年四十欲踏車脚脚失力宛轉長謡隴卧一作畝間誰能聽此無悽惻繅絲行繅車軋伊繭抽絲桑薪煮水急莫遲黄絲白絲光縰縰老蠶成蛹啖兒飢田家婦姑喜滿眉賣絲得錢買羃䍦翁叟慣事罵婦姑只今長男戍葭蘆秋寒無衣霜冽膚鳴機織素將何須翁叟喃喃罵未竟當門呌呼迎縣令騶奴横索馬鞭絲婦姑房中拆纑經拾麥女歌壠雉飛桑扈鳴老蠶入簇繭欲成原頭腰鎌者誰子刈麥歸家作餅餌心知棲畝有滯穗惻惻忍収寡婦利寡婦持筐衣藍縷終朝拾麥滿筐筥兒啼婦悲竈無火寒漿麥飯晡時取豈不見貴家妾豈不知娼家婦繡絲繫襦蓮曳步銀刀繪魚佐酒杯狎坐酣歌愁日暮拾麥女拾麥女爾莫嗟爾莫憂人生賦命各有由前年貴家妾籍入為官婢今日娼家婦年老為人棄貧賤艱難且莫辭畢竟榮華成底事古樂府天上雲片誰剪裁空中雨絲誰織來蒺藜秋沙田䑕肥貧家女婦寒無衣女婦無衣何足道征夫戍邊更枯槁朔雪埋山銕甲澁頭髮離離短如草河西歌效長吉體賀蘭山下河西地女郎十八梳高髻茜根染衣光如霞却召瞿曇作夫婿紫駞載錦凉州西換得黄金鑄馬蹄沙羊氷脂蜜脾白箇中飲酒聲澌澌垂綸亭歌為宋誠夫作江水東駛漢水清雙流合出蜀門陘春蛟鼓濤崩石棧風寒土窟隂鼉腥八月秋雨作沮洳長年操舟憂性命薊丘文篁君家有早晚梢雲得栖鳯何為垂綸楚傖傍豈其食魚必河魴截波宻綱小鱻爛寡婦之笱敝其梁嗚呼我歌君試聽彈鋏歸來讀古文日高鑚火飢煮字一釣六鰲何足云老将行送宗道總管南山日暮田間歸酒酣眼纈見大旗囊中兵書白魚蠧秃袖戰袍寄蘭錡老來數竒不封矦騎馬閒逐里中兒聞説西南有滇僰千里宿莽翳畬菑將須喜上充國策詔許将軍知尺籍明發北辭龍尾道馳入朱天紅帕額盡呼成卒脱兜鍪却使征夫携襏襫自古壮士多行役嗟哉兵農爾畊射淮南田歌十首東塘水初滿西塘泉又生春風兩塘側多少路人行老翁白髮短放牛田間卧記得南朝事怕臨淮水過西荘竹笋長生過東家墻東家吃竹笋日日笑西荘魚兒隨水上到我屋前溪更怨溪水小隨雨過南堤蒲生亦有筍菰生亦有米可憐芙蓉花照影秋塘裏鷺鶿白如雪鸕鷀觜復長雙立田塍間知是魚滿膓牛飽早耕田田中水湔湔春晚蘋草生牛刀更可憐借錢買鹽茶倩人蒔早秧日望秋田熟仍防野鴨傷江東木綿樹移向淮南去秋生紫萼花結綿煖如絮鉏田莫用懶夏日背上炎秋税入官倉雀䑕觜尖尖淮南魚歌十首棹船淮水上晒網赤岸南船中捕來魚賣錢買魚藍小艇如鳬鷖湘東柴杉木載家復捕魚夜夜繫江竹市中買蠶絲新結横江網江中魚已盡又結網十丈白雲渡深竹野水過斜橋鳴榔下淮浦笭箵帶朝朝船過蒹葭浦人家喚買魚囬船泊栁岸却問種樹書長年為魚郎税魚與鹽官誰云無鄉縣兵籍在邯鄲渡江問魚價人來索酒錢婦姑亦不惡便煮縮項鯿桃花水初漲磯頭好下罾取得金鯉魚去換縛船藤賣魚向城市陌上遇王孫爭買雙銀鯽持去贈紅裙烏鬼項細細吞魚不下咽海鷗觜亦短銜魚入野烟兩頭纎纎五首兩頭纎纎桫欏子半白半黒遼東豕腷腷剥剥琢玉几磊磊落落舞劒士兩頭纎纎小兒綳半白半黒目中睛腷腷剥剥海岳兒磊磊落落将軍營兩頭纎纎千畝梔半白半黒大纛旗腷腷剥剥觧角麋磊磊落落磨崖碑兩頭纎纎北斗杓半白半黒千金貂腷腷剥剥山中樵磊磊落落雲間鵰兩頭纎纎蝟上毛半白半黒筆中毫腷腷剥剥擊雲璈磊磊落落斬馬刀四色詠赤如扶桑日青如華岳松黒如古琴漆白如天女胷和王左司栁枝詞十首郎君巧謌楊栁枝栁眉初出學月支隋堤千樹烟光莫不如栁眉初出時春日烟雨秋日霜麯塵絲織衫袖長誰言折栁獨送客章臺還堪繫馬韁鳯城三月草色青池塘飛絮桐飄零風吹宛轉低撲人長空一作天白日流榆一作疎星都門輦路花萬株塞垣苦寒多白榆獨憐栁枝弱嫋嫋春情好寫閨中書馬蹄車輪送客去兩京遊客還未稀誰因一斗蒲萄酒便得梁州刺史歸槖駞馴象奴子騎女郎能舞大小垂蹛林獵罷各獻㨗卷唇蘆葉逐手吹楊枝桃葉江水逢喜云女蘿附高松白髮滿頭不相見却嫌吳音呼我儂渭城别謌凄復凄江都髙樓醉眼迷人生悲樂自古有莫笑棄妻當鏡啼北客到吳亦懊儂苧衫蘭槳膏飾容日食海錯一百品不敢上京來住冬鎗竿嶺頭紅白花客行日日不思家尚食聯疊給桂蠧仙佩屈曲紉蘭芽和王左司竹枝詞十首翠華宴鎬承恩多羽林似飛盡沙陀從臣乞賜官法酒千石銀甕來灤河綠繡簷頞翠流蘇屬櫜舍人金僕姑宫中雲門教坊奏歌徧竹枝并鷓鴣玉繩雙闕囬蒼龍御溝石甃金水舂螭坳詞臣紫槖在千年河清今日逢竹枝宛轉貫珠勻襪羅凌波那有塵書生好酒恨不醉丞相莫惜車馬茵日邊寳書開紫泥内臣珠帽輦步齊君王視朝天未旦銅龍漏轉鷄人啼金爐寳薰留篆雲花間百舌鳴早春五方戲馬賽爭道傳聲催賜十流銀紅藍染裙似榴花盤蔬飣餖芍藥芽大官湯羊厭肥膩玉甌初進江南茶天孫支機織流黄雜花浮簷宫晝長忽見琅玕種石上却憶羊車來尚方太㣲前陳中天居萬年樹影高扶疎漢家諸臣經術士殿中勸講三王書流杯池邊是鎬宫金輿翠幰逗㣲風媯川玉液清如水湛露承恩樂大同鰲峯歌太和絪緼元氣旁礴兩間駢羅品物錯上為列星精又為孤月魄天帝司大化月魄浮晴雲星精隕為山之骨龜穹獸蹲百状出剜鏤費力鬼工哭不角一作覺五岳形而注百川竇禹鼎魑魅禦周鼓時王狩西北龍沙域日浴灤波紅侍臣簮紱光射目周廬靜夜懸櫜弓乃有珥筆稱史氏絲綸出言待兹記神鰲施贔負首載三山至一寘軒轅臺一沉崑崙河一寘朔南金巒坡金巒坡風日清美芝箭多前嵓刻丹經後嵓琢商那當户圪圪古色碧紫苔蝸涎字痕濕春秋法書心匪石心匪石太史職北歌行君不見李陵臺白龍堆自古戰士不敢來黄雲千里鴈影暗北風裂旗馬首囬漢家衛霍今何用見説軍還如裹痛不思百口仰食恩豈念一身推轂送如今天子皇威逺大磧金山烽燧鮮却將此地建陪京灤山囬環抱山轉萬井喧闐車戞輪翠華嵗嵗脩時廵親王覲圭荆玉盡侍臣朝紱蠙珠新高昌勾麗子入學交趾蠻官貢麟角斗米三錢金如土國人謳歌將軍樂將軍樂四海清吾皇省方豈田獵觀風察俗知太平擬白頭吟君家四壁立妾家萬黄金憶初未相知良媒賴鳴琴遂以身許君偕老畢所願如何忍相忘恩情忽中斷昨朝雙鴛鴦今夕守空床茂陵展嬿婉還彈鳯求凰凉月凝玉露秋聲在庭樹歌我白頭吟相子長門賦紅淚濕芙蓉綠苔鬰䓤蘢羞看舊粧鏡不敢歸臨邛西施怨三首吳王水殿看芙蓉十二簾櫳罨畫重新重一作得西施顔似玉不教宫漏滴銅龍妾家本在苧羅山一入吳宫便不還自是夫差心未醒枉將亡國怨朱顔為妾輕身作館娃妾心刺血報夫差范生事主還無策教妾傾身亦可嗟車簇簇行李陵臺西車簇簇行人夜向灤河宿灤河美酒斗十千下馬飲者不計錢青旗遥遥出華表滿堂醉客俱年少侑杯小女歌竹枝衣上翠金光陸離細肋沙羊成體薦共訝高門食三縣白髮從官珥筆行毳袍衝雨桓州城次韻端午行羅襦垂垂扇奩歇守宫持紅不數蝎桐官馬酒銀流澌内饔餅啖酥凝雪欒水之陽漢陪京拂天翠華風日清繡絲鞋墻擅南陌玉環鏡鼻專東城射栁王孫五花馬醉來見客不肯下擷藍攬綠鬭草嬉靈運無須更誰詫香爐薫衣今幾人蘭階晝永簾光勻圍坐屏風罨畫劇杯中菖蒲笑囬春翰林故事莫盛於唐宋聊述舊擬宫詞十首禁鍾初動趣傳宣衣袖薫香到御前漸近宫門扶下馬内官分引導金蓮御筆圓封草相麻龍箋香透擁金花儀鸞勑設庭前候賜酒方終更賜茶制草塗鴉未敢删内璫宣引侍龍顔已分筆格金蟾滴更賜端溪紫硯山春帖分裁閣分多宫娥爭餽纈綃羅春絲菜餅銀盤送幡勝新題墨旋磨文思如泉涌墨林屏風院史不須尋舊時内相諸孫在猶有當年掃閤金入院聽宣席未温賜金已向按頭存清晨上馬還家去内出黄麻付閤門故事入院傳㫖畢賜黄金十兩始草制清馥香温酒玉脂祝文已撰報都知夜來奉旨傳丞相五朶雲濃押省咨天孫夜度玉潢清内托銀盤湧化生秋思未多團扇在擬題宫怨月分明盤鵰暈錦是冬衣鴿炭初生酒力微聞到邊臣風雪苦口宣臈藥布皇威賛書謄副節樓前筐篚盈庭邸吏傳深恨胡蘆陶學士受渠犀玉索金錢前宛轉曲紫檀出海南削成琵琶槽上有鴛鴦弦彈曲聲嘈嘈客問此何聲新聲名絳桃一奏桃始華再奏花枝斜笑靨頰暈粉仙源飯蒸霞度作新聲曲春樹雙鶯逐雙鶯擲金梭魚藻蕩圓波陌上行車帶結羅絳桃年少光隂多商學士畫山水歌商侯畫山并畫水當今天下無雙比昔者累蒙天子知晝日三接賜筐篚墨滓翻流雪壁滑閩嶠蜀門生寸晷五年送絹或不得岸幘飲酒辱畫史江波沉沉樹含霧疊嶂千層問歸路𤣥雲夜合風雨交漁師不畏蛟龍怒倚雲茨屋如穹龜樛枝應有猿峱悲暝靄依稀蜃樓出暗霏彷彿鰲峯移君不見剡藤一丈光陸離嗚嗚野父秋行迷磨劒詞黄金陶冶子為報鑄劒恩將軍未使時佩劒立軍門初斬樓蘭王衣無㸃血痕再斬無義子馬走不及奔白髮滿兩耳將軍不能軍病臂尚磨劒天子已脩文蕭性淵善鼓琴予嘗為之作我思操今自和林歸再任巡徼之職于江南比行又求予詩遂為賦漢銅馬式歌以送之漢家金銅鑄馬式求馬相此不失一塞上將軍得一疋驌驦如龍高八尺日斜騎出隂山道獵獵霜風鳴淺草鞍後並懸雙白狼歸來穹廬月弓好江南綠蕪春接天只須一抹蹴雲烟摩訶舊是將軍種酒涴青衫學控弦反銅馬式歌送熊太古古來相馬不相皮驥服鹽車雙耳垂轅下局促上九坂躡雲駿足何由馳奈何漢家鑄馬式求馬求中工人規厚蹄長鬛尻肉滿毛理光澤為權竒縣官芻豆給飼品氣僨牽出當路嘶伯樂死後驥空出千金何人買駿骨楊花宛轉曲空中游絲已無賴宛轉楊花猶百態隨風撲帳拂香奩渡水㸃衣榮錦帶輕薄顛狂風上下燕子鶯兒各新嫁釵頭燼墜玉蟲初盆裏絲繅銀繭乍欲落不落春沼平無根無蔕作浮萍纈波綉苔緫成媚人間最好是清明清明艶陽三月天帝里烟花匝酒船石橋横直人家好小海白魚跳碧藻榆莢荷錢怨别離不似楊花宛轉飛楊花飛盡綠隂合更看明年春雨時擬剡亭棹歌六首棹船雲錦溪頭過自唱江東新櫂歌照眼水明霞霽雨侵衣好風日酣荷擬剡亭前山水好如雲如錦靜嬋娟主人天上吹笙去屋角青蘿掛紫烟斗北天南春滿地香爐丹竈過年年君王不許還山去莫言騎馬似乗船季真瀟洒風塵外乞得山隂一曲湖頭帶黄冠披鶴氅秋田歸去别蘼蕪仙子秋風紫綺裘舊家雲錦溪水頭我今愛酒似李白便擬饒州似越州稽山酒船且莫囬賀老辭朝早晚來瑶草瓊花滿人世君王方許下蓬萊公子行緣香繡帳乗流蘇床頭三尺紅珊瑚十八窈窕秦羅敷曲房小步璫鳴襦高堂公子吹笙竽百斛明珠買氍毹蘭燈桂漿炙文魚但苦不駐羲和車擬唐宫詞十首華清水殿綉芙蓉金鴨香消寳帳重竹葉羊車來别院何人空聽景陽鐘銀床井冷露漙漙半臂薫衣釧辟寒不恨長門冬夜永水奴休報襪羅單長門月轉漏聲催自熨寒衣减帶圍休怕官家嫌體弱細腰曾是楚王妃合宫舟泛躍龍池端午爭懸百綵絲新賜承恩脂粉磑上陽不敢妬娥眉繭館繅絲濕翠翹夫人纎指織龍綃羅襦雙佩清晨響只恐君王有宴朝八姨粉翠錫千緡脂盝新粧百寳勻白髮上陽宫女老補衣重拆繡麒麟夘酒㣲㣲醉宿酲催花羯鼓變新聲君王好賜承恩宴辛苦邊頭百將營露蘭研粉壽陽粧奩内新燒百刻香圓舌教成鸚鵡語偷將玉笛送寧王銀河七夕度雙星桐樹逢秋葉未零萬嵗君王當宁立妾身不怨命如萍花氣蒸霞淑景明望仙樓上看彈鸎李謩吹笛宫墻外學得梨園第幾聲贈陳衆仲纈雲辭纈雲織波射金水郎君水西着皮履南陌紫塵十丈高捋鬚買酒意氣豪萬里將書慿水鳥荔枝千顆團團小天津不隔少㣲星閶闔門開夜光曉雜言秋江釣月秋天月落秋江底狂客持竿釣不起我知月魄在天上天地山河終不昧収君釣絲解君餌還我光明照千里君不見古來亦有謫仙子被髮長歌弄江水霞川越國山明罨畫剡溪陂瀉雲藍袍發故鄉晴炫船迷歸路春酣題太白晴碧圖我聞天星之精化為石况爾柱地名太白又聞崑崙崆峒天壇禹穴雲為衣何如錦樹翠蘚錯落昭晴碧山寒日暮虎豹缺彷彿巉嵓霧雨澀淮南筍鞋今不至令人缺笠歌青壁李仲淵御史萬竹亭君不見江有蛟龍宫又不見竹有鳯凰實江波沉沉竹林合中含絪緼太古色君侯亭子書帙光依微靜綠棲墨香東家絲桐間高堂我方與客歌篔簹狎蛟龍兮騎鳯凰渭川淇園在何方送艾伯蒼歸江西豫章艾生衣逢掖京國行歌髮半白石渠諸儒論秦灰官高不肯虗左席暮春南行上鄒嶧更觀古刻封禪石慘淡野隂生布袖壮士長年饑餓厄巢溪巢溪之水清且美亦有蛟與龍亦有魴與鯉無使魴鯉亂無使蛟龍缺喜知經筵蔡國張公至行夷猶憺容與載兩旗駕四牡喻曽一作逾高山遵大路日在天雲作雨將至止徳容度晨脩觀適帝所書石辭清漳木落霜曉騎馬獨吟北山誚竊禄而無恥徒三往而三還兎窺蝶圖兎斯首神注目天為辰神不畜封中書賦梁王奔蟾宫走兎場生無雄居有穴爾形肖我書掲六言五首借馬出城移竹取錢與客収書洞口蜂房割蜜缺南塘雨晴草滿西林春早花疎道士燒丹借竈山翁種樹求書白鳥飛來何許青山閒對誰家日暮一尊濁酒不知風帽攲斜絶澗花迎暮竹囬塘水媚春雲欲賦淮南招隠山中桂樹留人竹下茶甌晚步花間酒榼春行誰訪青山白髮道人留我題名楊孝亷義烏宻雲縣裏日欲西楊家樹上烏來棲啞啞鳴聲似兒啼日出捉蟲哺母飢君不見延秋門姑蘇臺詩人歌曲至今哀鳥兮烏兮去復來孝子有念烏無猜商學士萬里圖曹南商君儒家子身登集賢非畫史酒酣氣豪不敢使揮洒山水在一紙咫尺萬里乾坤意人言造物真兒戲盤䊹流動各有象變化歘忽風雲至吾觀崑崙四月出更觀扶桑東日生形勢開合限内外分野上合星辰精大禹鑄九鼎鄒衍外九州豈但草木異乃有鬼魅憂噫嘻奉常官禄薄百錢縫嚢貯丘壑為爾作歌還一噱何年淮南戴青箬聮句秋雪聮句同袁伯長賦白帝欲返馭𤣥神已先驅南山黯遐睇西顥阻清歈刻雲環珮雜剪水瓊瑰敷金英受剛潔丹桂遭模塗高標變鬚髮爽氣通微軀羣隂孤陽僨積素五采腴路修天鵞疑穴覆野兎呼蟬翅抱殘槐鴈影驚拆蘆滉瀁露莖溜空清氷柱酥或云勢已盛又言理非殊先時明堂嚴薄刑辱収誅浮華敵春澌斂實侔冬輸對立各動色沉思儼徐趨鴻鈞轉槖籥緹室潜葭莩觀物昧休徵永歌啓貞符鸚鵡聮句同王繼學賦雕籠居啄桃袨服儀采綠南荒孕靈質西顥發麗曲頸綬紅縈絲喙棘頳屈玉蓄慧婉含章襮彩粲成縟能言貫珠舌善舞凌雲躅金眸肖韝隼珍畜異巢鵠層塔寳舍利深杯注醽醁流丹曙林度隨翠春洲浴石鏡影毰毸銅梁步陸續題賦吾豈能入貢爾應錄都城南有道者居名松鶴堂暇日同東平王繼學為避暑之遊因作松鶴聮句偃雲聳層霄驚露落古雪虬枝憙乗澗鷺羽陋鳴垤蟠石千嵗苓頂朱百齡血胎禽哺春巢乳脂凝沍節舞盖竽籟喧啄粒苔蘚囓𤣥玉薫麝煤碧脛溢鷄􅀈陟岳秦爵崇授甲衛軒劣沐髮豹霧深引吭鳯竹裂風馭八極小河舟三翼拙魯縞曳褵褷夏社挺嶻嶭任重明堂材言歸華表别拳縮包胥立堅剛伯夷烈延世餌芳液顧步炫高潔作室擅兹美觀物入獨閲誓將束嚢書從爾解珮玦天慶寺納凉聮句槐屋夏隂繁石池暑氣清高堂暾一作噉福田邃宇依王城午磬梵唄集夜廊酥燈明龕經鬱金字壁礎承丹楹寂寂鴿棲罘宛宛燕穿榮露葵炫畫艶霞藥敷陽英境閴便靜室心古樂髙情逍遥祗園賞迤邐廬社盟山枕藉雲潤水簟凝氷輕飯盂給香積架衲褫華纓海圖岩壑折天樂音聲鏗荔墻䕶筠粉桐甃沉榴瓔共忻朋簮合敢謂詞鋒并睥睨荒草棘横縱按林坰幽尋振塵鞅雅淡心一作忘飛觥鄙哉河朔飲投幘得世名聮句鏡檻芙蓉入香臺翡翠過撥絃驚大鳯交扇拂天鵞隠忍陽城笑喧傳郢市過仙眉瓊作葉佛髻鈿為螺五里為隂霧秋天只見河此句疑誤月中脩藥剰海上得綃多玉集胡沙割犀㽞聖水磨斜廊穿戲蝶小閣鎖飛蛾騎襜侵韀卷車帷約幰鈋五戈切傳書兩行鴈取酒一封一作峯駞橋迥凉風壓樓横夕照和待烏燕太子駐馬魏東河想象鋪芳褥依稀解醉羅散時簾隔霧卧後幙生波梯稳從攀桂弓調任射莎豈能抛斷夢聽鼓事朝珂至治癸亥八月望同袁伯長虞伯生過槍竿嶺馬上聮句有嶺名槍竿其上若棧閣白雲亂石齒青峰轉帘脚積氷太古隂出礦無底壑馬飲沆瀣泉鷹盪扶摇幙轍蹟委垂紳人聲發虗槖舄飛接鳥背羽没疑虎膊霧松秋髮長霜果紅頰薄斤樵不知疲獨往端有愕兢兢矛頭淅杌杌井口索凝睇見日觀引手探月窟南下渺塵海北廣絡沙漠金橋羣仙遊寳塔百神鑿禽鳴蜀帝魂鐵鑄石郎錯闌干挂鈎衡欃槍斂鋒鍔屬車建前矛馳道拘嚴拆載筆三人行弭節半途却騷國陽出國陽以行野馬驤首兮在路望春樹兮不歸欲臨流而先渡發淮浦發淮浦兮遡黄流鼓船舷兮極浮遊雲漠漠兮天已秋攬芙蓉兮艤芳洲酌吾酒兮樂無憂懷佳人兮結綢繆天碧辭贈姚道士仰日月之所麗知下土之為卑充積氣於兩間其映一作坱然而在兹日蒼蒼以圓形因嗟世之多迷若夫人之有道將大觀而弗私閩中山水有樛兮灌木有穹兮崇屋石礦兮洑漁師樂兮榜連下疑有屬字九成宫圖泉濺濺而響谷風瑟瑟以動林夾兩山以為趾絡下塹與上岑宫纎麗以媚女觀騫翥以凌塵矢池魚而泳泳飼有麟而馴馴帝奈何兮不樂將弭乎江津華清宫圖帝出車以嗚鸞儼六龍之驤首循長陸而東騖謂泉源之在右穹閶闔之天門封百二而為垣朋猘羯而不醜嗟神堯之文孫我思操贈琴生蕭性淵八風兮渢渢遍宣兮音通律節兮應同臣商兮君宫龜之山兮松有枝羑之里兮田有莱天不喪兮何悲顧欲顧兮令我思賦傷已賦嗟余生之多憂兮幾顛踣而數窮誓纉言以自見兮力追古之高風呼䒶龍以駕我兮伻䒶使使為期何九稼之不一獲兮尚偃蹇而如兹豈剞劂之有不善兮將世徳之下賢薦芻茭于宗噐兮綴履綦以璣璿封敦旄以塊泰岱兮謂汎濫其莫涯冠髫童以弁冕兮問禮意而莫知决大疑於滛鬼兮慿巫傳以度撥顧聖言之鞿靷兮指綱維為械意憫相通之無朋兮去一髮之幾希扼吾車之莫聘兮膠吾口而難辭懲前悔之不憚兮配古道其或可思一旦捨此而改圖兮念後余之病我日浚惡以啓湮兮患世之屏經而好權邅岐蹊之多迷兮世或謂其固然抱昌辭以適與我兮俟來學以偕行辨百家之糺紛兮孰察余之衷情亂曰我涉大波孰為航兮我載大塗孰為箱兮古聲喤喤金石之揚兮世無悵兮適忘賦適機子遇忘機子於大都適機子曰若知吾適機乎凡羣動萬彚叢生沓來肯綮轇轕泉滲穴開揣摩捭闔迎合附㑹孕奸媒孽逆承人意子不吾信請衍斯義惟是都也子欲浮閩越吳蜀則登舟子欲奔并冀朔漠則升車若東若西或南或北扶耄挈稚囊金槖榖發軔則達不俟龜卜顧兹弗覺而踽踽齪齪木偶弗若譬驥之童鬛牛之食角子何不智甚耶忘機子曰子庸知我之藴底耶今子説我以私智啗我以功利隂塈厥醜陽塗其麗固妾妻之所羞而輿臺之是貴我游神八紘而身寓一室心翫千古而親不離席幽晦莫耀韜閟莫測明是非於後世公得失于方策邈邈綿綿似消似息鑑空淵渟罔有形迹子令我登航浮流則航有覆令我升車涉途則車有軼何發軔之遽達而謬以不知目我哉適機子啞而愕噱而笑曰八紘寥廓子將奚托千古㝠㝠子庸用學曄煌煌之輿馬烜赫赫之官爵彼幽晦與韜閟實狴犴與鈴鐲後世孰親於妻奴方冊孰快於女樂同生同死臯䕫羿浞世方溟渤奚翅瀺灂喔咿粟斯無害於儀䲭夷脂韋無損於皮若夫航之覆車之軼寧盡廢車航也哉不智之機子復何辭忘機子拊脾鼓膺咍且吁曰初聞若之辨可駭可慕旋而籌之惟蟊惟蠧慨戰國之口頰俾宗廟其墟墓墨焉朱焉悲絲泣路繄二賢雖詭迹於孔孟庶憚天於朝穆順于骩骳改我軌步或嘘或煦或濡或呴雜肖翹於一喘羣黄卉於一澍㰅埴索塗螟𦙍羸負吾恐禍天下之英才子且吞言而勿吐適機子曰有是哉姑置之子自礱爾璞我固淬我矟孰利孰鈍厥效卓卓忘機子曰大璞不礱大金不淬蔑爾利鈍奚傷至噐二子方藻吻簧舌矛盾辨詰有馬子者魯仲連之流也以書連矢射其所曰夫天地精明人實肖形倥侗顓蒙教學陶鈞盖金玉之合應匪忘適之異情子盍聽鈞天於廣野覿萬舞於天庭然後範聖度揆時中蹈龍蛇占鳯麟兹豈非莊周氏所謂天民者乎二子解圍合盟而去悠然閣賦為周南翁作舒吾眺之落落兮覿寥廓之無跡㑹㝠㝠之遐思兮契萬品之攸職擬大化而罔象兮悼世徳之囿形聿逍遥而容與兮泊乎游乎太清是有當於吾衷兮表吾廬以自肆騁余馬於析津兮崇吾屋乎江汜揭高躅于古道兮追前脩其或然偉一世君子兮又贈之以蘭荃曰予未有知兮何私意之彷彿懿夫子之悠然兮殆及予乎空谷草亭賦長清先生被召供奉翰林之明年搆亭於所居之前扁名曰草亭謂其友夷門之客曰古者能賦可謂大夫客盍賦斯亭以見志哉且無盈辭以夸無曲辭以競無刳辭以飾而亦無寓辭以病也遂為賦曰都邑雄雄有亭厥中廣可函丈而高如廣縱赤垣外塗而白茅上崇者非先生之草亭耶予盖得觴酒賦詩于其下矣弱篠小草䓗菁乎其左茁也丹蘤碧旉窈窕乎其右擷也壺箭博局琴几畫圖庋而設也筆簡研石書帙劒器布且别也秩然其有截也憺乎其能㓗也冠屨肅肅佩玉在躬籩豆晏晏言笑有容朋合悦也登降步趨衣帶委如姬孔輿輿諷言徐徐自整攝也是則游息之植學燕閒之修業者固可徵於前哲也夫至乃葺屋作室黝堊丹漆華目鑠心文綵差參囬廊曲房翺翔步璫飛閣虗堂撃鼓吹笙此固侯王之所當而非下士之所可常俄有一人歌於坐旁其歌曰衡門之下可以棲遲有美君子不恤其私曄也古辭作亭叢叢蝸􅀈龜穹于室之東繄古之宗兮又歌曰爰有人兮好儒視藐藐兮獨趨不齷齪兮以濡疇道之依兮而孰與居感栢樹賦光州孔子廟庭及宋司馬光祠前栢樹皆先子集賢府君治光日携祖常手植者也今二十六年矣蒼虬翠蛟森列左右祖常蒙詩書之澤忝官禮部尚書兼經筵官天厯己巳正月以謀塟得請還光又蒙聖天子不棄敝物馳使再召以疾未行輿疾瞻仰孔子廟庭撫摩羣栢潸然感思作賦以見意焉涉淮湍而返有寢丘之遺封届州圻而近古壤寡殖而不豐曰瘠土之民勞庶善心之易孳慨先哲之豈弟興黌宇而納之哀刳兵之纍俘緣其裳而來游又於田以謀食廪饙錙其浮浮間擕我以觀學命畚鍤以執事揖豆籩以下堂列穉植於兩戺䕃喬木於今兹慕予親於曩昔嵗邈邈以云徂涕潸然而洒臆顧瞻戀而移晷拭手澤之或存巋祠位之蔽虧恍神軿之繽繙當予親之在官盡厥諝於民庸暑無葛以代澣珮無玉以為容終下陳而弗忮榮天爵以俟天禪未艾於子孫永文壽於大年矧兹樹之後彫匪庶草之競華覩斯道之昌期徵於神而不遐石田文集卷五
