body:
  text: 石田文集卷六元馬祖常撰制誥遣奉使巡行詔朕祇承洪業夙夜惟寅凡所以圗治者悉遵祖宗成憲曩者屢詔中外有司宣布德澤蠲賦省刑賑恤貧乏思與黎元共享有生之樂尚慮有司未體朕意庶政或闕惠澤未洽承宣者失於撫治司憲者怠於糾察俾吾民重困朕甚憫焉今遣奉使宣撫分行諸道案問官吏不法詢民疾苦審理寃滯凡可以興利除害速宜舉行有罪者四品以上停職申請五品以下者就便處決其有政績尤異暨晦跡於丘園才堪輔治者具姓名聞咨爾臣庶體於至懷追封河南王夫人制古者婦人之義名字不出閨門乃所以别男女嚴內外也故河南行中書省左丞相布拉吉達妻胡氏徽柔惠淑蚤嬪髙門相其夫子顯聞于時豫方推恩四海矧我股肱之舊而有爾伉儷之良乎故追封爾為王夫人仍啓河南故圻以從封夫爵噫婦官一品褕翟有光其尚隂隲爾家服我寵休之無替思州軍民宣撫使田冕晃和爾布哈封贈二代制國家外建藩屏以靖逺人責其宣布懷仁之惠能使恩威並流而一方清謐者稽于國典可不賞勞乎具官某父某官某向膺朝寵勤庸服官勠力小心不聞有過乃教忠於嗣子得寵慶於世家兹朕所不忘者也故命追褒異數階秩一品有靈在幽尚迪爾後比屬有司考禮於恤典矣而婦人之貴嘗視其夫子焉况有鵲巢汝墳之懿能行於其閨門衽席之間者乎具官某母某氏女儀柔婉來嬪辨族相其宗事珩璜有節又能篤生令子服柔疆場撫綏之勞湯沐衍封胙以列國其尚歆承休寵利爾後昆以延饋祀之無已哉朕以孝治天下凡人臣之親悉命因其班列之次功庸之等以為寵數之異焉具官祖父某官某昔備官使輯綏邊氓頗著惠懷有譽南服夫天之施仁於物無間朕敢不法天而已哉宥密之司階品為貴啓爾後人保兹終吉先王制禮婦人之義飲食衣服祭祀而已非有與於外事也然或婦道母德可以表率宗族而成其夫子者顧宜有以顯賁之也具官祖母某氏早躬組紃克遵女戒作配令族柔閒有儀惟時聞孫扞我邊圉膺被爵祿光寵於時而爾可不疏封鄉國以廣彤管之訓乎贊書在門其告泉壤太師右丞相封贈三代制定策元臣肇啓中興之運推思彛典聿申先正之褒揆禮是宜勸善惟允具官某質實無競沈鷙有謀服勞王家久著屬櫜之績薄違圻父夙專乘一作秉障之功嘉爾曾孫為豫冢宰於戲漂陽開國儀崇斧鉞之光册府書勳銘載旗常之顯英靈如在寵數是歆曾孫有慶衍三世之恩榮大賚匪私勸百辟之忠藎有嘉淑女作配先臣具官某妻某孝養姑嫜教遵姆傅居謹珩璜之節躬親絲枲之勤宜厥家人相其宗事魚軒翟茀往膺江左之封鳳誥龍章用播召南之德歆豫時命迪爾後昆開國承家禮重胙勳之典析圭儋爵恩先豫善之仁報施匪私褒崇惟稱具官某英標俶儻偉器沉深蚤奮厲於師中爰馳驅於戎右股肱心膂桓桓挺萬夫之雄弓矢干戈井井飭九伐之法世稱良將胄衍名孫定大策於樞機奠皇圗於寰宇於戲石城鍾阜肇開赤壤之封礪山帶河允著丹書之誓賁爾窀穸歆我絲綸朕茂膺景運大賚元勛恩推再世之封禮及重闈之慶具官某妻某氏柔嘉維則婉孌有容事夫盡舉案之恭職修中饋弄孫致含飴之樂福裕後昆凡我邦國之光繄爾室家之助鳳臺胙土聿開脂澤之田鸞誥封泥永賁泉扃之兆尚歆寵數益衍休祥朕以崇德報功實先王之令典建邦啓土昭奕世之殊勛眷我舊臣錫兹新命具官某魁竒天挺卓犖人雄韜略邃於孫吳志勇邁乎賁育昔武皇撫軍於龍漠躬櫛風沐雨之勞而大將出陳於魚麗懋掃穴犂庭之績威行萬里恩浹六師訖振旅以裹戈底來賔而包匭每御衣裳之㑹聿深鐘鼓之思生子象賢由教忠而尚義為國敵愾遂翊運以中興永惟閥閲之隆端繫社稷之重不有異數曷稱至懷於戲玈矢彤弓嘗旌勤於征伐丹書鐵契尚迪慶於承傳淮甸分茅泉臺告第朕眷元臣之勛幼被慈母之訓屬有司之考禮宜大國之疏封具官某妻某育秀名門作配君子珩璜琚瑀修婉娩於婦容蕰藻蘋蘩致齊莊於宗事篤生令器實贊丕謨底海宇之謐寧承邦家之休慶緑綈方底鸞翔芝檢之書霞帔襲衣雉纈茀車之采江都錫壤泉室增華太保左丞相封贈三代制匡時靖難資大策於元臣崇德報功覃湛恩於纍葉奉常議禮奧壤定封具官某故曾祖父服勤侍衛秉信功臣太傅銀青榮祿大夫上柱國梁國公諡敬簡塔瑪噶爾秉質無華詒謀有永蚤備勾陳之列式昭析木之祥衍善慶於曾孫篤忠貞於熙代使宅百揆光於前人於戲開國浚郊具儀文於鐵鉞承家新鄭紹世美於衣冠録我絲綸告爾窀穸可追封陽翟王朕論功定賞念扞衛之多難推慶行封俾覃延於三世懿彼靜女配豫先臣具官某故曾祖母梁國夫人呼圖克章蚤飭壼儀克承宗事不假詩書圗史之戒素間織絍組紃之功迪美萃於曾孫發祥殷於令族新廟奕奕斫松柏於析津原田每每畫封圻於梁土龍章有赫象服來歆可追封陽翟王夫人朕奬元勛恩推舊德濟其世美詒厥孫謀屬大業之中興賴名藩之外援追封奕業實著彛章具官某故祖父守忠翊正效節宣力功臣太師金紫光祿大夫上柱國梁國公諡莊順青哈質禀淳龎躬行愷悌櫜鞬宿衛久服勞於王家弓冶承傳遂開先於相閥方乾坤之清謐俾綸綍之渙頒用禮勸忠書功旌善於戲伊洛瀍澗樂哉魂魄之遊山川土田衍爾蒸嘗之奉昭兹來裔祜我丕基可追封河南王命婦朝后彤管著於女針令妻相夫鞶絲陳於內則亶惟淑德嬪於名門具官某故祖母梁國夫人呼喇濟育質柔嘉修容婉娩久襲祥於世業當擢秀於孫枝為國懷材贊豫茂烈雲翔鸞誥俾澤漏於泉臺飈轉魚軒想神遊於梁苑尚詒多祜福爾後人可追封河南王夫人惟王建國必崇德以報功自天降康乃生賢而靖難兹眷元臣之懿宜推先正之褒具官某故父懷忠濟美積德崇慶功臣太師開府儀同三司上柱國特進河南王諡忠懿錦濟勒藴善弗彰紹謀斯永為郎執㦸夙多宣力之勤有子克家益勵敬忠之訓定中興之大策立不世之殊勛匪衍王封曷稱朕意於戲河山帶礪式藏盟府之書乾坤珍符期篤熙朝之祜格思英爽歆此寵光可追封鄭王朕惟元臣克相中興之業母有令子宜膺崇秩之封稽諸彛章廣我孝治具官某故母河南王夫人揚珠竒納夙間姆訓綽著婦儀薦蘋藻於蒸嘗節珩璜於夙夜內政素勤於中饋慈訓尤切於斷機德啓閨門光資邦國倬兹鄭圃乘翟茀以來遊嘉彼召南賦鵲巢以行化俾頒綸誥用賁泉扃可追封鄭王夫人平章伊蘇岱爾封贈三代制夫用之紓者積必厚行之徐者力弗殆斯道之常匪曰責報也平章伊蘇岱爾曾祖父贈定威佐運功臣榮祿大夫司徒柱國追封曹國公諡忠定布色出於華族夙奮材武從我太祖皇帝親屬櫜鞬崛起戎列威行方國戰功良多及定隴陜斬將搴旗臨敵致死大節赫然傳不云乎活千人者有後兹爾數世之逺傳家孫曾愈碩大光顯又得議封於禮官博士非用兵有活人之德而然乎命頒異數開國曹南中土奧壤襲慶濟美可示為將者之勸可贈定威佐運功臣光祿大夫司徒上柱國追封曹南王諡忠定古禮命婦朝后是則婦官尚矣平章伊蘇岱爾曾祖母追封曹國夫人塔本劬勞慈育生子克家戰勝攻取丕佐興運議禮制度於爾有封從夫之爵曹國小君象服翟茀歆兹追寵可追封曹南王夫人朕稽古為治立國以禮故臨御四海永慕祖宗創業之艱難美其興運佐命之臣厚厥世賞以訓臣鄰矧其𦙍裔又有能全其終始者乎平章伊蘇岱爾祖父贈宣忠靖逺功臣光祿大夫中書右丞相柱國追封曹國公諡桓毅額里根蚤備宿衛分從賢王前驅先登戡定河外俾金國為墟而宗社遂以屋者蓋爾戰多之力焉異姓封王於爾為寵矣英爽不亡尚保爾世哉可追贈宣忠靖逺佐運功臣金紫光祿大夫中書右丞相上柱國追封曹南王諡桓毅夫恩禮覃於百官則先近臣漏澤施於九原則觀來者平章伊蘇岱爾祖母追封曹國夫人穆嚕蚤嬪髙門無違宫事克相君子為王虎臣又有聞孫贊豫景運俾有司議封乃追命爾為王夫人以曹南之田為脂澤之賦尚歆寵渥益衍廟食可追贈曹南王夫人先王有崇德報功之制豈曰觀美蓋以旌善而勸忠也平章伊蘇岱爾父光祿大夫中書左丞相先贈協謀定逺佐理功臣太師開府儀同三司上柱國曹國公諡武宣阿勒哈生長富貴宴安而氣無紈綺子弟之習勝衣荷戈奮身前驅維時世廟觀兵江滸貔虎百萬之衆謀臣如雲乃能立功名於其間北征叛王轉戰千里南殄奔君樹旗海嶼勛勞顯著寵賚便蕃我國家於君臣之道可謂至矣朕不聞鼓鼙猶思將帥况爾有後為豫藎臣中興之初率兩河將士勠力介胄之間大臣以聞乃隆推恩之禮上及於爾三世焉曹南之郊桑谷沃壤開國稱王人臣極位爾克有靈歆我綸命可贈推誠宣力定逺佐運功臣太師開府儀同三司上柱國追贈曹南王諡忠宣我國家經營南國之初尚賴膂力之士材武之臣克成大業勛勞之蹟皆以銘於太常矣又且尊顯其身以至於室家之有慶者兹非典禮之懿乎平章伊蘇岱爾母曹國夫人托多淑慎端惠夙配君子遵召南之化而象服是稱施孟母之教而訓忠有言卓兹令器為朕虎臣臨御之際褒錫宜先開國曹南以衍脂澤之賦煒其榮哉賁爾窀穸可追封曹南王夫人君子不昵於宴安之私以能成其功名者亦嘗資於內助焉平章伊蘇岱爾母曹國夫人庫庫楞幽閒端懿雞鳴而起相其宗事婦德有稱沒從夫爵啓封曹王魚軒象服裕爾後昆可追封曹南王夫人太傅圗嚕封諡制帝垣台位象已著於上𤣥太傅師臣官尤崇於常秩有懷舊德追錫真王太傅圗嚕蚤陟華階懋修素履小心翼翼文昭持槖之班終日乾乾勞著屬櫜之績宗親入覲儐相是資酎金不罰於諸侯英蕩悉同於元㑹樞機宥府奠軍國於乂寧鼎鼐台司贊隂陽於化育踐揚禁近閲歷嵗年持風紀於臺端肅官針於朝著天不憖遺朕用衋傷思答茂勛爰申恤典於戲胙爾茅土俾開國於廣陽播豫絲綸尚流澤於幽壤諒兹靈爽服此寵章可贈懷忠秉義昭宣弼亮功臣太師開府儀同三司上柱國追封廣陽王諡清獻男位正家恆有資於內助女師結帨庸作配於上公奬我舊勛逮於佳儷太傅圗嚕妻輝和爾氏幽閒育德婉孌賦姿象服是宜奉蘋蘩於祭祀彤管有煒謹珩瑀於針規懋著婦功克相宫事痛所天之先殞誨厥嗣以益嚴石窖啓封賜廣陽之大國容臺議禮贊召南之夫人享爾髙年欽此異數可封廣陽王太夫人右丞阿勒坦封諡制朕以崇德報功之制聖王建國之皇圗論名立諡之稱昭代褒賢之巨典用光綏寵俾洽臣鄰右丞阿勒坦少禀粹姿蚤登膴仕周廬星列入陳扈蹕之勞專馹飈馳來上屯田之奏恩威襲蠻夷於冠帶忠孝擴詩禮於箕裘錫類著乎家邦浚明勤乎夙夜貂蟬七葉飾躬不瀆於華鮮弧矢四方迪德彌彰於懿美篤生令器丕佐明時聿殫嘉猷晉參大政橫經內殿矢兹密勿之言熙載外朝體朕都俞之意有司考禮於汝推恩爰頒渙號之辭式副哀榮之志於戲丞相一品英靈尚克以歆承泰階六符善慶益延於似續録諸告第欽我贊書可贈秉義效忠著節佐治功臣太保開府儀同三司上柱國追封特進趙國公中書左丞相諡貞孝周南正始教化被於閨門趙國疏封寵榮光於泉壤爰稽彛典用奬有官右丞阿勒坦妻唐古氏育質柔嘉修儀婉娩來嬪閥閲蚤乘翟茀之車克相夫君益著鵲巢之德篤生令器褒作名臣服慈訓之不忘迪嘉謀之入告推恩追錫體人子報本之心考禮飾終示我朝廣孝之治尚昭懿範歆此告詞可封趙國夫人尚書左丞相某封諡制朕纂承天序入正大統思豫皇考繼志述事眷惟至大之間更張庶政務適人宜褒贈以勸百官鼓鑄以利兆姓時弗僉諧事或中輟興言追悼斯念舊臣故尚書省丞相某早列環衛給事禁闥升諸台席浚明夙夜佐豫皇考一德一心顧遇寵賚廷臣莫及豫方以孝治天下躬祼武廟如見羮牆况豫先臣有子在列兹命禮官公議於廟謂爾宜封郢城王位貴專楚都旌旗斧鉞開國西南精忠不昧尚從先皇於遐狩哉可贈竭忠宣力守義佐治功臣太傅開府儀同三司柱國郢城王諡榮敏表箋賀元旦表皇極建中賁嘉生於世運乾元資始衍嗣嵗於人時叶氣開先純陽肇德欽惟道全居正功洽體仁坐宣室以受釐百神奉職御明堂而布政萬國咸寧勾陳環列於端門庭實駢羅於文陛臣某等塵聨烏府迹簉鵷行進封事於銀臺慚稽衮補紀卜年於寶厯欣對嵩呼正旦賀興聖宫表帝厯開天祥發貞元之㑹母儀法地源疏河海之涵百物順嘉四時叶序欽惟隂功庀世懿德承乾肇聖緒於姜原彌䖍祖武嗣徽音於太姒益衍孫謀茂綏獻嵗之祥膺保履端之吉臣某等遭逢世泰綴列朝行官備中臺王朔願敷於錫福慶隆長信民功仰荷於資成賀正旦箋夏正授時謹民功於肇始皇儲主器履帝武於開先慶集三朝福覃萬姓恭惟秉文純粹叶德光華青煒一作緯迎陽爰啓前星之重黃離繼照式昭太極之尊宅元祀以承天布王春而獻嵗臣某等叨塵官序忝列諫垣齒胄虞庠茂對奎明於午御賡歌魯頌仰觀日麗於寅賔賀建儲表伏以天潢育德聿開聖嗣之隆廟祐承祧爰啓儲闈之慶祥臻泰道福集昌朝欽惟迪德堯仁躬親舜孝日麗乎天而明兩益紹重華帝出乎震而洊雷彌嚴繼體乃眷元良之懿式膺監撫之崇臣等備位烏臺趨朝雞曙前星奏瑞載瞻青輅之旗太極含元第衍黃圗之籍賀春宫箋甲觀儲祥肇泰始含章之慶春宫正位受少陽體德之尊神器有歸宗祧是賴恭惟生知忠孝夙稟溫文躬問侍之勤德已昭於帝胄膺監撫之重道允叶於皇猷承華克紹於丕基建本方隆於大寶臣某等忝居侍從喜際文明鶴禁景遲願早親於四學雲門樂奏期介祉於三官賀建儲表聖嫡承祧大慶方延於國祚神孫主器鴻休實肇於天源龜筮叶從臣鄰效順欽惟慈仁坤育靜德乾儀益恢皇極之尊繩其祖武俾正少陽之位貽厥孫謀建儲允屬於元良繼體式昭於岐薿臣某等叨塵憲府欣遇熙朝瞻鶴駕於春宫三靈奉翊陪鵷行於長信萬福時臻監修國史賀正表瑤圗撫運紹開致福之祥寶厯乘時肇序體元之始大鈞播物淑氣迎和欽惟道洽古今性資文武潛心帝王之學聖敬日躋合德天地之仁皇猷允塞嵗事啓成於農扈治功端本於王正臣某等辱備台司監綜史氏觴稱萬嵗樂快覩於龍光書載三墳期永垂於狐筆監修國史賀正表天明即命紹開帝厯之隆王朔體元序正人時之始大鈞坱圠和氣沖融欽惟叶德重華備道全美御端門而肆赦萬㝢熙春坐宣室以受釐五辰順軌方九賔之在列萃諸福以來臻臣某忝列師垣兼塵史觀獸尊奉勸庸申效於嵩呼鴻筆紀謨願同符於龜畫賀建儲表禮謹承祧首正元良之位德符主器丕昭大統之歸宗社乂安臣鄰慶抃中賀道侔乾始祥發震亨受命建中邦家之基鞏固詒謀思永蓍龜之吉叶從重暉煥於前星鏤册光於上嗣監撫有托似續無疆臣等獲覩青宫幸趨絳闕聖神永錫頒夀考之萬年忠孝彌彰衍本支之百世賀建儲箋德配前星肇正青宫之位禮嚴言日丕昭寶册之尊任重承祧職勤問寢中賀溫恭夙著英睿日新受震建中式際上元之運明離繼照永開太平之基啓鶴禁以肅清奉龜圗以祇敬國本斯立宗支以昌某等職厠虞庠班聨魏闕終始於學願廣緝熙之功追琢其章庸贊泰和之治賀立后建儲表册建中宫體黃裳之居正祧承長器仰蒼震之儲祥國本以寧壼儀攸敘中敘聖資神武𤣥德欽明美教化厚人倫允叶相成之義奉宗廟承祭祀丕昭繼照之明慶洽三宫歡騰八表臣某職塵仙館班筵帝廷運值上元盛典並行於吉日天開大定顯謨已著於初年青詞祝文夀寧宫設醮青詞伏以道妙無言神功不宰既仰成於乾造實默相於皇家祇即琳宫肅延羽服誦瓊文之纍笈格絳景於叢霄伏願有感必通俾昌而熾五風十雨爰祈玉燭之調億載萬年益衍瑤圗之永祭星祝文太嵗迎神白虎送神病符喪門於穆元造孕靈載物神御所棲曰嵗斯福順成導祉備我牲玉叶德坤儀受天百祿神一作坤輿載靈司彼金方宣義揚威以戒時康后儀象坤靜德是將以籲以祈神其降祥運化流行元氣大和轇轕上下或爽以瘥瘥兹明誠儀物孔多期底善寧如山如河維靈在幽輔兹嵗君或侈隂威疵癘我人啓迪佳美惠布善人鑒兹蠲潔以求報禋明明在上不顯亦臨牲幣孔碩聿將厥心神之格思有肅其歆我俎既馨我祝維修辰舍順軌神旟安游相我坤寧叶于皇猷石田文集卷六
