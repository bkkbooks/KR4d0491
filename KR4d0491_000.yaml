  text: 欽定四庫全書集部五
  hash: sha256:91d391b03400458fe4b5406ed6606e69862a8e4f767c40fe8478f37cc3ae4e00
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0491_WYG_000-1a, image: WYG1206/WYG1206-0459a.png}
body:
  text: 石田集别集類四元提要臣等謹案石田集十五卷元馬祖常撰祖常字伯庸世為雍古部人居靖州之天山髙祖錫里濟蘇原作錫里吉思今改正金末為鳯翔兵馬判官子孫用以官為氏之例遂稱馬氏曾祖雅哈原作月合今改正從元世祖南征因家于汴後徙光州延祐中初復科舉祖常鄉貢㑹試皆第一廷試第二授應奉翰林文字擢鹽察御史劾罷丞相特們徳爾原作鐵本迭兒今改正既而特們徳爾復相修怨黜為開平縣尹因避禍告居特們徳爾死乃除翰林待制累遷禮部尚書尋叅議中書省事元統初拜御史中丞轉樞宻副使乞歸至正四年卒謚文貞事迹具元史本傳是集凡詩賦五卷文十卷名石田者以所居有石田山房也其文精贍鴻麗一洗柔曼卑冗之習其詩才力冨健如都門壯逰諸作長篇巨製迥薄奔騰具有不受羈勒之氣至元間蘇天爵撰文類錄其詩二十首文二十首視他家所收為夥又請于朝刋行其集而自為之序稱其接武隋唐上追漢魏後生争效慕之文章為之一變與㑹稽袁桷蜀郡虞集東平王搆更迭倡和如金石相宣而文益竒葢大徳延祐以後為元文之極盛而主持風氣則祖常等數人為之巨擘云乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部五石田文集目錄别集類四元卷一五言古詩卷二七言古詩五言律詩卷三七言律詩卷四五言絶句七言絶句卷五樂府歌行雜言聨句騷賦卷六制詔表牋青詞祝文卷七章疏卷八銘箴贊雜文䇿問題跋記卷九序卷十碑誌卷十一碑誌卷十二碑誌卷十三碑誌卷十四碑誌卷十五行狀傳附錄石田文集序故御史中丞馬公諱祖常字伯庸系出西裔延祐初設科舉以兩榜取士公應河南郷貢及㑹試俱冠右榜時已稱公有文學初非以高科致儒名公志氣脩潔而筆力尤精詣務刮除近代南北文士習氣追慕古作者與姚文公燧元文敏公明善實相繼後先故其文詞簡而有法麗而有章卓然成家其在禮部為尚書在中書為㕘議在御史臺為治書侍御史中丞在樞宻為副使累階要官自奉清約讀書刻厲如始學者雖一話言不茍及以病歸終于家大夫士之聞者無不悼惜嗚呼篆鐘編磬淡乎其韻璊璏璗琫栗然其光質古而文益竒以之考律吕之和資佩服之華皆用於宗廟朝廷之上者也詩曰惟其有之是以似之公實有而似焉公之家世勛閥具國史及墓碑太原王守誠與趙郡蘇天爵在㳺從中感知尤多故為序其文集至元五年已夘九月丁已中議大夫御史臺都事王守誠序昔者仁宗皇帝臨御天下慨然憫習俗之於文法思得儒臣以圖治功詔興貢舉網羅英彦故御史中丞馬公首應是選入翰林為應奉文字與㑹稽袁公蜀郡虞公東平王公以學問相淬礪更唱迭和金石相宣而文日益竒矣未幾擢拜御史劾權貴人擅弄威福遂罷相位乆之其人再竊政柄左遷公尹縣開平實欲深中傷之公退耕浮光之野泊然不以介意權貴人死復入翰林為待制遷直學士訓誥誓命温厚典則有西漢風在禮部為尚書兩司貢舉選士専求碩學崇雅黜浮至順天子親見郊廟祼獻禮文多公裁定及為臺臣端重正大百辟震肅議論廊廟有闗於治體一時薦拔皆重厚清慎之士公少嗜學非三代兩漢之書不讀文則富麗而有法新竒而不鑿詩則接武隋唐上追漢魏後生争慕效之文章為之一變公之先出永古特部世居天山迨入中國數世宦學不絶至公位益光顯嗚呼我國家龍奮朔上四方豪傑咸起而為之用百戰始一函夏干戈既輯治化斯興而勛臣世族之裔皆知學乎詩書六藝之文以求盡夫修身事親致君澤民之術是以列聖立極屢降徳音興崇庠序敦延師儒非徒為美觀也至于仁皇始欲丕變其俗以文化成天下猗歟盛哉觀公治行卓偉若此則祖宗取材作人之效豈第文辭之工而已雖然非此無以表公之藴公既没其從弟察院掾易朔出公詩文若干篇合天爵所藏共若干卷請于中臺刋諸維揚郡學嗚呼覽者尚能考公之行也夫至元五年己卯冬十一月朔嘉議大夫江北淮東道肅政廉訪使趙郡蘇天爵謹序文章何與乎天地之運哉元化之斡流神氣之推盪凡以之而生者則亦以之而盛衰焉吾嘗觀於禮與樂矣升降揖讓周旋裼襲之容屈伸俯仰綴兆繁瘠亷肉之節文之著也而樂由天作禮以地制禮樂不曰天地之文乎昔者聖人之以禮樂為天下也治與運㑹文從而生焉世之為文章者葢亦有出於此而已矣漢唐之治不及三代逺甚而其人之述作乃或有治古之風者亦幸而際夫天地之運之盛也趙宋鉅儒載道之書與歐曽王蘇數子之文君子於是有所徴矣而其運往治弛則凡以文嗚者皆靡然若緒風之泛弱卉也我國家龍起朔漠運符羲軒淳龎雅大之風於變四海士大夫争自奮厲洗濯舊習至仁宗時遂以科目取天下之士而用之浚儀馬公伯庸褎然以古文擢上第聲光煜如清河元文敏公謂其所作可以被筦絃薦郊廟天馬寳鼎諸作殆未之能優也公早嵗吐辭即不類近世人語言古詩似漢魏律句入盛唐散語得西漢之體嘗謂人學詩文固貴有師授至於高古竒妙要必有得於天吾未嘗有所授而為之訃所嘗師者往往為近世人語言吾故自知吾之所為者非繇有所授而然也葢公以英特之資而涵毓於熙洽之世自決科以來踐敭清華至為御史中丞其所際者盛矣則其文章又豈繇有所授而然哉國家且益崇禮樂以對天地之景運能言之士幸而際乎斯時則其所著當益有可觀者而美盛徳之形容以昭天地之至文則亦有頼於若人之為者而公不可作矣淮東憲使趙郡蘇伯修甫彚公文藁若干卷将鋟梓以行於世適旅至廣陵乃使綴一言於編端伯脩在成均時公以監察御史試國子生得其所試碣石賦嗟賞不置伯脩以學行政事致位通顯非徒以文知名獨不能忘昔之嘗知已者風誼之篤可以愧澆俗矣旅光州人而生于甌粤延祐中公以䌖事入閩歸而告諸朝之公卿大夫士曰閩中有陳旅者可與言文事也則公亦旅之知已者矣追念曩日與公晤言至夜分不休約他日還浮光為我結屋並石田山房暮年數往來相歡今則不然乃執筆序公遺文於空江落木之間俯仰人世不知涕泗之横流也應奉翰林文字從仕郎同知制誥兼國史院編脩官陳旅序
