body:
  text: 石田文集巻十三元馬祖常撰碑誌濟南安氏先塋碑濟南安氏有諱圭字伯玉者明法律起家始試補行省邢部令史尋遷安樂鹽司判官濟南府經歴官未幾又補行尚書省令史權行省刑部員外郎仍正授員外郎進至濟南行省左司郎中是時君年甫踰六十矣即謝職家居不起以至元甲子五月初七日終於正寢享年七十有一其子某以是月十三日𦵏君於某鄉某原先塋之東夫人成氏祔焉君先娶成氏再娶張氏成氏宣武將軍章丘簿昌之女先於君二十年卒有子四人長曰伸次曰僖曰倪曰侃女一人適濟南張鐸伸為登寧長鹽司管勾配成氏有子五人長曰惟湛次曰惟潜曰惟澄曰惟溥曰惟沁僖鹽泰安州酒醋税配段氏有子二人長曰惟洪中議大夫江西湖東道㢘訪副使次曰惟洋倪為濟南府孔目官早卒無子侃朝列大夫知安東州配李氏有子三人長曰惟演從仕郎冠州判官次曰惟淑監濟州税曰惟漢早卒曽孫一十二人長曰景范惟湛子也承務郎彰德廣平臨水等處鐵冶副提舉曰景元惟演子也進義副尉監杭州富陽税曰景時早卒曰景良曰景嘉惟溥子也後衛典史曰景益惟洋子也曰景璘惟洪子也曰景肅景周景魯景開景略皆有學未官按安氏上世家棣郡改遷濟水南郡中君獨能以吏文崛起致身髙顯而其子孫迪蹈世美或仕或學悉有名稱原原一作豈非郎中君生平有淑德懿行嗇用世資不赫赫發於其躬而彌致其來者踵踵也是宜植石鑱辭以昭示無極銘曰惟鼎鍾以受也惟穀帛以售也徳克肖之永有紹也朝請大夫大明路治中致仕馮君先塋碑銘君名仲德趙州柏郷人系出漢馮君之裔髙祖諱彬曽祖諱郁祖諱忠皆隠髙祖妣李氏曽祖妣王氏祖妣緱氏考諱安少有勇力能馳射不肯服穡事㑹國朝定中原兵南下遂起家為材士𨽻萬户史侯戲下從戰兩河間屢有功時史侯節制諸鎮以便宜辟君為鴻章京提控官階至宣武將軍辛卯我師濟大河進萬户府行軍鎮撫都彈壓官凱還主臨城縣簿尋遷髙邑縣丞丁酉加栢鄉縣尹凡為栢鄉縣尹者二十有九年而卒于官妣路氏迨中統四年君始襲父職栢鄉縣尹至元二年改涉縣尹六年真受勅黄進敦武校尉井陘縣尹九年依前官真定縣尹十七年遷忠顯校尉同知晉州二十一年改信都縣尹兼管諸軍鄂囉勸農事二十八年進忠武校尉池州路判官大德元年改安慶路判官八年進階奉訓大夫知益都路膠州事凡自栢鄉縣尹八遷而至知膠州自敦武校尉四轉而至奉訓大夫至大四年始以朝請大夫大明路治中致仕于朝夫人江氏再娶夫人蘇氏又再娶夫人田氏子五人杞桂檜楷梓杞江氏出餘皆蘇氏出也杞承門廕將仕佐郎主臨城縣簿桂監安慶府河泊魚課檜監池州税楷監太湖縣税梓湖廣行省宣使從子三人正栢鄉縣鄂囉次某官進武德將軍管軍千户椿屯田百户再從子一人良弼佩白金符衛卒府百户嗚呼夫朝請君以門地少小即有官長益力有為豈不賢於人哉方之以進取為賢而不知用之極而將自蹶者逺矣今觀君之歴官嵗月又且循序守道理不躁是能蕃衍碩大終致貴顯而無㣲咎也其於政績從可知也已其世德又從可知也已用宜銘諸樂石以勸銘曰振振馮氏唐顯漢世厥後或疑不載傳記有煒胃出皇元朝請章甫以居賁其閈井亦有秀才宋支蟬聫金節象笏式華以宣爰考徳徴允迪之承疇之畇畇禾之芸芸維天顯仁隂騭我人原念美實降相善純栢鄉之原豐碑植焉刻此銘詩尚茲鑒旃朝請大夫禮部郎中王君神道碑朝請大夫禮部王君以泰定元年七月十有八日卒於北都留守之官舍有司給轝䕶柩扶還南都朝之卿士咸嘆惋曰善人亡矣其弔賻之者異常禮焉君諱祖興字景先甫衛州胙城人髙祖諱魏金真祐間及進士第官至寳豐令曾大父諱克温金從仕郎輝州佐以節死大父諱文昱以父死國難誓不仕父諱樹後以君貴贈朝列大夫騎都尉追封太原郡伯母張氏追封太原郡君君甫官以文稱起家為汝寧府學正官諸生翕悦率教因新孔子廟而使之知所尊敬焉入補兵曹吏從竇尚書往賑湖廣之饑竇尚書用法須報下然後發廩君曉之曰人三日不食即死也奈何欲傅吏牘以殺人乎獨不見汲長孺耶竇尚書是之乃大發廩料口給食全活甚衆再以吏遷樞密院及丞相府東曹掾故事兩府掾屬得遇儲貳入府就中書令樞密使位者加恩起壹資君嘗持文書侍仁宗皇帝入西樞一署字考誠誠一作試特授奉訓大夫中書禮部主事奉訓官第五品制應封一代君請于朝興祖五嵗失父祖母丁夫人補紉紡織保哺喣育使興祖負笈就師而令粗有樹立者皆祖母之慈焉盖母孫相依為命者也願以妻封讓封祖母丁夫人于時丁夫人壽考在養詔以為汲縣太君搢紳榮之而當代之有讓封實自君始延祐七年遷奉議大夫宗正府員外郎准勅宗正府主北方刑獄凡罪無讞專論决之君言宗正司天子屬籍議獄非職也不聽㑹中書省檄命騎至湖廣江西兩省講畫嵗賦便宜經總之者不使人煩此句上下疑有脱誤至治元年拜監察御史上疏請開經筵選胄子救荒節用等事出按諸道至河南省劾行省叅知政事伊實巴勒丹黨惡賊善毒流吏民臺臣以聞裭其官仍逮繫責對内外快之以中書吏部員外郎召還二年復以朝列大夫僉燕南河北道肅政㢘訪司事論列十事卒以敦本尊化隆儒術為務且纂萃漢唐諫臣偉績名曰憲覽數百條並上之録大名廣平囚禁民有榜箠成盗者凡五人獄詞具矣州吏抱爰書引囚伏庭下請曰某囚有罪律當某刑君徐曰囚實非盗使囚果盗則口語與吏牘無異兹視吏牘皆牽合文深之辭囚何知此即脱囚械而出之浹日它州牒得真盗立致長吏于理滿二嵗召為中書禮部郎中以職分曹從扈北上國制乘輿嵗巡都其陪還侍儀衛文物聲名國容愈盛宗室諸貴必加宴豆鬼神祭祀必加數等故禮部分曹而北者尤叢沓難治君優游不急區别刄解名譽藉甚詔賜白金伍拾兩以褒賞之未幾遂卒于位得年五十有二夫人呼延氏子一人毅國子典籍始君出曲周輝州府君官衛地因留為胙城人旁古河渠水去故道及淤成沙日漫没人廬舍塚墓其嗣子毅承治命改卜新阡於衛之西南三十里小店之原君自仕多歴顯要視聲利為障蔽聰明之物中弗好之也然每悼士逐世化而亡其所學奮然欲有以激勵之不果也可謂有志者矣方予對策南宫時君再省曹手閲著令以試法已期其為令器而辱與游從同官京師交道益篤而比君死五日予以祀事出使悔不得執紼塟道而其孤毅泣涕襄京襄京一作衰麻拜而起曰先子之卒太常博士桞貫已誌其壙矣惟是墓道之碑願有以揭之遂為銘曰維景先甫早用儒顯績學之勤乃應時選充充惠和襮于裳冕羇孤養親行以不忝端矢射侯飲讓而升實羮大鉶陳諸廟庭才以備官政服孔宜問俗在途召節屢馳訏訏詒詒不亟不遲議禮考功有秩有儀從扈陪都卒為鬼徒反𦵏衛墟里人紼舁有膴者原沙泉在北刻諸樂石終古不泐征行百户劉君墓碣銘趙郡蘇天爵述其外大父劉君行實乞銘於馬祖常曰先妣武功郡君昔安樂時念其父不忘懼其善不傳而名遂泯泯也嘗以語天爵迨先妣棄世外大父終不得銘天爵蒙慈母之教誨粗有樹立於時圖所以繼親之志者天爵其可不勉祖常曰孰無親乎孝於親之身者尚矣矧又能思廣其親之志乎乃為之序而銘之序曰劉君諱成字立甫貌魁岸竒偉讀書涉大義不事章句嵗壬子國家初籍民屯田襄鄧間君與其兄俱在行中服勤穡事每代兄作勞田官稱之乆之從伐襄陽先登授百夫長常率數十騎畧武當宋邏兵四合屢突圍出皆不勝或欲降君殺馬為食居數日不降宋人疑其有誘各引去衆服其勇丞相巴延將大軍都鄂州江命别將阿爾哈雅率萬户張興祖軍分循湖廣地君復與其兄從破羅飛文才喻周隆黄必逹張虎諸軍薄静江兄中瘴毒死君扶其柩而北𦵏既襄事輒屏跡田野課僮種樹畜牧耕桑衣食以自給於湖南遇兵俘一儒生黎姓用金購之曰此儒生不善力役歸我我將俾為弟子師果同歸教諸子於鄉餘所全活者衆此儒生其一也享年八十有四以延祐三年正月十有二日卒𦵏真定縣平樂原先考萬户府君之兆考諱議起行伍元帥史天倪辟署權黑君萬户㑹賊將武仙殺元帥叛即從元帥弟丞相天澤擊走仙轉戰兩河平金有功妣夫人孟氏夫人董氏前君二十六年卒子二人曰寓曰海孫二人曰允中曰𢎞中女一人故中憲大夫領北行中書省左右司郎中蘇志道之夫人追封武功郡君今圭圭一作奎章閤授經郎天爵之母也女孫四人一適奉訓大夫萬盈倉使李恕一適張林一適侯誾其一㓜也世本歴城人金季山東河朔兵賊雜揉菹醢其民獨真定城完君之考因占籍焉而今為真定人者自其考始郎中蘇志道年少日君識其為令器以女歸之後其生天爵又以文學進其官于朝孝而能成母之志俾其外氏之官閥世次刻於金石者竟賴其力焉銘也無媿銘曰振振劉姓考室真定挺身兜鍪而官弗崇雖則弗崇勇也匪躬斬馬啖卒出金購士其謀則懿其恵則侈其迪其啟以多孫子女室命婦副筓封君出甥維彦日肆於文克表外氏纘茲勞功刻詩墓門維以亢宗監黄池稅務王君墓碣銘王君元父既没之十一年其子國史院編脩官沂茹哀請於馬視常曰子與予同登進士第又同官于朝先人生世以迄于卒其行誼無媿而生終齟齬以不合於時者子能知之其宜揭以傳後者子宜為文沂之述諸狀者子宜加詳焉按王氏出姫姓周畢公髙裔孫萬事晉更十世得列為諸侯滅於秦子孫徙雲中地今之𢎞州六世祖遼户部侍郎山甫始著於家牒子三人曰元郎宻州觀察判官生詡金左司員外郎以文學稱盖世閥逺矣曽祖諱鋭金尚書户部員外郎祖諱國綱金監察御史使河中總帥完顔仲德戰敗死節考諱振間闗轉徙占籍真定力學砥行起家至江南浙西道提刑按察司經歴配某氏有子三人長諱宗禮季諱宗議皆早世仲即君諱某㓜自知問學侍經歴君居浚都為士子經師尤長於詩謌試浚都文學掾辟江東道宣慰司令史㑹使專恣他吏恐諛弗敢仰視君每以義言之屬嵗潦饑羣無賴起繢溪盗欲相蔓民不輯寧宣慰司遣君覆視還請蠲徭役發廪以賙甿𨽻盗遂息進將仕郎宣城縣簿縣比嵗供玉面貍四十畢罘不獲則轉購他邑糜貲毒民君至請悉罷貢姦民有詭飛田賦者嵗取償里胥吏循格不究君一正其籍乃建孔子廟築壇崇社春秋飭其牲器以與邑人行事川有梁田有溝道有寓館吏徒有畏而弗肆民知有政而趨功監司郡守争為鼓譽江淛行省屬録寧國太平二郡囚又屬覈考江隂錢榖他州縣訟累嵗不决者多以屬君所至悉以以一作著能聲江隂盗有枉為脅訹者吏黨按之既誣服已君反覆得其情為具獄白行省事上中書移刑部刑部允君議遭脅訹者得免死南陵縣僧以貲雄持縣短長堰溪水溉私田霖潦水溢則漂沒崩蕩邑人訴於縣吏懼莫能施行君詣視毁之老㓜至撫手慰且曰君出一鄉免於魚鱉矣未幾擢拜江淛行中書省掾曹無留事適淛西㢘問官與君素同里少持氣不相下頗嫉君君又不自詘以希合乃風㫖豪梗羅織君以是坐誣免不辨起除瑞州平凖庫使不就改仁和鹽場司丞又不就家居數歲又改平江行用庫使州縣趣曰君所與游盡一時知名大夫士咸燭君寃而君終不自訟就使終不赴孰與君直乎忍是一往而毋變君素守以流於物將推歴君之迹當不誣矣寧無為君採於有司也君不獲已就官乆之自免歸階前資遷承事郎監黄池務税以至治三年五月十三日終于家享年六十有七以某年月日𦵏于某州某里之原娶把氏𨽻州判官時之女男三人登沂洙女一人適淛東㢘訪使侍其同朝之子通孫男二遷善崇善孫女二人皆㓜君甫冠即自立勤苦為文章履其身以莊儉亦未嘗過為機械其官業行已之略一皆自信不妄計進取少顧時人之所為而人亦以此稱之然亦以此嫉之至大間嘗為書言任人别邪正養民重守令法不可輕出期少施於朝廷而書不果上執政聞君名私使人致欵欲官之錢監君知不足以共事卒謝去後果敗而君益畜其學以老不克用鉅公聞人累薦君才宜理劇文學宜館職皆不報屏居錢唐詩書尊爼詠謌息偃泊然亡豪髮世俗慮撫育諸孤子姪誠愛天至而急人之窮奬人之善汲汲焉猶負宿諾而抱隠痛皆他人所難為而君為之不知為有德尤人之所難也其所著有政要書十二篇陶詩註三卷詩一卷嗚呼天興之變國土痝裂焚剽剪薙不百年而金之名家善士之子孫遺孑不數户矣初御史君以直節死人惜其未能大用於時夫固知經歴君之起王氏也經歴君位不配其德以殁於今凡幾年而承事君又斥不用君子悼曰不幸然孰知後世之將昌且乆與今沂以進士入官有古學方嚮於用而克濟其美於未艾豈其碩大光顯又將在茲歟是宜為銘銘所以勸後世之為善者不怠也銘曰冕勿媟也玉有玦也一擯不用有子晳也彪炳而文立其嵲也載善於銘行安轍也故禮部尚書馬公神道碑銘公諱烏呼訥世本屬永古特部居静州之天山天山古居延海也曽祖諱特穆爾伊克祖諱博索瑪伊埒蘇海以財雄邊父諱錫喇濟蘇當金遷浚都尚書省辟為譯字掾曹試開封判官改鳯翔兵馬判官死節贈鎮國上將軍桓州刺史官名有馬因以立氏父死節時公年甫十七壯其父之忠義奮而投冠于地誓曰吾父死於國難吾紓家難可也遂侍太夫人王氏間闗鋒鏑跋涉星夜出汴絶河而北見憲宗皇帝於和寧年少辭容端敬憲宗嘉賞之命贊布濟克斷事官事國朝天造之始總裁庶政悉由斷事官燕故城為斷事官治所中原乆刳兵燹民謳吟思見太平之日公力籌畫規度政脩事舉士悦民附胥為太和世祖皇帝以親王南伐公從行留汴餽饟六師悉發軵音兄人賦一石取濟南鹽自堰頭舟行陸輓數百萬斤散布軍所過州郡汴蔡河南之地農在野而商在途不恐不驚而軍政脩焉世祖皇帝即位降詔褒奬其詞有曰有此勤瘁深有可嘉尚云者阿勒坦據魚兒泊叛倉卒之際公罄家貲市馬五百匹進世祖皇帝嘗給券賜其家曰後當償汝也版户遂試學子通一經即不同編民今令甲儒免丁者公始之也中統建元既肇建諸部明年拜禮部尚書佩金虎符四年八月二十一日薨于上都之邸第訃聞内外文武之屬縉紳之士咸嗟悼䀌傷形諸文字之間迄今傳而不泯也嗚呼公之薨年甫四十有八即以某年某月日𦵏于大都宛平縣清水河之隂之原太夫人王氏墓後梁郡夫人白氏祔後六十四年為至順元年曽孫祖常辱官禮部尚書請于朝追號推忠宣力翊運功臣勲事輕車都尉階正議大夫爵梁郡侯官僉樞密院事諡忠懿于十有一人長諱世忠常平倉都轉運使次諱世昌行尚書省左右司郎中孫祖常官忝第二品推恩二代贈嘉議大夫吏部尚書上輕車都尉梁郡侯次諱世顯知通州事次世榮早卒無子次世靖不仕次世禄中山府織染提舉次世吉承公廕絳州判官次審温嘉議大夫歴台州淮安瑞州路總管餘三人早卒不仕女四人三蚤卒一嫁廣東道副都元帥克哷濟蘇孫二十人長諱潤朝列大夫同知漳州路以子祖常備侍御史贈中奉大夫河南江北等處行中書省叅知政事䕶軍梁郡公次節入王屋山為道士次禮下沙鹽司丞次淵不仕次開監在京倉次遺道皆蚤卒次遵通迪次保六賜提舉都成所次未名卒次岳難武備將軍蘭溪州逹嚕噶齊次雅克處士以孝聞次必齊勒奉訓大夫同知興國路事次扎實巴勒監富池茶場餘四人未仕曽孫三十一人長祖常由進士轉官侍御史次祖義郊祀法物庫使次祖烈汴梁等路管民總管府案牘官次天合監杭州鹽倉次祖孝管勾河垜鹽場次易朔南察院書吏次祖謙昭功萬户都總使府知事次祖元信州路教授次鹵合知行唐縣仕者九人餘者學而未官也𤣥孫若干人長武子中書省掾次文子國子生次獻子惠子並國子生餘皆㓜諸女孫以多載於家傳兹不重出嗚呼我曽祖尚書德足以利人而位不稱德才足以經邦而壽不享年世非出於中國而學問文獻過於鄒魯之士時方遇於草昧而贊襄制度則幾於承平俾其子孫百年之間革其舊俗而衣冠之傳實肇於我曽祖也嗚呼祖常生三十三嵗父潤南官漳州教祖常曰吾祖有德未盡發吾官州郡不得施今汝頗樹立其大將在汝也後祖常佩父訓不㤀忝官翰林直學士太子右贊善大夫禮部尚書叅議中書省事入臺進侍御史叨冒寵榮夙夜憂懼惟恐違父之教而墜我曽祖之業蒙不孝之罪死不瞑目於地下𦵏儀不具塋域不廣欲改而卜遷之宗盟曰封樹八十年矣神殆安兹未易改卜嗚呼祖常既摭我曽祖行實萬一而畧論次之矣忍不泣而終銘之銘曰有崛而起之孰趨而掎之將濟世美必承而履之懿矣我祖百年于茲衣冠之傳實維啟之世多王公亦多華靡惟不革俗而忽其圮繩繩孫子思馬有氏咸宜習禮以續廟祀勅賜御史中丞趙公先徳碑銘皇帝御史史一作奎章閣詔大學士臣阿榮魯干曰御史中丞臣世安事朕日乆克庸祗畏相彼世傳諒有啓迪之者其令臣祖常為文以刻於碑臣祖常北面受詔迺屬辭為碑之文以應詔曰皇帝將勸忠於天下俾人臣知善後之道兹千萬世慮匪私於臣世安也謹按中丞臣世安姓趙氏始居奉聖州之􅈨山四世祖柔當金季朔南淪胥為丘墟矣柔團結義民栅險以阨其兵衝使不得犯為便道以給薪水如平時鄉之人頼以全活者億萬計㑹天兵下紫荆口柔率義民歸行省巴札且以單騎入各堡砦諭逆順各堡砦豪長皆持兵來歸我行省行省以潤制授龍虎衛上將軍真定涿易等路兵馬都元帥佩金虎符兼總管銀冶再進總管諸處打捕鷹坊加金紫光禄大夫有子六人長守贇佩金符僉山北遼東道提刑按察司事仍總管大都保定打捕鷹坊次守忠信翊校尉廣宗縣尹人戴之如父母焉次守仁早卒不仕次守純官百夫長次守政權打捕鷹坊次治一學老子法有道提㸃汴之朝元宫以方外故不仕守贇二子長謙襲總管管打捕鷹坊次晟善治民作縣安喜鋤其武斷鄉曲者縣在畿甸上下稱之選為行監察御史再遷監察御史山東道亷訪副使燕南道亷訪使次年改翰林直學士遇公卿輒指言時事利病不休也守信二子長貫早卒次簡今洺水縣尹貫子世安迺今中丞君守純三子長鴻和官百夫長次齊哩克提領打捕鷹坊次舍哩而早卒守政二子長允昭信校尉保定路總管府判官次宻總管大都等處打捕鷹坊維趙氏以國姓世系綿逺譜牒無考北士尚質復不肯以姓之顯者為所出故奉聖趙氏自元帥以下遷于布瓊山之陽已而又宅於龍安今遂為易州淶水人淶水趙氏雖四世為郎官大夫然自中丞起家給事禁闥侍武宗皇帝冕服即蹈規矩言行有常事今上皇帝於潜邸勤勞夙夜夷險一心天厯之元皇帝入正大位徴拜叅議中書省事旋入中書叅知政事上讓位居東宫改詹事丞領典用監卿復入中書叅知政事領經筵事陞拜中書左丞入臺為御史中丞官資德大夫立侍正府以中丞兼侍正光顯榮遇在廷鮮倫而其折節下士盖有人所不能跂及者令典官第二品得封二代異恩特封三代焉曽祖柔追封天水郡公諡莊靖曾祖妣南氏追封天水郡夫人祖守信贈資徳大夫中書右丞上䕶軍追封天水郡君諡康惠祖妣李氏追封天水郡夫人父貫贈榮禄大夫大司徒柱國追封魏國公諡貞憲母劉氏追封魏國夫人臣嘗讀古書歴徴紀載年表列傳臣之事君多矣其際㑹者不一或以戰勲或以民庸或以文章或以勤勞或奮於功名以垂於簡牘夸者謂國以身致亦無有不奕世載徳爵位不大以藴蓄芘䕃於後昆者也古則逺矣臣又幸得備從官聞世祖養徳王藩時則有若姚樞趙璧仁廟則有若李孟斯亦雲從龍而風從虎矣其濬源豈無自哉要知必本於仁而其傳自逺矣傳曰活千人者有後元帥生逢末世手搏鬭諸盗以完黔首者衆矣奚啻千人哉則其後碩大昌熾遭遇聖明以成其名以顯其親者揆之于天道何疑焉中丞今一子曰享提㸃大府監内蔵庫臣祖常辱列侍御史每從中丞在官日中丞論議持平臧否於疾言遽色弗之有也詔既命臣為文臣敢舞蹈百拜而獻銘曰有趙之裔北遷於南涞水永宗元帥多勇赫赫元帥叱咤風霆栅木疊石保有萬丁鬭賊于原完我耄倪自頂及踵膚無一疵豈惟無疵又無凍飢便其薪蒸食飲以時活人萬億歸我行省天子曰嘻予大肆眚凡厥逋逃悉来奠居申命元帥金紫懸魚有善有慶其美于𦙍分憲尹民咸樹官政廣宗之郊土瘠而磽膏以糞饒衆桑咸苞民樂趨事戴以父母迄今有歌興於田畆安喜繼武實為弟昆鑠其頑礦使民不寃司徒魏公隠徳于躬鍾善集厚全天而終發祥中丞事我皇帝兢兢翼翼夷險不二皇帝曰咨咨爾臣同我篤爾先維以勸忠移孝于忠培植基本爾臣銘之告于公衮勅賜大司徒蘓國忠簡公神道碑公世出朔北屬輝和爾部小字孟古徳濟初公父多喇珠從髙昌國王内附當我定宗憲宗之時以未用中夏之字多喇珠始用其國記畫言語為札書習諸部人世皇在潜邸亦頗講於其學多喇珠既卒迺勅使者召公朔北公至上手公入便殿謂昭睿順聖皇后曰是兒㓜貌偉絶肖其父宜出入屬侍間朕不忘多喇珠也乆之以能世父業命以其書職教内諸御出宫人呼圗克華妻之至元十年特命公提㸃資成庫階奉訓大夫主尚方幄殿伏宿屋令十五年詔改資成庫為尚用監拜公太監階中順大夫十九年遷太府太監二十五年又改尚用曰中尚仍拜公太監進大中大夫未幾遷中尚卿階嘉議大夫尋命兼知太府監事階通議大夫成宗在位恩顧舊臣以公乆勤事特授正奉大夫進秩二品時上省方陪都嘗清暑西華門見公第庳隘屏飾不稱遣近侍諭公曰朕固知爾能守貧然家茍不給當朕言毋諱公謝曰臣材亡可録者被先朝恩冒有俸稍廪既以給衣食乗堅䇿肥若疇人子姪非不有所欲顧以無能不能浮竊厚貤爾上聞益賢之武宗至大元年詔陞中尚監為中尚院就拜公中尚院使三月拜大司徒進階榮禄大夫從一品秩公以位大固辭不許仁宗奉昭憲元聖太后入平難召公計宜隆福宫公從容傳曰傳曰一作籌對多援祖宗訓實及制事統御之變其語罕泄不傳皇慶元年仁宗即位復拜公中尚卿每給事直宫對上必懇陳治要與國政在顯位無益於民者指切言之上亦以公宿貴有徳者多味公言勅中書賜以楮幣萬緡公又謝曰臣自以為置肝腦不足酧上徳日兢兢不敢有墜言汙履以孤累聖之眷故常有狗馬之心今病力不能任服事寧幸財於無功耶上固勉之終不受其年十一月二十六日一疾薨於昭回坊之賜第壽七十有六初𦵏順州第四鄉發信村之原元統元年四月公第五子監察御史塔納始買地於大興縣燕臺鄉艾村原作為塋垣樹列翁仲石儀舉公及夫人之柩𦵏焉於是臺臣以聞有詔贈公銀青榮禄大夫太保上柱國追封薊國公諡忠簡夫人呼圖克華贈薊國夫人仍命具公行壽壽一作治善勞世族官治治一作階樹文於碑刻之神道以假寵公之五子塔納以監察御史某之狀以請臣論次其言曰我國家肇奮朔土車輿廬帳冠帶䘮䘮一作裘服以旦暮從事於四方有攻伐之具有守禦之備軛牛軺馬必物其足力毳革筋木束輳之器必權其功砦功砦一作工窳櫛比協材必皆良而後用故國初即設官以典馬盖一代之制不比於衛尉太僕乘黄守宫令供億於祭享㑹朝幸畋而已公以朔北聞族受知世祖自少以至於老曰資成曰尚用曰中尚未嘗一歳去他官而尤悉力以勤其事不以乆而不足狃也其知者此乎夫在位者數徙則不得乆其官官非乆則無以習而知其事故下無所馴以安其治其弊賢者不能以及於功不肖者罪不積於著而天下之不底於理其不由是歟臣觀公之乆於其任任之之專而得世祖任官之意焉雖然在位者非其人而恃乆以為治亦小有能治者也又觀公之善於其職與其亷取辭榮而得公之為人焉信公之言以質公之行則其賢逺哉是不可使無銘也已公有子十人曰莽賚忠翊校尉監重慶路瀘州曰巴扎布哈亞中大夫監安豐路致仕曰托和齊奉議大夫監南陽府裕州曰逹勒達武徳將軍監汝寧府光州曰塔納奉直大夫監察御史曰圖烈布哈曰太平曰竒凌布哈未仕曰圖卜布哈曰齊逹勒布哈曰竒爾薩皆夭女一人為監薊州名上都之妻孫男十四人曰托果斯中奉火夫湖南道宣慰使曰托克托忠翊校尉同知宿州事曰和托曰呼圖克布哈曰多喇布哈曰布爾罕和琳曰萬僧努曰華善曰竒徹格曰雅克特穆爾曰圖卜沁曰博索瑪曰班珠爾曰孟克特穆爾俱未仕曽孫七人班第承事郎昭蘇營繕司大使曰華善曰僧格曰繅察曰克斯曰觀音努曰富森俱㓜嗚呼公既顯榮壽考以終其身距今甫二十四年而後嗣之蕃衍盛昌若此塔納又能修敏質勤以名其官方嚮用未極非其力勞而報約之徴耶古所謂淑人君子者公於是可以當之矣臣攝官御史中丞塔納在察院故於其請奉詔不敢辭乃再拜稽首為系之銘曰位囏而勩世不必久也公不以久而績益懋也寵貤而豐人窶斯受也公不以窶而亷自厚也夫惟其賢宜有夀也既碩既延公多後也燕臺北鄉墓焉公藏奚改于卜龜食惟祥曰貴與財孰顧靡懐貴驕財悖式貽身哀維公則否維志之求敢告𦙍續諟公之休霸州長和實拉賽音遺愛碑霸州逹嚕噶齊于闐和實拉賽音去官之明年州人列其事狀將勒諸石太史氏按事狀而為論次之曰始州有惡子房黑厮籍屬縣益津諸田五百頃上於㑹福院者㑹福以禱祠為官不急民事即遣屬人按圗制民田前官悉不敢向問而君迺告於太府請于禮部竟歸其田於民十七户武斷里閈冐占征戍軍士名籍不應役前有司莫之省也君詗得之咸各俯首不出一語以服事編伍州在甸服百里藁秸之入官嵗以鹺償之比官鹺至集民於州而口給之君均以法人皆便之州雜五方之俗庠序之教不興君帥子弟以學而民知愧耻而逺罪凡若此者不一至於税税一作捐稍廪而食餓者禦田獵以勸耕者梁津表道封植遂宜合社祀神雨暘時若是以知古之循吏之跡傳於載記者尤盡可信也夫古之循吏視今為無難者盖嘗指以語諸人矣國家官制率以國人居班簿首州縣則又仍國初官各置建逹嚕噶齊員並守令丞佐連位坐署閧然言語氣俗不相通大或恣睚壓僚吏小或囓螯螯一作螫單弱使者劾治則稱謂氏族貴重人人皆假貸不繩細㣲㢘慎之節彼亦往往甘心焉而欲效古之循吏能専志於治者寡矣君能不牽於時俗而且有所振起可謂賢也矣如此則國之職纂録者可不為之書以訓於當世焉故顯妣梁郡夫人楊氏墓誌銘故曽祖皇贈推忠宣力翊運功臣禮部尚書諱烏呼訥以中統四年薨薨之曰有子十一人自第五子以上皆冠而婚餘六子㓜稚曽祖妣梁郡夫人白氏又先卒諸子以家素貴長者履跡未嘗一至田野㓜者弱而母庶不能悉産業財畜之數豪奴婢因舞弄欺詐百物一空里第為奸臣阿哈瑪特横奪家遂陵替祖皇贈吏部尚書諱世昌實禮部府君第二子生子三人長諱潤皇贈中奉大夫行中書省叅知政事甫十嵗遭家難寄食東西少長自知學問試吏大都路喜得廪稍逮養不耻也時吏部府君屬寢疾祖妣梁郡張夫人曰脱不諱則家無冢婦孰與治賔祭迺以禮迎夫人歸我先公叅政府君焉夫人既歸吏部府君疾日益愈先公且置補荆湖宣慰司令史佐畫夔府之師名聲騰揚轉吉州路經歴滿嵗丁吏部憂先公發廬陵遵陸北上夫人携其嬰孩舟行至廣陵僦居以俟先公之後命先公留京師𦵏吏部而侍太夫人親黨就食廣陵者衆祖常兄弟方求哺未知事夫人始則賣粧具簮環衣袂不繼則晝夜紡績刺綉給養不匱服除先公調兩淮轉運鹽使司經歴再調監太平州當塗縣而夫人以至元二十四年六月三十日卒享年三十二故中書后司郎中楊琰之女琰母馬氏與我曽祖尚書為女兄世實姻家有子三人長未名卒次祖常始九嵗次祖義四嵗一女五嵗先公官未受代權窆於當塗之文昌宫東南六十步後四十七年為至順四年子祖常始克遷祔於光州平原鄉先公桐鄉阡之兆嗚呼祖常不孝罪戾無贖天降鞠㓙夙集于身致吾慈母年不登壽而罹罪不淑祖常方在齠齓哭又不能盡哀迄今言之若利刄之刺心也追痛罔極殁身而後已雖身殁而又何及耶祖常延祐泰定至順三請于朝初封開封郡君進封開封郡夫人再進封梁郡夫人孫十人長武子中書省掾次文子獻子並國子生餘未名曽孫男一人古爾古曽孫女四人維顯妣夫人德配先考孝事舅姑睦親姻而撫庶孽慈仁貞懿婦道純全使世有職彤管脩女史者吾顯妣當昭章居篇首焉憶夫人病將棘時祖常孑然立床第前忽涕唾夫人已不能言頋指祖常唾迹泣下而逝嗚呼祖常尚忍書之耶尚忍而不書耶忍而書其又能文耶迺泣血為銘銘曰璧有時而燬土有時而為坎為壝嗚呼我妣天徳純美宜受多祉而不期頥使我孤子禄弗逮餋哀於身殁而後已耶石田文集卷十三
