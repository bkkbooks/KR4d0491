body:
  text: 附録桐鄉阡碑虞集故贈某官封馬公某以大徳五年守光州有惠政後官閩中以皇慶二年卒囑家人曰光吾桐鄉也我死必塟諸其子祖常奉䘮北歸至于光葬焉表之曰桐鄉阡云某與祖常嘗在太史故屬某識之按公家世歴官行事月日已具神道碑此獨著其係光者以示光之人焉初金人侵宋江南宋踰淮設闗塞列保障而金之窺光者自陳州出宛丘新息坦途千里無天險可恃故光之不得寧居者垂二百年毎兵至郡豪輒率其衆走保金剛山須事定然後敢出是以國家既盡有宋地且七八年始知出降而光得以成州然畊者不足周其土來占田籍者皆四方之人也仁人君子固亦䀌然重有感于斯已夫方是時公以有為之才撫新集之衆甫及三年而自信夫千古之託豈偶然哉惜乎舉措之徴有不獲盡知者矣獨聞在郡時有請嵗税光畝出粟十萬者公力持之卒不征光人掇茶山中以為次一作資運司行茶法江南嵗有吏索光人脅重賄山谷之民尤病公卒懲之使不敢復至乃立學官而躬教之謂司馬公實生是邦象而奉祠示之徳行規以革其頑鄙若此者光人之所以思公而公亦以自信者與昔人之所謂桐鄉者良由是噫計公之去光而歸葬至于今乆矣昔為公明者少者壮而壮者老矣父兄長者亦有以詔其昆弟子孫已乎今天下日已治平光為内地取賦有恒制民生無與乎外事地力完而生物敏資用給足然道非賔旅所通出無車馬貨財之交無所耗乎華靡民之易治益愈於昔國家法令脩明擇吏謹審代公而治者其蹟可𢾗也鬱乎兹阡豈直係光人之思哉理吾光者可以有所覽觀矣馬氏本西北貴族由兵馬死事號曰馬氏而光之有馬氏自公始祖常進士髙第為代聞人諸弟若子相繼以文學入官來者未可量也故特著之以俟夫考世徴徳者是亦光人之志也故資徳大夫御史中丞贈攄忠宣憲協正功臣河南行省右丞上䕶軍魏郡馬文貞公神道碑銘并序至正七年七月丁丑集賢侍講學士通奉大夫兼國子祭酒臣天爵言故資徳大夫御史中丞贈攄忠宣憲協正功臣河南行省右丞上䕶軍追封魏郡公諡文貞馬祖常早擢髙弟歴踐要途始終五朝有文有政宜賜碑記徳庸示報功集賢院以聞制可命臣有壬為文臣𤣥為書臣起巖篆其額三人皆文貞公同年進士而有壬託知尤厚始以學士被命繼冒承㫖皆職紀述其敢辭公字伯庸世永古特部居靜州天山有竒爾濟蘇者髙祖也金季為鳯翔兵馬判官死節贈桓州刺史廟賜褒忠子孫因官以馬為氏曽祖烏呼訥從世皇征宋留汴掌饋饟累官禮部尚書贈推忠宣力翊運功臣僉樞宻院事諡忠懿祖世昌行尚書省左右司郎中贈加議大夫吏部尚書父潤朝列大夫同知漳洲路緫管府事贈中奉大夫河南行省參知政事追封梁郡公妣楊氏追封梁郡夫人梁公官浮光因家焉公七嵗知學得錢即以市書十嵗見燭攲燒屋解衣沃水滅之人嘆其異蜀儒張公􅓄講經儀真公未冠質以疑義數十張公竒之科舉詔下鄉㑹試皆第一廷試第二葢以國人冠也授應奉翰林文字承事郎同知制誥兼國史院編脩官拜監察御史仁皇久正宸極猶居東宫近侍利燕飲得請公抗言當御正衙立朝儀御史執簡太史執筆雖有懐姦利已乞官賞者亦不敢出諸口承天地祖宗之重當極調攝至於酒醴近侍進御當思一獻百拜之義英宗為皇太子請慎簡師傅下至臣僕亦宜精擇時大姦當國公首知其盗觀國史洎同列疏其十罪仁廟震怒罷之黨與之布要地者皆論列出之端人昔與牴牾而擯斥者請拔用之泰州山移公言山不動之物而今動之豈在野有當用不用之賢在官有當言不言之佞大臣皆家居待罪薦賢拔滯知無不言改宣政院經歴月餘辭歸起為社稷署令罷雜事于泉南大姦復相左遷開平縣尹欲中傷之退居浮光大姦死除翰林待制泰定建儲擢典寳少監太子左賛善尋兼翰林直學士成均釋奠陳太子視學之禮内出禮幣命公助祭除禮部尚書祖母張夫人卒䕶䘮歸起為右賛善復禮部尋辭歸天厯初再使召為燕王内尉仍入禮部兩知貢舉一為讀卷官時號得人參議中書省事參定親郊典儀充讀祝冊官禮成賚金幣拜治書侍御史賜犀帶及御書奎章閣記内庭宴服七襲金玉腰帶各一改徽政副使拜南臺中丞今上即位召議新政賚白金為兩二百楮幣為貫萬金織綺為端四改同知徽政院事拜御史中丞以公疾特免朝禮命光禄日給上尊知經筵進説必陳經史大義叅以祖宗故實持憲務存大體西臺御史劾其僚禁酤時面有酒色以苛細黜之山東憲以孔氏訟聞以事闗名教不行按者亦引去司憲有以貪墨敗沒入其田廬請歸曲阜林廟從之拜樞宻副使居無幾辭歸復南臺中丞遷西臺疾不赴積階自承事郎至資徳大夫至元四年三月丙午薨于光州之第得年六十是年四月壬申葬州北平原鄉西樊里有司以聞有令贈諡配索氏封梁郡夫人子男二武子承事郎湖廣行省檢校官文子徴事郎秘書監著作郎孫男三女二公言事剴切嘗建國人暨諸部既誦周孔書當尊諸母以厚彛倫兵家子驕脆有孤任使庶人挽强蹶張老死草野當建武學武舉儲材以備非常時雖不用識者韙之至於論刑一本哀矜嘗言死罪遇赦且原減死流徙未蒙殊渥當驗情遇恩内徙漢人滿百執弓矢獵者不及百者流條格已有禁弓矢聚衆之條又復為此是錯綜綱羅之誠恐愚民舉足蹈罪至論建徳民妻之不首夫死者則當以必死其得用法之意乎國家涵濡百年譽髦斯士公先世已事華學至公始大以肆為文精核務去陳言師先秦兩漢尤致力於詩凌礫古作大篇短章無不可傳者與修英廟實錄譯潤皇圖大訓承華事畧編集列后金鎰千秋記若干卷至順間龍虎臺應制賦詩有玉食之賜甞進擬稿為之嘆曰孰謂中原無碩儒乎文集若干卷臺檄刻之揚州郡庠仁皇始行貢舉國人而下列為四色國人洎諸部為右榜試目視左榜差優公雖右榜左列及之者指未易屈焉且其為學初不為貢舉也以挺特之資丁大明之㑹褎為舉首馴至達官威重足以鎮薄俗文章足以追古作議論足以正風教設科得士不得不以延祐之初為盛也不幸壽僅六十未究其用悲夫銘曰元大一統六合同風南臺北萊芃生其中部族有儒文貞伊始文貞之世翼翼廟祀後承聿修講學諸夏延并至公有大無摦嶄然異禀㓜不事弄濡衣撲燎智劇碎甕益習以進益混以澣不溺于流而登于岸先秦兩漢華咀實擷天籟泠厲石湍激洌天子有詔乃興乃賔實三其魁一推國人甫試館職倐峩豸冠以爾枘鑿安我考槃遐心浮雲束帛空谷春坊翊賛經筵啟沃皇格于天公司其度俊造鑑衡風紀砥柱龎恩異數川委充溢云胡修途六十而抳既易其名亦大其封于光之原賜碑崇崇賜碑崇崇於赫厥銘同年之紀考信匪譝惟爾部族文貞有躅叙倫敦典益介戬榖石田山房記桐栢之水發為淮東行五百里合溮潢山谷諸流左盤右紆環繞山麓其南有州曰光平衍而萆茂民勤而俗樸故贈都尉開封郡伯浚儀馬公實嘗監焉公之子祖常少賤而服田於野以給饘粥鄉之人思慕郡伯之政念其子之能勞而將去也乃為之卜里中地亟其乗屋而俾就家屋之側有崇丘可六七丈溪水旁折而出岸碕之上嘉樹苞竹薈蔚蔽虧前為木梁縁溪而行周垣悉編菅葦門屋覆之以茨嵗時里隣酒食徃來牛種田器更相貰貸寒冬不耕其父老各率子若孫持書笈來問孝經論語孔子之説其耕之土雖磽瘠寡殖不如江湖之沃饒然猶愈于無業也祖常者因樂而居焉于是名其屋曰石田山房且自為記與圖以屬當世能言之士請為賦詩異日使淮南人歌之石田文集附録
