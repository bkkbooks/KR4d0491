body:
  text: 石田文集卷一元馬祖常撰五言古詩都門一百韻用韓文公會合聫句詩韻詩中有三字非元韻蓋祖常荒學不能用古韻故也延祐五年八月作返躬操耒耜奉身寡帷幕田居水舂磑城宿霜鳴柝凝塵尚沉冥幽賞任飄泊行歌鮮同歡起舞真獨作嘯詠氣頗雄攀躋力或弱樛木植幢蔭醜石掀獸惡心恥婦女仁志薄遊俠諾校書揚雄官入粟卜式爵娛情愜禽弄失意被蜂蠚佩履侍殿陛觚牘宴館閣傭童飼棧駒賤婢占屋鵲上書願封禪監祠議嘗礿紅瓔綴花房碧刺罥藂薄春旗天仗浮秋駕星河涸補衮子何能懷祿我所怍英名襲蓮炬貴籍謝魚鑰造謁每赧然循默譬沃若壁蝸涎篆攲穴蟻戰壘却組繡紅縷連罨畫翠色著卿雲羃邑屋瑞雪塗郛郭羣儒修麟經諸將宣豹略請劔斬樓蘭傳檄喻邛筰賈區紫貝粲酒壚銀甕鑠潑刺鱠翻砧郭索蟹就縛水戲鬭魚龍山搜獻熊玃奇服燕姬姹獠語滇童愕東郊買鬭雞西市賣馴鶴宛宛緑項鳳濯濯紅頭雀豪僧佛宗開大巫鬼物託迎祥有時和驅厲無旱虐漕粟大庾盈賦秸崇廥錯圈虎割肉喂鞲鷹搏禽嚼荔丹貢甌閩橘顆包沔鄂能賦皆鄒枚飛翰盡盧駱未央曲罘罳長楊匝羽繳間棋笑遇仙雜劇坐忘瘧佽飛頭虎毛刑官面瓜削朝儀徵魯生廟獻賔商恪天池漾文波海島通潛壑婦功春蠶溢穡事秋田穫器美鏤桐梓冶良鑄錢鎛街樾布虛隂觀闕翔寥廓治廷播訓敕清邉禁摽掠窮髮炙駝蹄勾麗醢熊腳詰姦鉏大猾恤隱發深瘼靈圃白獸遊禁籞黃鵠落時方追治古事乃繼疇昨巢橧尚羊裘蓽門仍葦箔周封表鎮望禹畫首河洛聲名惜馬纓音律辨牛鐸郎署紆銀艾王邸施丹雘轍浚千車馳塵坌萬馬躍碣石入渤澥太行分嶺崿士女工鞶絲王孫帶河槖清明日月懸統正宇宙拓分行下觀風立聽上宣噩服官綺纚屬虞衡鞹旁魄腒䐹販澤國乳湩給沙漠木禾神所食石蜜刀乃斫天樞夾杓垣日畿絡雄莫鼎豈以金鑄山豈以銅鑿戴憑席重重周舍言諤諤錫宴屬在鎬咸秋亟祠霍造邦象邰室立法簡漢約吾生類鳬鷖賤迹雜兔狢囊書爛星芒匣劍瑩霜鍔雨耕稗頻耨月斸石或搏尋真養三芝求方問五藥傳奇存山經輿地指井絡悠悠秋剪菘晏晏春食藿親歡戲假面客至樂吹籥恃才頗優遊使酒漸諧謔山深木敷榮野迥鶴寂寞擔簦踏槐黃疊袂聫棣萼移官居旗常職領専錞鑮遮塵帽頂席隨俗屋蓋篛俸錢具菹醢飲餕嘗膋臄孤危衆易傾獨立古難卓徒跣防毒蛇空拳困狂㹱出敝季子裘入舍居士屩海運知化鵾泥蟠見屈蠖門髙譽荀龍才逸薦禰鶚逍遙投壺歌慷慨擲骰噱有興即騎行無疑豈龜灼俎豆觀揖讓賔介講獻酢風櫺李涵冰日幌櫻裛酪鄰飢馬通㸑市醉羊屠醵耘德釤礪刃稱藝弩引彍任情受世疵肆志探古博奏賦始中程諫獵終失度不念嫠恤緯已謂童舞勺寢興避彈射周折凖規彠襆被丘中琴揚舲池上酌桐孫迸空枝竹稚穿石籜南翁日種漆北地日産柞蓄厚用不躓材衆工豈格甘泉祠猶清西河居乃索菁莪採衢謡湛露興徒咢帝仁載大輿臣詩埒微爝史官詳纂記儲以􅀈甕粕壯遊八十韻十五讀古文二十舞劒器馳獵溱洧間已有丈夫氣裹糧上嵩髙靈奇發天祕曄曄三秀芝為我擢粲翠空青丹銀品伏龜鏤文貝駢羅星辰精附麗日月會紫鳳友朱鷺翩翩劇翔戲飛閣舒鳥翼懸泉瀉珠琲磨崖見古刻應是列仙記捫蘿欲登觀苔滑阻凌厲煙霞薈蔚隮霧雨蕭颯至余時戴籜冠緑壁照縞袂檀欒有磐石真人每同憩北臨黃河水濁流觸天沸蛟龍逐黿鼉鱗介滿水裔衝波崩金堤萬夫廢穡事官家憂其勞玉馬嵗沉祭江淮畫鷁船夜上歌嘒嘒魚鹽不直錢寡婦豈拾穗釀酒相呼飲顛倒再拜跪中心忘嗔訶縱談詆漢魏三十能歌詩鄙薄雕蟲技不肯學仕宦慷慨負髙義持錢送酒家觴至即一醉羮芼嶰谷筍飯煮山陽穄峨冠擬魯儒短衣真楚製逺行探禹穴六月剖丹荔巫峽與洞庭倣佛蒼梧帝三吳震澤區幼婦蛾眉細唱歌攪人心不可久留滯沿淮達汶泗摩挲泰山礪聖鄉有亡書求道亦容易童子操觚牘價重麒麟罽京國天下雄豪英盡一世舞羽肅文教櫜甲飾武備馬迹見騰塵車轍聞戞轊翬鶱天觀起鱗雜井屋綴千畝開靈潢馴象浴其汭我皇拓文場羣髦咸戰藝洎豫黔婁生言辭罔飾繪但幸朝董死收拾在等第臚傳下閶闔恩澤承滂沛春雲覆林塘雜花懸火齊詞垣正舒華吹竽獨無喙執筆御史府羞縮如牡蠣彈評則春秋齟齬失剞劂問俗西夏國馹過流沙地馬囓苜蓿根人衣駱駝毳雞鳴麥酒熟木柈薦乾薺浮圖天竺學焚尸取舍利安定昆戎居貪鄙何足貴返途歷邠岐原田表古畷宛宛陶穴民艱難謀樹藝驪山葬秦魄茂陵迷漢竁黍離悲故宫修竹編清渭日入狐狸驕天隂螮蝀翳溫泉山津陽古瓦識唐字關河隔山東華嶽秋更霽首陽餓夫薇霜露已憔悴鑄牛挽浮梁恍惚水所噬晉俗棗齒黃冀馬電蛇駛井陘厄坤維太行逼象緯煌煌日圍近赫赫天人瑞田舍植汶篁郵亭擷吳桂優遊逢化國俯仰詠樂嵗豈用百二險自乃十一稅北都上時巡扈蹕浮雲騎宴鎬帳殿移拜洛周廬衛嵓空山櫻繁川曲紅藥膩列障敕勒塞萬里靜烽燧九節菖蒲良貢篚充藥餌疇昔閉户居耽讀未見試三年不窺園自謂五經笥四十得俸祿僅可給美饎誰能薄淮陽不作鴻臚寺簡書畏懷歸弧矢示初志振鷺方擢質冥鴻忽垂翅感嘆對囊螢興言友荷蕢諒非廊廟具頗異市井輩當曳鄒陽裾願擁文侯篲贈客疊巘擢薈蔚繁英粲紛葩銀繭霞已積翠幢柏方遮劇飲肆豪縱清談宴賔嘉叫嘯虎當嵓趨蹌鶴行沙聫娥聘趙女貫珠唱吳娃露庭泛蘭藂風閨透窗紗魚泳文波圓禽翔矞雲斜逸樂諧金石清真况煙霞洗藥秋汲澗種秫春燒畬寓言託莊列潛心著羲媧所貴丘園賁終然心匪遐挽林彥栗秀才女蘿附髙松榮華凌衆草猗蘭困蕭艾顔色亦自好歎彼谷中人絲絇被纎縞生世固不諧埋銘宜有考舟中望鄒嶧山魯雲偃車蓋汶水流魚鱗操舟返任濟川梁號通津東望鄒嶧山六丁鑿嶙峋靈嵓溜泉乳仙遊道霞軿石髓若可食吾將託兹身西方濼魯郊秋已深西濼多蒲魚日暮積靄重維舟月生初露涼水禽宿雨晴艷芙蕖擷花結楚佩宛若湘南居又東平西郭外船尾到籬根共歎原田沒兼愁邑屋翻秋寒雲亦雨天晚日初暄野市飢無米流離惜子孫讀陶潛詩伯夷恥粟餓屈原避讒死獨有柴桑翁一不失張弛所以百世下風流激頽靡遐觀八極表浮榮何足數送袁伯長歸浙東三首龍角不如犀常不生馬廄麟趾不如牛終當在君囿我行泰山阿日觀望朝候見子被雲服家居夾靈鷲揖之不得近跂慕塵光後玄圗詳鳥官丹經譜黃銀羲媧鑿崆洞羅列大法陳蔚矣夫子胸如天懸星辰英聲發為辭商盤襲周豳王官豈不衆虛席需儒臣安車行有召無弄越水春雞鳴戒僕御具食起就塗僅取資給周豈謂車騎都行過青齊野忍見人逃逋翁姑纍帶索跟脛無完膚即欲與盤飱但可飽一夫遲遲去國旌能得不疾驅貢待制文修撰王都司同賦牡丹分得色字名都擅穠華竒葩紛翕赩頰暈紅粉艷囊垂桂蠧蝕初凝沆瀣氷漸展蒲萄織仙綬曳雙環么鳯盤六翼粲粲春奩瑩皛皛風燈直可憐昭容袖縹眇見顔色齋宿太社署五首朱門屹南起金水經北流繚垣外旁達周屋內廣修圭玉承繅藉碧鏤飾衣篝中壇土五色夏松露浮浮改容事明神豈謂茲淹留明世容謭薄依光秩散署束帶揖上官攝衣奉神御泉冽器每滌芻香牲亦茹循壇習登降趨位就表著翼翼清祀修濟濟百辟助願神錫茂祉農功相蕃庶賤臣捐俸稍牽犢耕雞曙元宰職天工太史繹帝載庶官服攸司同寅承聖代赫奕旗常華議禮出藻繪齋宫熏沐居衣裳步鳴珮鞭榜吏牘急投足有彈劾乃知容臺貴終日俎豆內齋宫蔚清華前榮畫方壺古礎石芙蓉日景射銅鋪嘉木蔭長夏階草宜露濡兵衛限囂雜簷網懸蜘蛛署書督粢盛設吏視茅苴端居見博士希武循庭除樂工奏宫懸登歌布濩功祠官侍奠瘞靈軿下玄穹祝辭求善嵗侑我稑與穜稑穜及人飢報祀百禮隆瑣瑣大社令樂職朝上公古意秋羅畫雙蝶涼綀透紅綃攀紆翠襞積騰拏鳯盤翹公子髙宴集水閣芙蓉搖來禽丹砂紅石蜜春氷消歡情光景洽壯意風雲飄所期國士知豈謂虞人招苦寒五首肅肅嵗已宴冽冽氷霰集寒雲光不流稿木鳴日夕挾纊處南户嚴稜坐相襲端然成離居企念稚陽復褰裳居重户驚飈蹈書帷穴地篝石火持酒得氷澌杲杲日出光萬物待被施豈無陽和節嵗序非爾私納履非遄征墐户豈寡交今茲祁寒候火井凝氷泡離人歎無衣原獸淫弓弰憂端坐耿耿雞鳴動嘐嘐南户日頗暄居獨意亦適觀物契妙道含情想真識靜囂理雖殊造定趣乃一古人不可求茲焉寄遊息日精赫重光午景延冬暄真見煦物功始覺陽道尊玄冥斂時肅衣被元氣溫鼻端有消息守此觀化原報春堂青陽布仁德萬品含景滋人道貴有報天施終匪私遲遲春暉和寸草為生資聊觀孟氏咏載考生民詩古詩三首繾綣憂腸興觴至不能釂髙飈揚塵沙倏倐滿户竅冠履對孔經蠅亦集堂窔淹留藉君子相與一晤嘯弱馬不可御復爾路阻修石子頭犖確馬足無所投馬足無所投顛隮臨道周何能乘黃鵠四海一日逰凌晨視園蔬緑色承露英命婦自採摘終朝掬不盈持以充庖厨豈療飢腸鳴婆娑秋菘葉不受魚肉腥朝暾煦寒畦中心含素馨淵明始末圗畫史謝文字託意有粉繪髙人蹈古道終造玄淡會涉世情豈真採菊心若寄持酒每自慰翁也得奇計載觀始末圖悠悠似相契録囚太興府公廳書事寒泉汲露井氷盤薦丹果晝永榴火繁風微筠粉墮雖欣景清麗復厭事藂瑣階庭列羣吏敲撲狴犴夥折獄乏才辨傷民困袒裸初余居田畝銚鎛每親荷幽賞偕夙昔文字當宴坐諷詠弄毫素射獵削箭笴江介觀海濤河外陟嵩嶞訪隱同壷觴問道辨介裸今也行作吏冠帶苦包裹翹首望南雲歸心逐東舸擬古崇臺拂繁雲阿閣蔭廣路上有彈琴女文采被煙霧玉食薦翠盤渴飲瑤草露鄙薄貧士妻終嵗弄機杼春寒二首叶風應青陽羲御南其輈生榮兆植物民氣趨和柔三農興嵗功銚鎛日以修云胡司寒神正月行斂收獵獵驚飈來壯士晝索裘氷梁阻沃溉龜拆橫大疇穡事忽愆時誰與飢餓謀得見吹律衍吾將迎道周嵗律啓璇室天家授人時嘉生達勾萌厚德宣靈祇玄功既旁被吾人亦咸宜曩在閉關日商旅車不脂瑟縮謹蓋藏宛宛如蚌龜茲遇孟陬月遲日載景熹眷酒續古意遊子求履綦豈恱草木華所貴陽道施陽道一以施衆美俱無疵春雲髙雲起城闕流離度庭樹依風拂回塘波纈光影注荒林帶疏煙照日亂縈縷婉孌連浮陽空眀映凄霧嵐翠含玉暉景采滿嵓嶼逍遙幽賞諧緬邈世娛阻送衛大隱卜者飲馬蘆溝河水寒傷馬骨牧羊居庸關草短餓羊腹君行苦匆匆我且無握粟陟岡望髙雲東南有黃鵠送幼度御史南遊辭官亦有道諧世亦有窮君子尚髙義賤物不賤躬含情適夷曠潛心入玄中弓旌或南出求子江水東田間中田蒔柔桑周垣列菀栁居然成農耕林廬頗完好朋從時往過林頭出尊酒意氣每酣適仰視北有斗豈知念湘纍那復嘆嗟一作尼叟丈夫貴立志文字託永久賦海月送彭君教授九江江月照人近海月涵太清大地積微塵何能翳其眀遡光儷陽耀隂魄獨含精况爾朝夕馳呼吸成虛盈持兹燭玄造萬類無遁情彭君忽起揖子以知言名王維輞川别業詩圖野水已不流野田已無塍日夕華子岡狐狸上丘陵髙人兹為土畫墨飛塵凝空餘古韻語倣佛金石興新嵗丁卯二首宣髮日已皓行年屬知非持身仕眀時出入謹細微瑣屑文墨賤藻飾供脂韋秩秩敘天經哺此萬齒飢枉已未敢進斯願豈終違獻嵗時序改真宰布陽和默默玄運交生物有駢羅天塗日宣光泮水渙文波豈樂具春服農祥願無訛飲酒六首進士當盛明自謂非時才狂斐學文字無聖為我裁二者俱寡合終令智士咍斯旦已陽春對我聊持杯祖母在堂上小孫方稚孩俯仰見五世居生豈悠哉簡編有重訛折衷無權衡黎庶有重困救藥無持平昔者賢聖出屯蹇躓其身躓身不躓道龍蛇果能伸棄置姑飲酒陶然會天真萬物各遂性雜沓向我陳祖母九十七堂上受封恩小孫初一月哇哇弧矢門吾生豈不遂知足心不煩在昔田里中學書不窺園鄰舍或招飲怒不與之言矜持稱亷隅過往太守軒今茲遇明聖經幄寄討論啓沃資皇明古道因以存時日得賜酒獨酌還厭喧考妣早棄我得祿不逮親幸茲有祖母九十康強身我情終不樂日思我親仁襁抱免水火少長俾知倫出入鄒魯俗用變宿習因植松在淮山稼田為齊民興念輒涕泣有酒亦逡巡昔我七世上飬馬洮河西六世徙天山日月聞鼓鼙金室狩河表我祖先羣黎詩書百年澤濡翼豈梁鵜嘗觀漢建國再世有日磾後來興唐臣胤裔多羌氐春秋聖人法諸侯亂冠筓榖鄧不書名毫髮各有稽吾生賴陶化孔階力攀躋敷文佐時運爛爛應璧奎嗟哉寡諧合蒼髮秃不齊觴至即飲嚼猶恐逢訶詆衆人以儒進我不限吏資入官飬交譽惟恐不合時含笑作雅咏遭罵亦詭隨出入踐華要諈諉成其私積階漸崇貴剽獵章句辭鼓頰説古今證據稱云為斯世豈可誣小夫甘自欺興言發喟歎飲者終不知留别沂州張君仲揚舲下彭城分帆上沂水與子作别離眷言重徙倚曩在京華居連室同井里出則馬轡聨入則衣袂比今也各散去相顧意未已我操田器歸子執州符仕慎勿輕此身期以善自止觀耕者有言庶矣新田殖疲民得無飢先輸公家賦又足食其私老父揖我語嵗功實由兹勸農古有官助給牛種施今官亦勸農行田吏奔馳爾去告爾長我自安無為禮部合化堂前後栽小松三首買松栽兩階緑髮已可梳恐是女元君截鬚生地腴遲爾千尺長下産黃琥珀服以安心神飛身作仙客樹色緑透户晝景如嵗長微風吹几帷硯池麝墨香分曹寡職業糜廪充鼠腸多因文史間陶然肆其狂有屋山之陘有田水之漘如何又茍祿屈伸隨世人納履斯遄征騁心斯失真興言每自悔願為耕鑿民蔓草不除大夏萬物長蔓草多華滋勾芒發苕頴苞實各及時賴爾有野意使我情恱怡誰云田中殖嘉穀亦如兹六月七日至昌平賦養馬户馬足與石鬭石齒囓馬足足跛背生瘡突兀瘦見骨官家日有事陸續使者出使者貴臣子騎馳日逐轂驛吏報馬斃鞭撻寡婦哭寡婦養馬户前年夫死役占籍廣川郡有田種菽粟翁姑昔時在城邑復有屋連嵗水兼旱洊飢罹不淑夫死翁姑亡田屋盡質鬻寡婦自養馬逺適雕窩谷績紡無麻絲頭葆脛膚黑塞下藜莧小空釡煮水泣驛吏鞭買馬磨笄向山石安得天雨金馬壯口有食寄六弟元德宰束鹿我有六兄弟我長汝最幼我長守田廬汝幼侍親右跋涉萬里途隨牒越閩岫親復當官清晝坐置宴豆教汝讀詩書夙夜獵文囿不幸親棄豫萬里汝扶柩汝兄元禮賢斬服携汝走我自河淮南迎喪匍匐救號哭天不譍崩裂屢顛踣歸安桐鄉阡銘文手自鏤買石礱石儀一作古儀樹柏夾漢獸俯仰嘆存沒今茲霜露又汝今出作縣我偶尚書簉戒汝憶親教公田代耕褥汝素謹禮法口未見嗔詬更宜歌我詩無視我老謬憔悴傷民恫恚忿兩莫鬭縣政書考功同去聽山溜葆真觀納涼二首虐旱熾初暑煩囂不可滌城隅有琳館松竹蔭午日呼我良朋來嘯咏各岸幘蕭然忘世慮相對坐盤石瀹茗滌塵襟煩暑亦可忘團團篋中扇復開明月光况此太清居林樾天風涼誰鑿河漢氷為我雨八方端午效六朝體修篁發秀林新荷疊芳池采絲擷霧縷紗縠含風漪蕤賔應樂律端陽正嵗時馥馥蘭湯浴灧灧蒲酒持漢宫鬭草戲楚船張水嬉江心鑄龍鏡好用照湘纍移梅四首幽屏逐魚鳥沈迹儔隱淪所欣在林藪嘉植日以親眷言江介品紛葩號南珍遇我好竒服移根得良因井井十畝園菁茒蔭澗濵縞裳擢玉質宜此空山春始逃爨下厄復脫燎原焚結根園畝間炯炯臨水濆疏華照嵗暮緑萼栖寶熏春陽桃杏繁鼎實獨已先遐情愜真賞來置我石田北枝散餘霞苔光生碧鮮玄冬陽已復仙葩綴踈星隔浦映碧竹隨風墮寒燈我來刈薪蒸弛擔南山陘攀莖嗅清馥擷英嚼芳馨樛結灌木藂顔色無光熒倣徨未忍棄洗濯歸林亭植爾當庭隅豈復資鼎味遷爾自谷中豈復相嫵媚冽冽玄冥候衆植各浮脆髙標自凌寒孤尚獨冠嵗么禽何處來飛下雙羽翠田居二詩寄元參議積潦被原田瀦水滿陂塘具我錢鎛器銼秸飼牛腸周垣無不完南東植柔桑欣欣條枝發向日欲奮張衆草還芊芊朝雉鳴陽岡始旦荷畚去取糞城邑傍敢辭作勞苦但願筋力強上馬作將軍下馬作博士服賈真無良蓐食勤穡事王朝列公卿田稅豈十二同里相勞勉牛種更貸貰雖無凍餒憂未可恱親志親志在榮光祿飬乃始貴為詩獻儒宗秋穫見稔嵗初日八首初日照我樹我樹日華滋檀欒緑隂合四顧無曲枝盛暑熾煩歊其中有涼颸成林蔭千畝棲息任所宜初日照我墻我墻無文圬周遮限奔逸環堵存屋隅聖譏糞土惡塗塈飾穢洳畚鍤戒勞歌樂此生其樞初日照我屋我屋受陽光寒暖順時令風雨謹蓋藏榱桷無文雕析一作桁棟取材良聖亦善居室茍完斯為臧初日照我書我書在東牖赫矣先聖言天地相永久秦火雖燎原其灰為世夀人文待茲成老死學敢後初日照我田陂水方滿塍既欣稚禾發復愛嘉木榮伏臘獻酒食報賽嵗事成告僕緩爾私先可輸王征初日照我車我車不濡輪泥潦即不出旱復避埃塵當轅駕一馬宜彼原隰平下澤非所慕朱丹亦非情初日照我池我池水波生芙蕖罥紅影黃盤蔭緑英龜魚相浮遊鳴雛㺯新聲雖無臺與榭足自娛幽情初日照我衣我衣多賜服霈哉富筐篚圗報命莫贖飬痾得退歸持此侈君祿茫茫宇宙內被體幾完足飲田家留題田家酒初熟邀豫坐籬根我復不辭飲喧譁輒傾樽耳熱歌擊缶雜坐忘卑尊論古似嘲謔顛倒羲與軒禮容或稍稍愛此情義敦邱原正春意歸路花栁繁翻翻鳥飛去悠悠寄情言史館間題二首騎馬到畫省冠佩趨几筵豈但文字美所樂長官賢京國足府寺金穀相百千飛書日雜遝奔命懼不先肅肅館閣嚴操觚績簡編上有日月光下有草木妍森羅大象列俟此言語宣蹇豫昧儒學羣髦辱官聫遭逢賴眀世益喜身悠然畫省真仙居華屋映丹樹青石倚闌干松髮沐雲霧綺疏刻連錢承塵畫翔鷺中有河漢文夜深室光聚玉函黃金鑰太史自侍御河上一豎儒伊吾誦章句偶趨彤廷詔詞林邇天路雖樂文雅懿終慙紬繹誤祖生求母風塵知無歸海波知無還所以求母人見似涕已湲涕湲何時止得母始歡喜不見畎畝謡常言樂平世題米孝廉詩卷仲子或乃廉匡章或乃孝是非相失真百世每一道若人古君子二德夙所樂風聲茍不樹何以達民教記實有遷固雄辭蔚文豹坐可卜傳信髙旻麗星皓擬古二首長安青雲士任俠日娛遊千金為人夀萬金買名謳小舅拜郎官女壻恩澤侯出入意氣盛歡樂不知憂銀柈薦海品羊酪乞蒼頭生逢承平世死葬崑崙丘早嫁金閨彥翡翠冠步搖纒臂七寶鈿繡袿襲鮫綃江南茉莉粉塗頰發天嬌専房妬夫壻奩錢媚神祆最恨蠶繅賤却恐鎖香銷奉和王儀伯參議龍門衆鎮列方國兹山入叢霄隱雷鬱夜壑奔潨劇春潮跛鱉不可升負鼇詎能超媧錬役萬神禹鑿勞百僚我行當晨興雞鳴馬蕭蕭巋焉見閶闔煙雲限紛囂所樂鎬京從敢賦淮南招摛辭造鵷行藻思芳年雕飲酒輒亦醉泛泛風鷗飄日畿芙蓉衢玉輈九天遙髙詠青雲篇翹首扶桑朝問燕紫燕尾涎涎巢成引雛去秋風巢泥落燕去不知處眀年春社時又來哺雛兒不問主人誰還可巢門楣擬古二首日轂麗中天重隂受大光甫田溉以泉嘉穀岐穟芒美質膺教益釋然達其良區區事文法河決抔土防驅車上疾坡六馬汗滿溝解航下急瀧百夫不能留微機有逆順無用卜筮謀車遲或可安航速或覆流送别李彥方憲副之官昔在翰林日與子同官聫出入文史間篇章雜朱玄飲酒學士家走馬大道邊各不識時貴浩氣超八埏今兹兩秃翁短髮咸被肩睽違諒不樂國憲屬持宣八州多疲氓豪吏爭控拳擊搏并煦嫗所施務兼全期子上報政慰我心惓惓登都北神山醉中題壁過溪踏瑶瓊入山採蒼翠仙宫名神山下負六鰲背我來訪丹藥羽人已千嵗清嘯響山谷幽姿媚松檜白水從北來南與衆川會開窗目沃野千峯儼相對自是山林樂何但官爵貴買田釀清泉里社日相慰詩成悵如失天風逼衣袂東望鄒衍廟杯酒可逺酹談天劇當時古屋尚粉繪騎驢獨歸去人世空一喟種桃種桃南山麓三嵗不得實種瓜東郊園擷之在百日豈不思遲暮終焉有常食如何種瑶草千嵗始一獲王繼學同張學士夀寧宫祠宿奉寄永日坐虛館晏然有餘清迤邐違世囂沖融叶道情修管文賦成歌詩藻思生涼颸入書幌逍遙命觴酒披拂有庭花山石可擊拊下階就步武布席思我友我友不可思方與神仙期峩峩華陽巾左右委佩垂夜半登玄壇象緯光陸離天門倘有遇為我含景滋送郭用可教授雲南郡馹騎道邛筰拖舟絶牂牁西南古朱天謡俗雜奇訛軵餉仍烓㸑毛裳啖鮮螺良金飾長鍛翁季輒交劘官家善羈縻獷獰受捫摩君往教其人為國揚餘波同文實同化萬里歸謳歌潁郡孤城介汝潁四野盡衍沃梁楚異風氣沉頓封域錯畇畇墳壤美宜我稼稻粟居民尚朴儉遺邦頗文物邈哉宋兩公當年擅髙躅至今風月夜西湖有鳴玉朅來載淮舟登髙恣遊矚故老不可聞聲華竟誰續昌平道中次繼學韻清朝富文物冠蓋塞兩京角藝百技並論經千儒並下才忝供奉肅肅齋館清朝出都門道羣山愜幽情聫鑣有髦士海內馳英聲白馬嘶南風羅袍映田塍笑我如培塿自比山崢嶸度居庸關次繼學韻飛鞚陟雲巘決眥盡圖畫天氣吹髙寒山雨灑長夏冥冥白鳥去寂寂松子下陸行石當塗水舂泉繞舍髙與蜀道齊深乃盤谷亞筍輿約重來羸馬苦常跨朋從詠連疊酬應給間暇得見王子喬吾將驂鶴駕石田文集卷一
