body:
  text: 石田文集巻十一元馬祖常撰碑誌皇元勅贈翰林學士杜文獻公神道碑相之安陽縣王裕里有處士杜緱山之墓既𦵏之六十六年當天厯己巳皇贈處士官翰林學士階資德大夫勛上䕶軍爵魏國公諡文獻越六年元統甲戌皇又詔臣祖常製其墓之碑臣彛書其碑之字以賜其曽孫臣秉彛使刻臣受詔按監察御史臣蘇天爵序公言行之狀為文曰公諱瑛字文玉其先霸州人金將亡士少識時變猶以業文辭規進取而公獨自霸州之信安辟地河南緱氏山中於天下書靡不讀讀靡不記亦靡不見其㫖趣上下今古於得失否臧之悉靡有不究其心皆無一作兼衆人之存而若有待於世金亡􅇟額暴壠畝仕者鹿兔走血氣不得寧而公獨間闗轉徙以詩書從容授徒汾晉間故中書鈕祜禄珪開府于相以書幣聘公至獨教以緩刑薄斂廣學内士興利補弊以脩扞其民而卒以基平宋之業㑹國朝嵗己未世祖觀政江南至相名公問計公對以謂漢唐以還天下之趨舍安危顧法與食與兵三者而已國無法不紀人無食不命亂無兵不守三者君之恃也今宋蔑之殆將亡矣以宋之將亡而興之在聖主天命必得今若控襄樊之師委戈下㳺以擣其背而無縮於鋭是縣車束馬而大業定矣更勸上數事以為事不爾後當如此上内之心賢公謂可屬以大用既皆如所云江南平即使使至相徴公聞王文統當國輒引避使索不見近臣奏起公為大名彰德懷孟等路提舉學校官辭不就或諭使仕則曰後之世雖去古之世逺而先王之所以設施制度其本未先後未嘗有異也今不能因天下之哀苦以變更後世之弊政以趨合先王之意棼焉而已其勢豈易易下易一作為復古哉吾又不能窺時俯仰以赴機綮之㑹仕奚從益於是杜門謝客著書窮學於世之貴富賤貧一無所動其心以優㳺厭飫於道藝以終其身以殁嗚呼公之言若此其尤可以窺公之志也其所著有春秋地里原委十巻語孟旁通八巻皇極引用八巻皇極疑事四卷極學十巻律吕禮樂雜説三十巻其大畧不以一身之窮而忘天下之憂以為不見其志於行事則將文以發其意文不克用於時則將以垂諸後後之人用吾言焉吾固不窮也公所為作之意若此公之志可知矣始公之學也有所待而迄不得一施以止盖亦遯世而不悔者歟其志若此其仕不至于躭禄而弊時審矣惜公之去而不試于事也公氣貌魁偉美鬚儀望之儼然爵禄器也既家於相中書畀以相之良田千畝不受術者言公居屋下當有黄金家人欲發視公斥止之公去居者果得金百斤觀公之存於二事之亷若不足數然公之殁也既乆其大者漸以無傳則其小者亦不得而畧也公以至元十年九月十六日終於家壽七十終之日命諸子曰既死當題我曰處士杜緱山墓今首之碑從公志也公曽王父信王父植父時升母某氏配孫氏後公九年卒祔公墓子男三人處思甫冠卒處立郡文學處愿終東昌路推官有惠政女適李某孫男又三人曰愚以子秉彛貴封奉議大夫樞密院判官驍騎尉安陽縣子曰堅曰欽皆為士曽孫七人秉彛秉鈞秉直秉讓秉容秉一秉德曽孫女二人洹漳嗚呼公之事逺矣故雖詳公之言而所次止此然即此而公之為人可見則亦豈得為畧哉秉彛由丞相掾為奎章閣典籖時與脩大典嘗録公之事以送太史今拜陜西行臺御史而天子又賜公之碑以徃焉相人見秉彛之來必曰是魏公厚積之貤一作施有曽孫賢其將大未艾則不寧公有榮也秉彛亦賢後嗣哉我國家褒䘏寵嘉之意盖亦有徴矣故臣取其尤可以傳後世者序之而為銘銘曰明明世后皇聞于天我征徂南㨗㨗其陳建我干旄于洹之濵遑脂我車軌蒲殷殷魏公在野誰適與謀學以待世靡恫靡罹維世后聖聘公于遺后曰公賢庶幾其來南國之痛我恭天紀鳯鳴在雲魚泳于汜億億臣同盡瘁以仕矧是藝哲寧不我有公拜稽首匪臣有辭降極瘼矣民殫胥疲誰唁臣者而出位思大德受命昭假靡遲在昔帝者監觀萬國法與食兵燕民孔極宋嘻蔑矣孰其可逭帝御六師以匡不獲同我髦士簡我戎行鉤援㦸鎩以臨樊襄勿進而持勿惡于揚鑱其餒俘涉自漢陽纛行騎翼咸與之位一作立后納公言試靡有忒大命甫集偃我干革束帛詣公謂公來即彼何人斯公胡罔懌皎皎白駒在彼空谷考槃朝謳願言韞匱雖則韞匱懋勲有俶完歸壽考以綏後禄公在亂離人知書詩公發偉畫乃合天時有炳其云有鬱其聞機緘辟露後公之文公生靡崇殁有多祉兆相之交從以孫子既六十年樹石墓趾天子之賜曽孫之美曽孫之美追榮孔多有列羣獻公延爾那哀如之何矢詩不磨翰林學士元文敏公神道碑有元古文之宗曰翰林學士清河元公以至治二年壬戌二月七日薨于位𦵏而墓碑未刻其長子奉議大夫同知峽州路事晦又死次子暠七嵗一女病而不嫁一孫尚乳也夫人清河郡大族李氏纍然抱其孫僦船歸清河織絍以居賔客僚𨽻皆四散無一人顧之者獨其友𤣥教太宗師呉全節謂馬祖常曰清河公以文起家可謂貴顯光榮矣而其𦵏之後無碑以載其官閥世次行事之實爾宜為文我求善楷書者礱石以刻馬祖常曰嗟乎世之士一得志則攘袂於所親一不得志褫魄若不能生者比比也今子託跡老氏而以禮義之事振吾徒何能哆言以飾媿哉謹按公諱明善字復初資頴悟絶出讀書目所過即記諸經皆有師法尤深于春秋弱冠逰吳中奮一作忿宋金季世之習已名能古文流傳江淮間浙東路部使者薦之行省辟正安豐學再正建康路學居嵗餘行樞密院辟充令史故辦章董公士選實僉院事敬之如賔不以曹屬御之也董公遷江西行省左丞復羅致之省中㑹贛賊劉貴反從左丞將兵討之擒賊三百人議緩詿誤得全活者百三十人又將斬一賊命公臨斬左丞曰掾儒生能臨斬乎當震怖矣終刑已色不變將佐白宜多戮人及尸一切死者用張軍聲公固争以為王者之師恭行天罰若等小賊跳梁殺其渠魁耳餘何辜焉賊貴盗書民丁十萬於籍有司喜欲發之公夜置火籍藁中焚之以㓕跡贛吉遂安南行臺聞之亦辟為掾未幾進登仕佐郎樞密院照磨轉中書省左曹掾曹無留事坐誣免不辨僑寓淮南文學益肆頃之坐誣事明復掾省曹至大戊申我仁宗皇帝養德東宫左右文化選天下髦俊之士列在宫臣公首被簡拔授承直郎太子文學仁宗即皇帝位遷翰林待制承直郎兼國史院編修官與修成廟實録加奉議大夫是年陞翰林直學士朝列大夫知制誥同修國史有詔命節書文譯其闗政要者以進公請與宋忠臣子集賢直學士文陞同譯潤潤一本無書成每奏讀一篇上必善之曰二帝三王之道非卿莫聞也太皇太后既受尊號朝堂集議宜赦公曰數赦非善人福宥過可也秉傳出賑山東河南饑彭城下邳諸州連數十驛保馬民饑官無文書公專以鈔萬二千錠分給之民免死徙皇慶壬子脩武宗皇帝實録明年遷翰林侍讀學士中奉大夫預議科舉服色延祐乙卯國家始䇿試士子選充考官廷對又充讀巻官迅筆詳定試卷數語辭義咸委曲精盡他人抒思者不及也改禮部尚書正孔氏宗法以五十四世孫思晦襲封衍聖公事上制可之叅議中書省事毗贊良多知戊午貢舉復入翰林為侍讀學士通奉大夫嵗終拜湖廣行省叅知政事便道過家上冢鄉之父老子弟迎謁勞問禮意周洽庚申英宗踐祚徴入為集賢侍讀學士召至上都議廣廟制授翰林學士資善大夫修仁廟實録百官迎仁廟聖容云有卿雲見承詔為文以紀之賜酒加賞英宗親祼太室禮官進祝冊奏請署御名上命代書者三眷遇褒優近世無有也既薨之三月歸𦵏于清河王家原之先塋西三里泰定間得請于朝贈資善大夫河南江北等處行中書省左丞追封清河郡公諡文敏曽祖諱興不仕曽祖妣楊氏二世以下皆以公貴祖諱海贈嘉議大夫秘書卿上輕車都尉追封清河郡侯諡貞惠祖妣髙氏追封清河郡夫人考諱貢將仕佐郎同管勾蘆瀝鹽場贈中奉大夫吏部尚書䕶軍追封清河郡公諡考靖妣弭氏追封清河郡夫人元氏盖拓拔魏之苖裔南北轉徙不知所系家清河者至公四世矣享年五十有四其文有賦五詩凡一百六十三銘贊傳記五十九序三十雜著十五碑誌一百三十出入秦漢之間本之于六經以涵泳以膏澤叅之于諸子百家以騁其辨刻而不見其迹新而必自己出蔚乎其華敷鐄乎其古聲倡古學于當世為一代之文宗者柳城姚燧暨公而已信乎其必傳也雖然才用而未盡積厚而施寡徴之于天其善後也無疑祖常曩從公㳺及公考士又辱第下列義當銘銘曰於維公文並古立大沛厥辭世莫躓震讋瞽瞶力不克蜚聲天衢名薿薿位臻公卿發軔跡藴而不施用弗極神柅其馳學迺碩天藻掞縟琢圭璧五十四年反𤣥宅集賢直學士貢公文靖公神道碑銘天厯二年十月朔旦集賢直學士貢公殁于家越五年為元統甲戌其子師謙來官京師以公之行治泣請于朝天子贈公翰林直學士太中大夫輕車都尉追封廣陵郡侯諡曰文靖集賢臣顥又奉詔令臣考公族世里居官次蹟業之實賜師謙以刻于石以寵賚貢氏之家以勸朝著師謙知臣于其父宿有好也迺録翰林脩撰臣李黼編緝之狀授臣曰先臣之生其有所自立其流聲美於人其可以傳世而善後者孤不敢贊已維墓有碑實後嗣所以紀先人之徳而飾其千百世子孫于無窮者今幸得以承聖天子明詔以請焉其足以稱碑辭而無恧者公幸張之臣叙曰公姓貢氏諱奎字仲章其先大名蒲城縣人七世祖祖文以武徳大夫扈宋渡江繇鍾陵徙居宣城之南湖因家焉曽王父大用王父應霆宋承節郎以公貴贈中順大夫禮部侍郎上騎都尉追封廣陵郡伯妣黄氏廣陵郡君父士濬累贈亞中大夫秘書太監輕車都尉追封廣陵郡侯甫冠以詞賦試漕司中程明年黜於儀曹即自訟曰學之時其道未足以為已志已在於為人亦可謂謬用其心矣謬用其心雖有志於為人其能乎哉乃力自學行詠歌息偃以忘其年視世俗之好無足累心者獨愛公甚於他子曰三郎和易端厚頴悟若過人者吾世有藴德發必在是兒也公年十嵗輒能屬文已有聞於人及壯讀書并日夜忘寢食於經子史傳無所不治於其章義辭句類數名制委曲纎妙無不究詣於文章辨議閎放儁偉不狃卑近必以古為歸故出而名振江之南初被淛省檄為池州齊山書院山長於更謁選吏部時天下乆平大臣常欲引海内儒學之士聚之館閣所以長養其才而待上之用公亦欲以功名自顯果於自立故不為非常茍易之節而清約才一作宏博之譽大夫士翕稱之大德六年中書奏授公太常奉禮郎兼檢討上書言先王之制禮雖節文有經而本誠貴質惟不蔽於禮之文而得禮之意則可以對越而無慊不然煩為之節無益也朝廷多採其議九年遷翰林國史院編修官至大元年轉應奉翰林文字階將仕郎預修成廟實録丁秘書府君艱比京師至家毁瘠枵然言不能聲太夫人見之曰爾嗣業於祖從事於朝少而學壯而仕父母曰是將大吾家隣曲曰是能華吾鄉宗人朋友之望亦猶是也爾父不幸死喪不有中制耶脱有不諱非孝也始勉之粥食以自強嗇延祐元年服闋起除承事郎江西等處儒學提舉明年就官見刑械署庭胥旁午走繫數人立吏持牘詣公署曰是學校吏報事愆期者公斥之曰金榖勾稽犴狴木索職有司事耳吾以天子命提舉儒學教吾職也刑奚以為悉命釋繫以械屬縣官大書其坐之屏曰讀書之中日有其益飲水之外他無所求與諸生講説文義為師弟子揖讓周旋日匡坐堂上人見其色和其容謹其言繹繹有理輒退而燕處聞其哦咏之音若程工督計者故士之屨恒滿户外其及門者亦進不怠以止五年遷翰林待制預修仁廟實録書成特賜金帛有差至治元年謁告歸里第與兄仲堅甫奉太夫人以居斂氣下聲昆弟相顧白首怡然鄉人皆樂與從之㳺至於覊旅游客其歸之者無不厭其意公於接之雖勤未嘗見懈色於資之衣食給物雖頻未嘗有所吝惜太夫人病竟夕立床笫前聞太夫人咳息之出輒倚氣喘戚若以身代然者泰定元年太夫人卒三年復起公為翰林待制進承直郎四年秋七月拜集賢直學士奉訓大夫秩從三品天厯元年文宗即皇帝位冬十月上親祝香幣命公往祠北岳淮濟南鎮二年春還自㑹稽涉呉中以疾歸卧於家至十月朔謂其姪師文曰吾夣夜賦詩有云竹樹蕭蕭夾泉石又云九轉丹成生羽翼不祥奈何語竟溘然以殁公有智識度量人不見其崖涘凡再與鄉試文衡一為廷對讀巻官所取士多知名于時其所第甲乙人咸服其平允其為天子代祠之使者再其攝大禮使侍天子祼太室者一皆肅恭靈神䖍致上意為使而不疚於貨賄不煩於有司攝官而竣事無違禮是皆公行之微而世亦不能及也然公負有為之志不得盡見於事於勢利之㑹又不求機以投合取顯以其故終於館閣文藝之職而人之被其澤者盖尠嗚呼此人之所以為公惜公之所以為公者如此而臣以此悼公者也公一時之與交者若清河元明善東平王士熈四明袁桷巴西鄧文原長沙文矩悉當世豪傑聲名之士若臣者亦公之所厚故於公之碑得以盡臣之言焉而非私也公以殁之明年正月八日庚申塟宣城縣射亭鄉生田里之原享年六十有一母夫人李氏追封廣陵郡夫人配張氏封寧國郡夫人追贈廣陵郡太夫人子男二人師謙從仕郎集賢院照磨師泰由胄子試中程授從仕郎太和州判官辟署江淛省椽曹女一人適阮垕孫男三人高山奴吳山奴萊山奴孫女六人其所著曰雲林小藁曰聴雪齋曰青山漫吟曰倦游集曰豫章藁曰上元新録曰南州紀行凡百有廿卷晚年粹擷諸禮書為一家言未就而卒今師謙師泰皆孝弟純篤緝學以世其家加之以磨礱灌養之功而不止其所至方未艾也論次終始作為銘章豈特以榮貢氏以慰其子孫以勸以侈以貽其鄉里哉將以昭聖天子褒優儒臣之意以垂盛世之鴻懿也謹再拜稽首為銘以獻曰貢氏來北肇自武德藎其終威一作徙自鍾陵又作𦙍其終蔵未詳孰是光被南國有善自身乃開承節繼述綿綿其承有變祕書有子以文起仕奮跡太常旋書帝制有嶷其容志眠萬里大騁瑰辭綜緯經史始來玉壺騰聲其駕惟長左右惟同在亞在側惟僚相頌歎訝公夷坦坦弗矜愈下銓覈再試士曰予歸讀巻廷中帝曰予依淮濟吳越四周所覆公馬騑騑持幣奔走神欽公䖍蕃祉以茂式乆在序侍從之班告疾歸止㡬佚于閒竹木以居南湖之山公出公休鄉人㘖㘖廪餘者粟與黨及隣屋蔵有書遺其後人素領丹頥隤焉以怡言咲在耳乃哭于帷維公德善殁不見其窮維公所著傳不見其終有嘉二子且用未極其從維儉于厥躬永也其鴻刻銘墓宫豎江之東有萬子孫紹美于公大元贈中奉大夫行中書省叅知政事張公神道碑公諱昻霄字雲卿姓張氏其先世居定州五代時晉髙祖割燕薊諸州賂契丹又徙真定民以實平營故今為平州人金末擾亂世牒無所稽祖伯韜有文學不仕讀書授徒為鄉人爼豆師生鑑鑑為海山縣丞有惠政娶開士程虞卿女有子三人長即公次冲霄仕平州酒税醋使以卒次平霄副鎮江丹陽酒醋税務殁贈官從仕郎保定路易州判官公力孝悌尚學術敦慎以睦宗族子姓稱賴一作頌無有間言國初檄文臣詣都邑試士人學中程者復其家公首以詞賦備選至元七年辟署平灤路轉運司知事十年階前資提舉北京平凖行用庫克勤厲守咸一作職較一作秩然有聲終更序績遷管勾濟民鹽場顧子弟曰曲直有施而莫盡材予豈能僶仰中哲匠繩度者而或予強也惠㓜禮長葺力食生知天德自貴於物而行茍不怍人道殆其盡於兹已奚必仕而為榮為得禄哉于是居閒益講詩書六藝之學置諸生左右摭掇前聞分釐辨對俾逹所趣内熈外易慥慥肫肫對客燕坐語及古今人物賢否事後成敗利鈍若氷斷縷續悉有左契毎臨筆為文辭必縁情稽類不峭澀艱逺而夷然有古作者風意嵗時從容課僮僕治生業往來里閈十有餘載無忿氣無慢容殆依依乎厚德君子也以至元廿五年秋七月二十有四日考終于家享年七十其年十月某日塟平州西苑家庄之原子男九人長諱杲卒海山縣酒税醋使次諱某早世次諱昱同監昌黎縣酒税卒次名昇今奎章閣大學士資善大夫為時名臣次名昆承務郎陜西等處儒學提舉次諱曇少知好禮讀書日記數千百言弱冠為兵曹掾聞其師滕司業卒中山謀請臨哭其喪例不許因棄掾得就哭還金敖務自多學記覽以博其用而不幸亦卒次名晸承直郎真定路藁城縣尹次諱晟既冠而逝次曰旦承事郎遼陽行省照磨官女一人適士人劉源男孫凡十有三人曰璲監安豐路霍丘縣酒税曰琳學而未仕曰山童夭曰璵將仕郎章佩監知事曰琦從事郎隆鎮衛千户所知事曰琪甫冠卒曰仁童曰居安曰鯨川皆夭曰瓚國子生曰琥未冠卒曰珪曰琢㓜而學曽孫男三人曰紹安憨兒范陽𤣥孫男三人曰𤣥孫聞孫定孫皆㓜女五人長適同監馬城縣務趙簡先卒次又適簡次適遷安趙璧次適大寧楊誠次名賽未笄卒曽孫女二人曰高曰順𤣥孫女一人㓜未名泰定二年以公子昇時官階二品例推恩二代鑑皇贈嘉議大夫禮部尚書上輕車都尉追封北平郡公妻程氏追封北平郡夫人公皇贈中奉大夫河南江北行中書省叅知政事護軍追封北平郡公初娶白氏卒繼室故元帥龍德讓女宜家訓子成其内助而先公十九年卒追封北平郡夫人再娶夫人妹後公二十年卒國制諸夫人當封者格止一人昇以妻封讓後夫人龍氏得請亦追封北平郡夫人咸祔𦵏公塋禮也至順四年春集賢侍講學士昇以狀屬其門生馬祖常祖常雖不獲拜公而辱公子昇知最乆跡其尹汝南焚禁書以全逮繫治越州忤權臣以逭民賦及敭歴臺省則又有猷有為而公之流聲遺澤可攷而知矣嗚呼燕營間山川磅礴鬱積之交鍾而為人者發舒凝蓄固有晦有明而豪傑瑰瑋之器世恒見之豈不以其禀之厚歟公生當草昧之初能知讀書業儒而躬不食其報殆所謂禀之厚而未顯者也不然胡寧公卒甫三十年而張氏之門躋膴仕紆章紱者充然滿廷耶是豈特因公之緒以知公又將驗夫燕營間靈明之所鍾也迺為之銘曰有燕營陬有鬱平州藹其烰烰孰涵以收張氏德門實㑹其休王父伯韜肇兹善慶間闗以生乃起厥聞積厚而微勃焉其奮實生縣丞撢于惠政世濟其美伊自公始既榖既官而屹其止曰熈曰勤以淑有子維德之徴爰受多祉後五十年曄其有㶴于公于侯籩豆承祀紱冕車服馮奕委委昇也履之公實啟之有封馬鬛神安居之本哉沄沄迪爾後昆矢詩貞石式昭覃恩石田文集巻十一
