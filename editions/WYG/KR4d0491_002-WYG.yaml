body:
  text: 石田文集卷二元馬祖常撰七言古詩題恵崇畫龍門千尺梧桐樹多在石崖懸絶處上有古巢生鳳凰鳳凰臺髙山水長吳蠶八繭白雲絲畫史落筆光陸離江天萬里莫射鴈春草年年出湖岸所過張良廟前流水聲歌風臺下曉鷄鳴行人舟中寐復起此生亦欲成功名白髮可憐升斗禄持歸不足求田屋揮杯看劍獨長嘯萬里朝雲見晴木題商徳符山水圖曺南山君畫山水幅絹咫尺千萬里古木樛枝障霧雨蒼石斷裂蹲虎兕路幽應有仙人室樓閣恍惚雲氣入翰墨黯黯絶丹碧芙蓉峯髙觀海日淮安路池山淮浦蒲花秋渺𣺌淮岸楊花春裊裊白魚初下酒舡來十里風烟隔飛鳥吾生欲向淮安居更聞池山好田廬濯足滄浪箕踞坐不問朝家求聘車湖北驛中偶成江田稻花露始零浦中蓮子青復青楚船祠龍來買酒十幅蒲帆上洞庭羅衣熏香錢滿篋身是揚州販鹽客眀年載米入長安妻封縣君身有官李後主圖澤國中寒嵗年晏沙嶼潮痕眀石棧風吹半樹野梅發天上書來問春鴈江南後主丹鉛手畫盡氷絲世無有宫中長晝諌囊稀媚嫵吳娃雙進酒寄鄉友河邊老父念我出逺寄京華書一行謂言白髮今多少又報南園竹樹荒門前石田秔秫熟犢子新生走如鹿莫戀官家有俸錢長年作客身如束送周南翁之官池陽霏微桂藂緑霧深集仙書殿秋沉沉九華山影墮酒醆便欲起拖青楓林青楓林髙霜葉赤遥遥連雲鴈行急蜀麻呉鹽來往時閒坐城樓聽江笛畫樹寒槎偃蹇風雨攻蟄龍囓雲磻石根戰壘防秋鹿角柵長筏浮江下蜀門憶昔馳射古楚原夜觀野火燒楓林髙堂醉酒看畫幅樛枝薜蘿牽我心何仲博家棣韡堂我有破屋近鳥巢水波春雲拂塘坳弟兄三年不得見屋前石田添竹梢眼前有此紫荆樹何時重過西州路欲瀉銀河下墨池盡寫狂歌滿華柱宿興化縣界去年七月淮水發獨乘扁舟觀禹跡今年七月天又雨躍馬南上閩嶺石蹉跎嵗時身老大瑣瑣茍禄慚莫述白髮山中抱孔經㑹見青藜下太乙再賡前韻莆田􅄓風秋更發山寒天暮見虎跡夜起繞床聽簷溜又愁雲中龍出石我行閩南王事急文字豈為年位述每嗟莫救黔婁飢誓從方士祠太乙題眀皇端箭圖寧王玉笛吹鳳凰桐花秋露宫晝長開元天子忽思武手中金箭照眼光何物羣婢出後房羽林孤兒射殺將坐中凛凛無漁陽題趙承㫖枯木竹石圖猗歟太史諸王孫生絹畫出崑崙根枯槎菌蠢厄野火淇園秋雨琅玕繁天寒嵗暮碣石館囊書日見𤣥雲翻持向故山茅屋底倚看屈曲大江奔閒題客來散我床上書客去風吹忽成帙平生情思苦愛詩更喜坐嘯銷永日京都王門可曳裾鼇峰翠石相揶揄睡醒茶甌緑香滿誰能走馬汗揮珠上京書懐燕子泥融蘭葉短疊疊荷錢水初滿人家時節近端陽繡袂羅衫雙佩光共笑江南五雜組畫鷁浮波供角黍沙苑射柳追風駒古來北地為名區室婦嘆南陌日長春已半天風猶寒室婦嘆咄哉室婦爾何為卉衣廩粟充凍饑飽暖無憂樂以嬉乃此屢嘆將有私室婦涕泗言復咽食鮮袂良焉足說近聞官家賑貧民雄保諸州已損一作捐瘠翁姑帶索行纍纍弱兒失爺夫失妻哀號村空野樹槁蔀屋見斗餓䑕啼縣令具名報大府星火符來應期聚索錢買餅飼公卒書券質田問鄰主艱難憔悴不易狀誰實為之俾無養嗚呼吾人痛切膚忍死莫作盗賊徒君不見蒼鷹乳虎有司靡何但嵗凶人化鬼息齋風竹圖道士華山隠得之命予賦之往年家住篔簹谷丹鸞之實美如粟𤣥雲翻空下深靚昆吾寶刀削秋玉石衣漬錦侵書光風微粉墮生細香琳館瑶臺九天近夜寒笙磬聲鏘鏘萬斛蒼烟鬱江雨二妃彈瑟瀟湘浦郫筒蜀酒亦堪沽蟠石雙杖令誰取河朔嵗晏氷為梁羣木鱗皴臨雪霜遲汝狂飈莫吹裂截管他年侑帝觴上京效李長吉龍沙秋淺雲光薄畫羅宫衣侵曉着呉娃楚娘侍團扇象輿鳳輦眀珠絡椒花染紫風雨香三十六盤天路長南都北都望行幸千秋萬嵗迎君王李夫人未央天子香醺骨夫人不貯黄金屋氷銅無光澁秋月留得當年舊蛾緑瑶臺夜佩聲闌珊沉雲叫鴈沙泉寒二十五弦彈鳳凰玉釵小燕飛春山祝丹陽祠武當東窺禹穴西龍門搏虎豹兮觀魚龍中有武當神所宫捫摩光景憑雲風旁礴頫入厚地裂環視百鎮真叢叢丹陽道人紺髮古走馬北來致天語延祐天子聖眀主萬嵗千秋作風雨蔡州妓趙氏墜崖以死自誓作詩諷俗鱗鱗汝水氷碧光汝之左右百草芳紅蘭紫桂媚長晝鉤輈鳥子回銀塘茭蒲無數菱葉小西家鞦韆屬年少燕泥霽雨風景酣簾箔依稀有歌笑趙氏女子邯鄲娼綵絲繡履踏春陽心思宛轉縈雲縷羞對兒郎唱鳳凰樂山嵯峨石生雨鄉人迎神奏歌舞婆娑起向神祠前祝願生身事針組野風吹目雙淚零泉聲松韻相泠泠誰言女子情愛癖誓死命輕如鳥翎鳥翎飛上合歡樹開花夜夜無愁苦秋香不斷相思浦玉釵斷股埋黄土題織錦回文圖桃葉渡江不用楫織女烏鵲填河白合歡樹下宜男草草色不及羅裙好織錦度曲聲亦柔黄龍塞是契丹州夫君戍歸定何日樂府陳娘歌第一題簡天碧畫山水西江隠君簡天碧醉來畫水復畫石春山秋樹緑更紅木橋野屋横且直烟雲蓊鬰風雨交元氣淋漓障猶濕雪篷夜宿魚尾舠晴蓑曉掛牛角帙岷闗巫峽冬氣清猿啼鳥嘯天一尺老來看畫眼苦澀便擬買田溪水側脫去賜帶繫芒履著書五車刻苔壁秋意銀床墜露下髙桐竹練含冰留麝籠蒲萄酒作碼碯紅湘娥江邊採芙蓉月華流影天漢東素商凄清颺微風草根知秋有鳴蛩寄家書春雲閣雨花泥少池上波平飛白鳥薊中河外盡天涯蓮葉圓時身到家五言律詩春行南郊緑樹連城合蒼藤入澗懸作橋分野路取竹縛溪船載酒誰留客看花我欲顛歌詩諧故老笑語屬神仙自鑿蒲萄井人開苜蓿田銜櫻黄鳥哢窺藻白鷗翩狎坐欣時俊隨行喜妙年山隂知寂寞春服且雲烟固始縣南岳行祠往嵗曾登眺今朝又漫來山禽鳴獨樹石壁漬荒苔水淺沙痕亂天低鴈影迴春風吹白髮有酒且銜杯應制夀王少傅皇極敷多福臣工保夀耆禔身名愈茂佚老眷殊彌疏廣金無㡬祁奚子更奇堯樽沾露醴齊服剪氷絲几杖隨身到冠巾與野宜珊瑚生海石琥珀出松脂西掖清光徧東朝寵渥私仁風初煦煦化日自遲遲宸詔徴歌曲仙音被樂詞乞言方有待莫去採靈芝過文著作家誰住街西屋文昌著作臣茶甌宜客静書帙覺予親栽竹應棲鳳操觚定獲麟青藜眀夜半北極動星辰贈王待制雪樹眀街樾氷澌合御溝物華迎節換淑景拂天浮長日書封事經年問酒籌已知花塢好借汝獨重游翰林書佐杜元美戲綵堂聖代文眀日時賢事業初雍雍封邑屋秩秩表田廬孝友歸今杜風流藉後予無詩歌陟岵有賦叙閒居夏閤摇紈扇春船捕錦魚又尋倉氏米還寫翰林書追陸重懐橘非温笑絶裾五雲誇地近三釡喜身如我亦陳情者誰云捧檄歟强來親筆硯不去荷犂鉏大母頭疏白諸嬰口聚鸒薊中塋入路河外野沉旟一作車又作辜藝圃思傳業天門聽唱臚終慚老萊子欲語復籧篨送文著作往鄂州諭南使大化均天施皇圖象岳寧宣風依日月發號布雷霆貔虎嚴分鎮鵷鸞蔚在廷芝莖聫孔廟蓂葉茂堯庭珠米圓圓白樓桑箇箇青謳吟興隴畝游衍及郊坰楚俗那三户滇童信六經已知含煦育復此仰儀刑使得皇華美歌應湛露聽賜衣裁錦段官醖應瑤缾上國崇懐服熙朝尚徳馨魚書閒粉蠧鷄卜枉軺星鄂渚翔鸚鵡燕臺念脊鴒歸途回四牡楓樹失江汀送王眉叟真人秋暉上寒竹白鶴立蒼苔石洞松花落雲房澗水來彈琴翻道曲搗藥應􅆐哀别浦迴船急孤山看早梅送人之陜省幕和韻綬帶驚沙鶴紗巾逐海鷗驪山泉未冷華岳樹先秋路出汾陽里衣仍晏子裘風流蓮幕羡君豈歎淹留伯長内翰與繼學内翰聫句賦畫松詩清壯偉麗備體諸家祖常實不能及後塵也仍作詩美之焉呉絹氷絲白秦封石髮青沐華浮鶴露戢景蔽鶉星刻畫風雲狀雕鑱鳥獸形哦詩鏗玉署集句燦珠經曄曄舒光氣沉沉逐杳㝠離歌三疊唱凱奏萬鐃聽肅穆官師位雍容樂舞庭江花春艷艷山竹雪亭亭自笑如塵俗懐慚似酒醒無因題琥珀有去對鵁鶄都城粟氏玩芳亭嵗序催人老韶華逐酒濃開尊應數數閉户豈重重花朶山猿折齋廚竹笋供京塵衣不染猶得媚春容春寒春寒犢子瘦誰與念農耕地底多生煖天邊正要晴落梅栖雪暈裂竹見風聲為問催花鳥如何得使名送蘇子寧赴嶺北省幕鷄塞鳴秋柝龍沙列夜營賜衣俱魯縞給餉盡吳粇野井氷生夏寒天雪沒晴藩垣資贊畫幕府正知名送劉侍儀祠祭北鎮醫無閭名鎮坤維左雄藩碣石邊宵眀觀海日春媚禊河川塞道迷沙磧郵亭過玉田驌驦憐馹騎襏襫費羊毡亦有鮫人室應無䱇户船山椒雲物異天角斗樞偏望美祠官貴時清祀事専祝禧孚感格錫福待敷宣謁吿書懐先子桐鄉地年來憶舊游山春花競發沙晚水閒流石屋青霞夜藤床碧樹秋防身龍具在强欲問呉鈎贈彈琴道士苦竹到階深雲房豈易尋倚松聞磬韵對石振塵襟芒屩𤣥壇曲瓊冠紫殿隂仙翁嫌我俗不肯坐彈琴用韵贈王繼學時祠禱天寶宫𤣥闗松桂深長晝客來尋撫石雲生手㺯泉風滿襟鶴巢連屋角蝸迹上碑隂須信祠官美烹茶更鼓琴送董仁甫之西臺幕西南萬里地詔屬大行臺秦樹浮天去巴江帶雪來山河無用險邦國正須才臺幕風流美書籖想盡一作畫開送周南翁待制鷄曙辭宫漏鷗天趁客船帝書鸞紙瑩母侍板輿鮮林壑烟霞古一作舊松楸雨露偏儒臣文藻劇隴表勒髙阡華清宫故基開元人物盡茲地尚華清古道風塵急温泉日夜生碑詞惟石蘚宫樹有春鶯過客知王建題詩不記名靈州乍入西河地歸心見夣餘蒲萄憐酒美苜蓿趁田居少婦能騎馬髙年未識書清朝重農穀稍稍把犂鋤宿遷縣河伯朝宗日黄昏一作塵出岸髙蛟龍分窟穴舟楫用波濤使者修隄急田甿棄屋逃無錢誰貰汝嵗晚更嗷嗷吕梁天府河流北徐方禹跡難青山開石硤白日看風湍星宿光芒合坤維脉絡蟠吳船牽百丈釃酒酹隂官泗州塔梵塔層層出雲間見象輪金光動淮水鐸語召川神負載坤多力莊嚴佛有因埏陶千萬億穹石刻銘新舟中藂薄縈雲曲岡巒引霧深舟輕風燕疾衣薄水螢侵夜久江喧瀨秋清竹滿林閒情任飄泊到處欲登臨徐州弔蘇眉山城角黄樓壯蘇公骨已仙亂流無囓石宅土有居廛才大為時忌名髙得世傳舟中卧讀賦臨水一琅然挽饒國呉公泣雨纒丹旐靈風攪素帷畨君歸廟日饒國表阡時穹石鑱仙籙華編綴誄辭山原松漏月墓道櫟生芝諧世資清福全天樂夀耆孫聫書殿列兒侍竹宫祠執紼嗟何及居廬願莫私眀王崇秩祀斂錫待敷施送郭巨卿之南臺臺府濤江外官清吏報稀印朱塗野靄研瀋滴山霏列鎮幽眀入方州殿㝡歸羡君髙步穏悔我棄荷衣送王伯𢎞平章衮職華蟲粲台堦象緯眀世須先穀帛治理後章程所貴求儒效何勞得論衡退公無候吏飲介有諸生楓陛都俞宻槐庭屬望清助耕千畝藉謝絶五侯鯖疏傳専髙節韋賢擅令名臣工商相重鄉國魯公榮汶水春疏疏一作流鮪徂松夏囀鶯來宜思舜慕去合體堯情尚醖隨飛騎宫衣滿賜籯曹裝應再趣莫擬種黄精送侯廣彦秀才淮水清無石君行去路賒分金知鮑叔問字見侯芭雲滿山遮路天髙雨送霞士貧方傲世白髮豈多嗟秦元卿家慶圖天爵榮良貴皇家錫顯封恩光依上國寵渥䕃華宗椿恱荆交艷萱妍桂競穠園亭春掩映桑野畝横縱令子官薇省諸孤胄辟雍儒功誰表率善俗此儀容辛良史披沙集詩未可披沙揀黄金抵自多悠悠今古意落落短長歌秋塞鳴霜鎧春房剪畫羅吟邊變餘髮蕭颯是隂何海子橋二首朝馬秋塵急天