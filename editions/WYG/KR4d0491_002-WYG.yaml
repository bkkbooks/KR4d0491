買禾耳可芟刓朝薦祈年觀昏祠太乙壇嘉生資五福哀籲劇三盤魚鼈還隂宅蛟龍謝夏官金穰夸浩浩粒食且摶摶神享希羞蕙靈歸藉用蘭車輪非有角馬足忽生翰帝念愚甿病民歌法網寛祝祠期不繆相國寸心丹送許誠夫大監祠海上諸神上聖崇眀祀元臣屬有文内香開寶炷制幣出𤣥纁授節臨前殿傳臚聽後軍酒清黄木廟魚祭武夷君􅄓母應回雨天妃却下雲不勞風有隧猶願楚無氛漕粟瑯琊見還珠合浦聞穹蒼天坱漭溟渤氣絪緼龍户編魚賦鮫人織霧紋畤祠光炯炯宣室語欣欣鵬運連畨舶軺歸願冀羣觀書曽拜洛歌賦不横汾越水琉璃静閩花茉莉熏伏波封莫請宵旰念華勛次韻阿榮目録作崇叅政輦路青雲上居人杳靄間寺鐘聞下界車轍在髙山倚馬才名世鳴鷄客過闗黄陂隔淮浦嵗晚約同閒元禮弟寄和韻野雲不肯出作雨漲山溪頗謂談捫蝨何如學祝鷄鑿池通竹逺揷架庋書低秫熟秋田後應知酒自攜適意夣想蒼龍闕盤桓汝水濵郡侯偏愛客秋雨更留人饌盛甞鱸鱠樽空倒角巾覉愁不能遣争奈二毛新贊御書雪林二字為趙伯寧中丞作聖主敷文化臺臣得寶書方圓河洛出次舍日星居禹畫州圻古羲文物象初克勤資負扆躋敬賴儲胥王錫非鞶帶天光豈器車傳家恩有渥訓徳義無餘浩浩氷華潔亭亭木本疎山輝因玉潤雲氣是龍嘘瑩爽才尤峻栽培力不虚眀良須慶㑹動植樂舒徐眷遇榮金匱謳歌媿石渠賤微叨下列瞻拜舞階除張元傑祠龍虎武當岌嶪芙蓉闕葳蕤翡翠幢祠官天北下仙屬日南降香雨沾春隴靈風鼓夜江神來乘馬四使至戴旗雙宣室還因鬼箕疇却為邦𤣥君眀月珮玉女白雲窻淑氣非烟縷祥光豈燭缸兩山通地脉萬竇響泉淙有樹皆生酒無苗不闕龜蛇龍虎地螮蝀好為矼求趙伯顯畫家山圖用唐李中韻春鴈南來後家書一紙無山花應向日陂水計通湖羸㹀衣資絮生蠶薄藉蘆久宜拂白石强此伏青蒲琴客分抄譜仙翁許借壺園紅榴火煉沼緑芡盤鋪嵐氣飄簷隙烟光鬱座隅呼雲横螮蝀問月看蟾蜍倚杖心何逸觀魚興不辜新開竹林逕併乞寫成圖猗緑園殖産吾何取開林我獨能縛船嘗取竹擣紙每移藤池曲波濤小花繁霧雨蒸春雲同礎潤秋月共江澄鳳下非因食魚來不可罾寫經還道士裹飯乞行僧筍屨新青折荷衣舊翠凝浮甌茶有乳溢甕酒無氷香灺留文篆書囊剰繚綾清晨飡玉罷東坐日初升贈蘆州黄孝子我家淮水上孝義夙多聞邑屋封華表丘園聘束纁久嗟毛義檄更嘆董生文白石山中去吾將問隠君雲巢道士弱水不容舠仙山本負鰲坊偏朝斗柄材或伐蟠桃網户春絲宻梁河夕蝀髙㸃金應有藥切玉豈無刀雨裏攀龍鬛風中拾鳳毛露珠凝藥臼霞纈暈綃袍箕尾人能遇靈槎客每遭隔塵勞夣想斥鷃在蓬蒿出都長城懐古處身在日華東水出盧龍塞山連碣石宫沙鷗終自白霜樹忽然紅雲海鴻濛氣歸颿杳靄中項子虚鍊師歸舊隠黄石書難遇青精飯易逢山中霞盡碧海上日偏紅舊種三珠樹新裁五粒松大年能駐景上藥可還童塵隔悲浮世仙成劇化工龍來寧有穴鶴放更無籠衣製波紋縠琴修火爆桐緑章飛洞府蘂笈奏神宫黙黙龜潛息憧憧蟻鬭聰鍊形吾體惡因爾問崆峒題恵崇畫樹林下瀨生秋響平林漏曙光蜀榿隂十畝閩荔熟千房不聽樵夫伐無勞匠石傷靈槎上天漢全棟架眀堂黯黯雲垂幔霖霖雨濕墻鴈奴呼伴審鳩婦擇棲詳路逺逢仙宅天低近帝鄉春行苔履滑夕坐筍書香東絹刀誰剪西園價爾償懸車清渭後白髮洒蒼凉虞伯生學士畫像韋相傳經業楊門世講官箕裘君自得文字我知難汲冢朱塗誤秦灰墨補殘黄流凝玉瓚僊露滴金盤不肯投漫刺偏宜戴小冠近林聽竹雨臨澗看風湍詔入蒲輪軟訶歸釣石團青山連石國白日照長安擬卜龜呈兆將書鶴借翰風流圖畫裏方自見神完登雨花臺積翠生層巘凝光浴巨濤呉城花覆井楚舸竹栽篙地近魚龍逼天空鶴鸛髙野橋皆螮蝀溪水盡蒲萄雨石逢芝箭風林得鳳毛臙脂兒女小罨畫鬼神饕六代都銜璧三山尚戴鼇故宫猶荏苒古樹漫周遭仙洞歌瑶草人家宴碧桃飯香非接淅酒好不篘糟緑霧春連閣丹霞曉映袍攀躋忻境勝跋涉憚人勞老我才還劣清資媿重叨採詩今有使問俗似無曺佳麗千年㝡聲名一世豪嵗時休澣日攜手可遊遨南野南野新亭好城坳築小丘飄花如一作迷虎落一作穴遇水識龍舟朝士尋山到隣翁載酒游五雲天坱􅀈書帙瑞光浮紫芝不用事霞纈盤華盖天葩擢矞雲孕靈非有種掞藻忽成文冠矗仙裁羽纓垂女製裙原田多衆草獨爾擅絪緼贈楊洞天道人我自不入俗君今乂欲仙鳥啼百花裏屋住萬山邊宻樹雲難過空潭月易圓題詩秋卷了為說小行年五言九首太行東北去形勢自天分一葦航吳越千車輓朔雲衣冠今復盛豪傑古猶聞欲獻三都賦茫然愧不聞不作還山夢因吟李杜詩平生無飽飯抵死只憂時事實兼唐史風流揖楚辭山川舊逰處千載有餘悲王子不耐俗還山應恐遲挑燈同此夜把臂憶當時愛我常懸榻逢人只語詩買田今已決莫負耦耕期好去春山路騎驢罨畫中徜徉紫芝客憔悴鹿皮翁得酒寧辭醉逢人莫話窮乾坤皆古意人自不相同御史青驄馬詞臣白玉堂有才皆展驥此老尚亡羊雲海迷舟路天風失鴈行不須愁白髮正欲媚幽光古意在眉宇新詩應口哦無錢賒酒得有屋喜人過宇宙千年事功名一曲歌執鞭吾亦可稅駕欲如何聞道光山縣城南十里賒人家依翠竹野水亂梅花應有仙燒藥寧無客艤槎行當問田畝結屋貯烟霞栽竹復栽花居然處士家有田供白飯無句咏青霞春雨浮隣甕秋船繫樹槎漁樵相見熟来聼讀南華又是蒺藜秋浮槎繫旅輈古城空石堞平野半沙丘自笑滄洲客還期汗漫逰明朝入衛國淇上買扁舟題張良卿御史乃翁萬户死邊詩卷莫恨將軍死將軍死是身子今簮獬豸國擬畫麒麟銅柱聲名舊燕然記刻新叢祠寄江右百世衞邦人春思調王修撰袁待制二首翰林王學士宅裏好花開白紵裁春服青錢喚酒杯終知老子興嘗望美人來笑我如椎鈍敲門一百迴京國春風軟名園花信来只愁添酒價還恐負詩才繡袂鞦韆下銀鞍騕褭囬詞臣應自貴深院閉莓苔再用韻奉繼學二首修撰官清切髙齋不易開青鳬憎緑幘黒瀋覆瓊杯日日裁書出年年賜錦來最憐山簡拙惟有習池迴山東豪侠客走馬兩京来芹藻流清譽絲綸藉美才但能鈴索静還使酒船囬夢想庭前鶴竒踪篆紫苔次韻咏石老石何年有依稀滿路旁無人愁飲羽有客坐亡羊戒世能言晋傳書豈姓黄補天成五色何獨柱眀堂北行山轉疑無路溪深似有雲衣裳沾沆瀣鞍馬入氲氤岩樹花凝晝崖藤蔓駐曛佛宫金匝匝帳屋錦文文塵坌車争出霞舒騎亂分烟中聽犬吠天畔見人耘草檄期誅泚歌詩擬弔蕡家家收棗栗處處種榆枌枕有仙人記琴無山鬼聞時巡勞聖主靈會召神君泉脉流釵股松身鏤纈紋團團㽞象跡矗矗立駞羣龍虎盤南石貔貅鎮北軍井鹽仍皛皛馬酒亦醺醺越貢珠璣錯夷琛翠羽紛弓旌徵隠逸斧鉞賜功勲俗已多羊酪民還賤豕豶雨餘雷菌長秋入地椒芬井邑聫山海倉箱溢隴汾白鷹隨雪鴈黄䑕掘田鼢太祖初飛御中原正溺焚劍光眀塞道箭影落窨氛聖嗣開元極天聲震大􅬧轅門方納禹國鏡又收員降主來銜璧奔君自束緼只今修栒簴何但去䡝轒公子衣縫掖王妃曳練裙期綿堯厯祚物阜舜風薰學士工謨訓成均載典墳小臣難頌徳祗合採書芸送同年趙繼清尹安陸席帽文塲裏于今十七年白鬚俱滿鏡墨綬獨行田鵜翼知吾刺鸞棲覺汝賢髙才多晚達未可嘆迍邅寄舒真人金闕來華盖琳壇集羽衣石因鐘乳膩松為茯苓肥劑墨香翻杵修琴玉布徽天低臨象緯日近逼光輝竹裏開長逕池邊蔽小扉紅迷霞綺錯緑漲水環圍仙杏葩凝赤蟠桃萼剪緋龍來還獨宿鶴去更知歸割蜜蜂先避銜書鳳自飛祠雷陳古磬符鬼掣靈旂丹井泉偏冽銅盤露未晞俗人那得識詩客盡相依伊我逢休澣從兹詠浴沂憑師消鄙吝猶可採山薇送華山隠之宗陽宫江閣魚龍近山房霧雨多地清天不暑池曲水無波筍籜迎書帶櫻桃送錦窠呦呦呼伴鹿唼唼換經鵝養素行編屨乘閒坐織蓑㡬篇飡玉法一帙醮星科香灺沉銀葉衣裾佩紫荷丹光留海月絳景出松蘿醉憶泉浮乳幽憐石爛柯神君攀緑桂天女踏青莎邀客登山頂尋真入澗阿洞簫吹道曲雲紙寫魚歌予髮今如此君心可奈何髙壇見明月為我問娑羅石田山居八首甲子人愁雨河田麥已丹嵗凶捐瘠衆天逺禱祠難賈客還沽酒王孫自飽餐更憐黧面黒征戍出桑乾積雨衣裳濕愁人是麥田泥將深沒馬霧欲墮飛鳶爨火勞薪盡家居老屋穿墻根雜蛙蚓擬買繫籬船光山楓製錦潢浦荻飛綿秫熟何論酒魚来不計錢卜鄰多野老求藥有神仙為客留羮筍清晨步石田四月淮天雨清林䕃碧池筍香鄰瓮酒禽響一作聴客窗棋田鼓春迎社鄉巫夜賽祠漸知飄泊久自覺是農師無麥夫何極吾憂隴畝空豈能驅盗賊得忍鬻兒童荼蓼充腸熟樵蘓救口窮無端縣小吏召役到疲癃作客何多意淮南即是家自牽蘿屋小不正葛巾斜書懶眠尤熟詩来酒更賒春天雲嫵媚相對坐鷗沙竟日無賔主山房一老翁竹光浮晝碧花蘂颺春紅田父分雞桀一作柵鄰僧乞鶴籠時行親杖屨未覺坐書空淮南窮僻地先世有林廬花曙鳴山鳥芹春躍岸魚鼓琴仙度曲種杏客傳書朋舊如相覔休嗔禮法疎郎中蘇公哀挽墓門翁仲泣秋草九原深身世書盈屋鄉園樹滿林故人多執紼令子早冠簮曽作陽闗曲今成薤露吟古城熊翁夀考髙年開八袠治世遇千祺馥郁蘭當砌葳蕤菊滿籬子能知負米孫更喜含飴但願雍熙内吾民盡耄朞一作期石田文集卷二
