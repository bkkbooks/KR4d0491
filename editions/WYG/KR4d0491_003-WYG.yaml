body:
  text: 石田文集卷三元馬祖常撰七言律詩用樂天韻因效其題詠閒意繅絲車響雨來稀罨畫圖中住翠微村北村南桑扈呌家前家後竹鷄飛青憐藤蔓春牽屋綠愛荷盤夏剪衣更憶江天家萬里行逢僧子借船歸寄王繼學待制奎文爛爛繞樞旁一代詞臣屬馬楊天碧綾浮鸞誥濕水蒼玉動鵠袍光侍祠竹殿辭靈幣奏對楓宸拜帝觴藉甚聲華才更逸如何三十不為郎夀郝大參退傅歸來髮尚青角巾閒對老人星鳯凰池上辭松閤鸚鵡洲邊買竹亭留客只談三里霧見人不問五侯鯖慚無剛夘為公夀他日淮南種茯苓和張彦清司農喜雪二首剡船乗興便閒來不問樽罍幾日開春水起時寒欲盡梅花多處氣先催天街綽約清光遍雲幌依稀舞影廽已是豐年調玉燭京華倦客豈悠哉萬木鱗皴凍欲黧曉雲一色望中迷紛披紈素拈花樹㸃綴珠璣布稻畦沙嶼有聲鳴夜鶴氷溪無影照山鷄蓬山仙客多清興間日題詩對紫泥寄隠士林下蕭然一病身可憐家計若為親葛花藤蔓供山貢菰米蓮房給水珍鶴子見貧能代僕犬兒知主㑹憎人清朝日日弓旌出誰説巢由不肯臣送趙敬甫侍御赴江西鎮南昌㑹府盛才猷􅔕馬辭天又此遊二十八州當左轄幾千百里望前旒江明旌節文魚躍秋入衣裳畫鷁浮若見昔年徐孺子急須下榻問名流寄吴真人二首彈琴峽北翠華遊仙子翩翩夾御輈日觀占雲乗顥氣星壇回斗酌河流菊花香晚思三楚桂子秋高下十洲應憶南都舊狂客青田歸鶴作書郵竹宫日近鳯凰遊龍輅秋清白玉輈羽服侍嚴天帝子鶡冠書讀道家流雲高塞嶺松生石霜入江鄉橘滿洲仙客通靈塵慮盡南風日日作詩郵寄王繼學天北剛風去馬輕葛巾清景駐瑶京裁書綵筆卿雲爛照字青藜子夜明簷鵲聲乾人問訊舄鳬飛慣客驚迎靈槎八月應南下夜聽銀河有浪聲奉和鄂通都事秋懷靈河七夕巧雲稠墜露聲清夜得秋月冷桂花飄左界山寒一作空又作深荔子落東甌人憐紈縞裁衣袂誰借蒲葵剪扇頭竹影近忩砧杵急夣隨南客問行舟九日在告青山到屋三十里瘦馬不能閒一過欲趂重陽浮菊蘂轉愁落葉下岩阿南鴻帶雨秋飛急北谷來霜夜杵多病裏題詩遣野興何人携酒與高歌送侍御之南臺雲蕊天然拂曙橋鍾陵松檜識南朝臨書應憶晨趨漏把酒何妨夜聽潮官美當年裁錦繡時清今日奏簫韶佇觀召對通明殿别擬題詩寄使軺送王眉叟真人還錢塘濤江秋半潮頭起來鶴亭高瞰雪堆白㲲仙衣分鷺羽綠華洞府乞松栽閒留長日人間住獨伴飛雲海上廽何事而今東去疾孤山十月早梅開題若容擊劍酣歌白日迷高情邈邈見天倪石潭藻舞魚深泳花嶼春明鳥自啼架上道書研宇宙篋中衣帶剪虹霓洞房清晝奩香轉坐聽東街馬過泥雙頭菊金屈巵邊醉袖垂秋雲如幄貯仙姿寒生小靨廽鸞動香入流蘇睡鴨移結綬巧承西顥曲落鈿羞帶月支眉青霜為我催憔悴銀屋何人怨别離夀故相秋谷鄴侯書帙滿高堂韓國封圻啟故鄉鳩杖倚雲吟雪岫鳯笙吹玉薦霞觴人問宰相青霄近天上神仙白髮長豈獨夀星明子夜春風岑嶎長琳琅夀閒閒真人和吳養浩博士韻太乙壇高夜氣寒三芝八桂影闌干寳雲蠧獸青金鼎素靄凝氷白玉冠竹雪珊珊承步響松花拂拂落衣乾高真御氣仙官應南極星騎五色鸞壽中丞公石室巾箱爛卿雲芝庭旌節照秦軍三珠樹茂仙官應二葉蓂生夀厯聞皎皎素心凝北雪垂垂白髮濯南薰太微光氣明如水坐見臺烏集夜分送道士趙虚一祠海岳三珠樹影滿雲間萬里南天去鶴閒弱水浮舟求玉磬𤣥都結襪繫瑶環吹簫谷口雲遮路貰酒江邊月動山仙子無心問塵俗手中空握五芝還送呼圖克岱爾著作祠岳瀆戊午狀元日長東觀著書清絳薦龍香為帝擎山岳發靈銀甕出河宫迎節馬圖明行觀謡俗期星使歸奏蕃釐拜月卿千里楚鄉乗傳去關人應識棄繻生和張蓬山司農韻蓬山高對石淙荘水磑飛輪日濺霜后稷官清芝檢濕杜陵天近竹綀凉題詩獨喜輕紈素書笏重須奉赭黄下客揚雄貧嗜酒只今先有碧筩觴和繼學郎中送友歸越中薊門東望海無波誰許山人問薜蘿雀舫春聲留水鷰鵠袍秋影動天鵞鑑湖草滿芙蓉少鄞縣一作水潮來牡蠣多羞見京塵遮帽頂羊裘亦欲換漁蓑贈劉時中江海歸來氣尚豪立談便合擁旌旄青衿令子箕裘美白髮賢妻井臼勞才大豈能期世用數竒還不救名高公卿知已吹噓易笑我官曹似馬曹挽何得之先生手織烏紗日賣錢全家閒住五雲邊伏生有女書空在伯道無兒世共憐北市行歌花爛漫西亭坐嘯月嬋娟少微光氣今年闇知是詩隨過海船應制夀趙國公聖徳如天念老臣詞林奉詔製詩新龜齡何藉依潭菊鶴髪偏宜對雪筠八蜡節迎千室飲三公官貴一身貧角巾野服林亭下正是耆英社裏人過錢塘老翁八十能鉏豆記得江南亡國時驕將臨邊方棄甲孱王入海却張旗過秦才子方頭白辭漢仙人豈淚垂東觀史臣班馬行乞書今古作元龜錢塘潮石橋西畔竹棚斜閒日浮舟閱嵗華金鑿懸崖開佛國玉分飛瀑過人家風杉鶴下春鳴垤雨樹猿啼暝蹋花欲賃茭田來此住東南更望赤城霞追和許渾游溪夜囬韻溪水連雲過竹間溪聲雲影半潺潺鶴來近屋童看熟鷺下長松客對閒直待月痕侵石塢還期烟色認柴關人生豈獨官為貴好向君王乞越山書事伏蒲論事屢逢訶白髮而今更奈何好去仙山尋種杏敢期帝里要鳴珂囊中舊笏書青竹篋裡新袍稱紫荷百畝湖田三畝宅南天春雨白鷗多盖善長御史泗濱堂泗水千年碧似藍泗濱華屋締楩柟人從路北耕春雨山自徂徠供夕嵐方印只今垂組紐長檠猶獨近書龕天邊倦客滄洲逺卷裏題詩興未堪奉和新除袁侍講見寄周京宴鎬漢汾河蓬鱠何須丙穴槎東觀横經環壁水承眀寓直賦卷阿人間玉價連城少天上文奎左界多長日相思南望切羲車休怕魯陽戈賦王叔能宅芍藥鶯粉分奩艶有光天工巧製殿春陽霞繒襞積雲千疊寳盝脂凝蜜半香並蔕當階盤綬帶金苞向日剖珠囊詩人莫詠揚州紫便與花王可頡頏用繼學郎中韻再賦花入簾櫳草映裙春雕紅玉百旉分重重艶暈寒浮露拂拂穠芳暖撲雲秉燭客來追貴主結褵人去嫁夫君韶華未逐東風老薇省題詩酒半醺上京翰苑書懷三首沙草山低呌白翎松林春雨樹青青土房通火為長炕氊屋疏凉啟小櫺六月椒香駝貢乳九秋雷隠菌収釘誰知重見鰲峯客颯颯臨風鬢已星門外春橋漾綠波因尋紅藥過南坡已知積水皆為海不信疏星又隔河酒市杯陳金錯落人家冠簇翠盤陀薰風到面無蒸暑去鳥長雲奈客何萬里雲沙碣石西高樓一望夕陽低谷量一作深牛馬烟霞錯天險山河海岱齊貢篚銀貂金作藉官窑磁盞玉為泥未央殿下長生樹還許尋巢彩鳯栖自和星字韻天路扶摇上鳯翎龍岡初雨佛螺青不須李實沉氷井却愛花隂轉月櫺蠻府納琛珠度網精藍浮屋木攅釘要知聖世求賢急夜夜官占處士星九十三嵗老人康寜居宣徳府我無麯糵為春酒翁得期頥作夀棚鳩杖賜來堪佚老鵜梁辭去不同升五原白磧秋迷樹一曲黄河夜合氷古有乞言今可待逍遥全福見𤣥曽送胡長史之淛憲淛水秋濤溢尾閭外臺清政自涵虗七州課㝡求儒效一府分曹責吏書氷蘗乆知諧素履風霜兹復見㢘車春坊記我曽聮屬懸喜迎親侍板輿送史顯甫之南臺江東宛在國門南臺府治書即坐談十道㢘車彈鬼蜮百城公櫝問楩柟高名不倩官為貴雅士方知俗可慙使節賜環君莫厭侍臣催入待傳柑次韻王參議寄上京胡安常諸公四首氷盤珍果進紅消九部新聲擬奏韶洛宅土中諸國㑹甘泉天近從臣朝仙官鳬至應飛舄㢘吏珠還豈織綃早晚秋河烏鵲度彩霓千丈不須橋石甃氷澌古不消廣寒張樂喜聞韶五坊戲馬春旗合百隊囬龍曉仗朝閶闔門高承藻井畨禺縣逺貢鮫綃年年載筆陪京道題柱相如又過橋步輦晨移紫殿隂龍光天表影浮沉講臣白首求儒效宰屬丹衷體聖心池上鳯凰當閤早洲邊鸚鵡浴江深太平化日長如嵗賜酒頻來豈抱琴省中温樹晝隂隂郎署熏衣盡麝沉星近紫垣明上界日行黄道對天心和鸞秋駕車塵靜佩玉朝鳴漏水深好乞龍門灘上石種桐千尺斷為琴次韻宋顯夫東觀著書閒日少還能信馬御溝行翠華閣迥天雲近海子橋長日棧平氷泮水深船對屋日遲春早樹迷城芳年似酒何人問盡屬而今坦率生次韻王編修送彭道士南歸故山松老鶴知年歸寫丹經帶槧鈆鍊杏春林求水碧步虚秋館佩山𤣥石鞭海上無精衛花發江南有杜鵑一曲鑑湖何處覔我今騎馬似乗船送杜時可提舉儒學成都萬里不可到見君西去動我情百鵑夜啼巴樹逺雙鳬秋浴滄江清學官米廩出邑屋弟子書笈過金籯三十儒冠桑梓國猶記太常韶濩聲贈陳玉林道士學士書名御榻前先生歸卧大江邊飛龍亭在山還好伏虎丹成鼎不穿萬頃玉林烟滿地九重金闕日升天聖君若許秦淮去擬借雲房宿一年貢院憶繼學治書棘闈粉署隔重墻校藝分官屬正郎五夜風簾燒蠟燭九天氷樹劑龍香周旋接武尚書履供帳留筃御史床臚唱閤門春色曙侍臣應奏慶雲章治書寵和誤用光字仍再次韻二首金吾魚鑰限南墻襆被淹旬借直郎燈轉九枝囬晝景筆題雙榜奪春光畨禺珠琲寧無樹勾漏丹砂信有床明日大廷親策試昭囬雲漢見天章春巷門深薜荔墻月輪修桂倩吳郎入簾縹纈浮簷影出院紅筵映酒光駿馬百金還買骨靈龜五總不支床治書臺上風霜劇囬首文塲賦和章治書再和復次韻西南春巷杏花墻索米長安漢㦸郎市裏忽聞鷄吐綬海邊還報鳥含香月移桂樹通階石芝發銅池謝井床儤直閤門休沐夕新詩刻燭賦千章貢仲章待制寵和次韻宫雲光影度椒墻待制官高不是郎夕拜日升龍尾道朝回天賜馬人一作牙香戴慿乆負談經席阮籍唯知近酒床春巷杏花開未遍門前欣得碧霞章高彦敬黄州雲山圖雲山萬疊江南岸江北高樓眺望時晴靄蔽戲橋過市夕霏薈蔚樹連枝行人不帶遮塵帽遊客嘗擕注酒巵我有故園淮水上竹岡相接到黄陂濟南張老人張翁八十髮青青閒愛湖光瀉醁醽不賣道邊居士履還隨天上老人星花濃蜜露鶯調舌石戴車雲鶴養翎我欲東遊華表柱古書重向伏生聽畫古木桑空河上生賢相楓老山中化羽人未借九闗當地軸還曽八月上天津雷燒桐尾琴材古玉刻龍形劒具新雨蝕蒼皮苔䕶石泉舂玉乳月飜輪東堤楊栁春烟暖西浦芙蓉曉露勻偃蹇孤根岩壑氣我知棫樸不為薪繆郎中雪谷早行圖十里寒林葉盡凋谷中深雪客行遥留連獻賦游梁苑辛苦哦詩過㶚橋竹裂若聞金石奏山空不聽斧斤樵未央殿上氷花滿郎吏催班已趂朝東平慈母高堂慈母晝垂簾花蕊青春不拂簷雨濕堦蘭紅爍爍烟浮墳草碧纎纎兒翻舊繡装書帙女染新絲刺鏡奩過客莫題華表柱聖鄉仁俗溢閭閻鄢陵别南客稜層林表白浮圖古鄢城高客望孤秋雨喜沾梁土麥暝烟愁合楚田蕪行人北上隨沙鴈歸客南還對渚鳬溱洧波清多草樹百年生聚尚繩樞坐曹太平文物屬儀曹長日垂簾手板操望裏鸞栖知首樹坐中鯨掣得宫袍舍人草制春朝急郎吏分祠夜拜勞禮樂南宫官獨美尚書詩句詠蒲萄盤居李氏京塵敝盡洛生貂高隠盤居獨寂寥李愿固知周士貴黄公還受漢家招山中白石饑來煮鑪裏丹砂靜後燒夜讀五經同異處更嫌秋樹響風飄一作飈寄𢎞長老雲山曙雨初生螮蝀橋梵山吟唄不移朝曽分禪榻春盤礴更想雲山夜寂寥繭紙題詩尋伴少郫筒沽酒入城遥佛龕千丈金銀界照世酥燈弟子燒贈醫士簡秋碧華陽茅主送黄精太岳秦松與茯苓上藥相時登夀域良醫名世即仙靈教人攝氣如龜息笑我胖身豈鶴形昔一作若借刀圭明月合浮生都可享遐齡送西臺治書張孝錫關符先過漢祠州鄉國淹遲父老留黄竹有歌天子聖青蒲無伏諫臣憂黄河夜落魚龍上華岳天低草樹浮萬里西南觀黜陟㕔前涇渭已分流送吏秉文祠岳瀆還家驛吏候官江漢晚皇華星使賜袍光金明繅藉得神玉鈿合文奩出内香井絡坤維山國壮朝宗南紀海天長過家下馬歌桑梓却笑相如負弩鄉龍虎臺應制龍虎臺高秋意多翠華來日似鸞坡天將山海為城塹人倚雲霞作綺羅周穆故慚黄竹賦漢高空奏大風歌兩京巡省非行幸要使蒼生樂至和徽政院公退早春天氣半晴隂坐隔宫墻望上林御水有波皆浴鳯官橋無栁不拖金相風竿直青雲近井幹樓高綠霧深朝路暮歸塵更合五方調馬出駸駸贈壺洲道士青田山中養仙鶴不去人間作小官夜拜竹宫穿紫氅晨飛鳬舄上𤣥壇蕊珠舊結桫欏子金粟新生沆瀣盤我有滄洲仍不逺小山桂樹正團團送安慶路教王中夫南國烟花一萬重船浮春水正溶溶舒州城壮山偏䕶博士官清印自封夜誦挑燈吟蟋蟀秋行携酒採芙蓉仙人李白今應在問訊時時過宿松送蘇州卜者㡬嵗京華賃屋居得官猶苦食無魚成都誰問君平卜江左人知郭璞書春水浮空波緩緩秋機織字錦舒舒虎丘剰飲千鍾酒醉裏高歌唱闔閭送胡古愚歸東陽二首藉藉詩中一世豪瑶池三度食蟠桃小移夜雨紅蘭槳旋剪春風白紵袍供奉氷銜從古貴東陽酒價近來高行臺若見王公子道我官曹似馬曹江東㢘使王繼學也沈約才清不耐秋歸艎南去漫夷猶還家少拂雙鴛被到闕重修五鳯樓袍色映江榮錦里詩聲傳紙快書郵蘭溪盡燭非蓮炬春早來從十二旒奉陪薦食英宗神御殿用繼學韻乗石松隂偃翠虬先皇曽此駐龍輈茂陵弓劒隨天御原廟衣冠奉月游藉玉已行周制度酎金不罰漢諸侯百馨水陸修葅醢望拜孤臣涕莫収題道士山水畫江翻墨瀋漬氷絲白日沉沉暝藹姿鶴影照雲星度竹猿聲裂石澗流澌千林雨暗歸人急萬里天長去鳥遲咫尺東南山水國仙翁曽約種靈芝送客歸揚州揚子江頭水拍天人家種栁住江邊吳娃蕩槳朝生浦楚客吹簫月滿船錦䌫憶曽遊此地瓊花開不似當年竹西池館多紅藥日日題詩舞袖前挽黄平山次掲曼碩韻半生書劒未淹遲奏賦明光紫槖垂西漢滿朝傷賈誼南陽合郡愛宗資名書丹旐懸棺日餅啗紅綾賜食時曽得杏園陪末席淚流紅浦月初離送王參政上京奏選二首滇池細馬踏龍沙宰相朝天路不賖峽裏琴香春作乳月中珠樹夜成花三千禮樂尊儒術百二山河壮帝家魚上禹門無㸃額直郎宣奏日當衙千官吉日聽宣麻白髮文體要作詞臣帝汝嘉池鳯有毛皆五色蕊珠無樹不三花綠綈詔底書分雨紅錦囊中字剪霞天路北盤三十六歸時秋月滿京華贈内幾年不到鹿門山妻子相看亦強顔桂樹有枝曽獨折女蘿無蔓不同攀仙人樓上騎黄鶴野客籠中放白鷴莫恨五湖波浪闊鬢毛歸去未全斑陵州留别續總管賃車同出鳯凰城十日還同問水程烟浦買魚寛客意河梁分袂念交情頌聲擬刻山陽石召節重馳使者旌我去淮南茅屋底著書先記續矦名王道士慶夀堂生男不必皆富貴學道亦足傳其家堂上日進青精飯忩中曉發蟠桃花放船過江槳蕩月起屋對山門掩霞陶潜有子覔梨棗小官折腰酒自賖畫海棠圖石家五尺珊瑚樹海國千房火齊珠風雨春寒圍錦䕶艶陽天暖倚闌扶浣時應貯芙蓉水香處重熏翡翠爐紅膩不隨蜂觜蝕粉勻終為蝶身敷葳㽔綵纈盤仙綬襞積雲羅絡舞襦青帝化成非幻有杜陵吟老却知無催開每賴斟鸚鵡吹落還因唱鷓鴣曽見赤城花亞蕊丹鉛此去不須圖送貢秀才還江東别業上壽雅歌謄冩碧雲箋共詫靈椿壽八千天上飛光無短景人間上壽有長年看花曉塢扶鳩杖漲水春池上鷁船秀髮疎疎松並綠方瞳炯炯漆爭𤣥諸郎玉雪庭前滿仲氏文章海内傳養老㑹逢親執爵逸書重喜誦亡篇琴囊紅蹙天吳錦宿榻青裁海艾毡太史占祥南極下宰官造命泰階前雲林舊業青山近白首江東願一㕓送胡震亨巡檢獵獵雙弓騎氣張古來逢掖試穿楊清江鏡鑄芙蓉月綠酒筵開玳瑁堂稻熟萬塍初下水橘垂千樹已經霜藍袍包裏迎丞簿莫負尚書薦鶚章送毛真人還山朱提仙印碧霞裳賜履承恩自尚方雨洒石壇苔錦滑日穿油幌竹書光葉鳬此日還滄海漢鵠當年下建章琪樹萬叢枝萬本江南歸路水雲香奏對興聖殿後萬花簇錦寳簾垂化日舒舒漏下遲馬酒金盤流沆瀣凌人玉井出琉璃侍臣槖筆皆鶴鳯御士櫜弓盡虎羆他日滄州應夣想紫宸端御放朝時贈都省掾金世用丞相東曹漢省郎青雲布一作步武近含光龍門千丈魚先上遼水三秋鴈作行伯仲塤箎今又合季昆金玉古猶光脊鴒原畔多春草親令兒童禁牧羊雜詠三首百丈牽船泝上流清淮從古有三洲浮山堰逐降王去淝水波因小謝収紅樹有霜還可騎白蘋無雨更宜舟平生自是多行役莫信吾家馬少游濠梁無客更觀魚游子行過莫問書潮落沙痕鷗泛少風囬雲影鴈行疎歸㠶夜宿山前寺從槖秋辭仗外車俯仰此身天地内滄洲重去帶經鋤步出汀洲拾翠翎仙家幢節樹亭亭山隮薈蔚籠沙縠波㵼漣漪漾醁醽黄鶴來時天有日𤣥猿啼處夜無星舟行又過淮南國招隠詞高世莫聽挽劉自謙鯨海曽觀萬里塘青衫歸路髮蒼蒼江淹筆去文都盡庾信名高宅已荒升斗鶚書何足論古今鵬一作鵬賦更須傷都門酹酒皆兄弟目斷天南鴈數行送貢仲章學士名山星使漢官儀原隰光華四牡馳光武不矜銅馬式王褒先頌碧鷄祠江雲浮樹春船稳野雨鳴簷夜枕移白髮故人相憶苦可能千里寄梅枝題李仲賓墨竹石田犖确萬琅玕天乞幽人寫素紈帝里未求吹鳯管溪翁先覓釣魚竿玉烟乍合春還煖書粉初飄露已漙聞道潞河單舸賤截篙樂去看江湍西山鳯城西去玉泉頭楊栁堤長馬上遊六月薰風吹别殿半天飛雨洒重樓山浮樹盖連雲動露滴荷盤並水流艤岸龍舟能北望翠華來日正清秋𤣥真觀借居山光朝暮鳯池西襆被仙家共鶴栖且向竹林移坐具都將柿葉寫詩題宅門好傍神清洞書燭終燃太乙藜昨夜𤣥壇星斗近步虚聲外望文奎和閒閒宋宗師牽字韻牡丹芍藥殿春後落花游絲非有牽南城道士多芝秀東郭先生雙履穿飲酒不醉客來惡看劍長吟我豈仙空山松桂石齒齒芒鞋襏襫行雨天試院雜題十首小雨霏微不作泥棘闈魚鑰待晨鷄銀袍影近花燈立綵户光連粉署題霡霂已霑文運慶絪緼猶覺化鈞齊端門三月黄金榜應有商霖應上奎蓮炬銀臺堕䗶泥􅉊毺重席織文鷄計偕萬里人交趾骨買千金馬月題省樹春囬珠蕊亞御溝氷泮纈波齊臚傳名上多龍虎昨夕官占已報奎詔鸞封濕武都泥賜食沙羊雜樹鷄黄道日中依觀闕紫㣲天近隔榱題麒麟纔出千人賀鸑鷟初生五色齊聖主文明天下治澄澄雲漢夾宸奎一石黄涯半斛泥披沙新詔下金鷄校文眼澁尋詩句體國心勞選賦題須信楚材生六晉還知漢服出三齊太平有象文明盛帝主星垣望畫奎春闈新雨透花泥學士聮詩擬鬬鷄騕褭龍媒來大宛狻猊獅子出雕題宫花壓帽牌金小官錦裁袍綬綵齊奏牘三千方朔健天章爛漫象西奎歌詩且莫到青泥好倩王褒頌碧鷄人去淮南愁米價鴈來江北問書題催花曉樹飄簾宻滋麥春膏覆壠齊最喜泰階平在位衆星分次繞明奎切玉昆刀似切泥還憐石鏡舞山鷄殿前將奏長楊賦橋上應留駟馬題合浦珠光秋月並豐城劍氣夜雲齊校文學士清華職喉舌尚書亦近奎官曹連舍隔雲泥日下簷牙聽午鷄華表流蘇垂綬結承塵斗帳鏤銀題艶陽明處花開早社日來時燕到齊誰占少微江海上都將文氣應天奎關門不用一丸泥席帽慚聞客舍鷄心校五經無篋笥手書千牘有籖題馬來楊栁長橋曲船去芙蓉斷岸齊明日杏園袍笏㑹紫薇垣外見重奎遊客春來醉若泥攝官一月伏䳄鷄連筃夜聽同年語寫紙朝分舉子題畫閣薰香金篆鬱銀臺燒燭玉蟲齊大官已具恩榮宴列宿重輝想次奎貢院再用鷄字韻五雲畫省擣紅泥孔雀屏開吐綬鷄射䇿第高天上奏抒情詩好竹間題珍珠箔裏新名滿鸚鵡班前外仗齊禮樂縱横千卷字人間白日降靈奎石城縣尉石城縣尉坐寒㕔日有新詩寫後屏官小不騎沙苑馬書多空識楚江萍老兵束矢除階草佐吏休衙罷閤鈴兄弟幾年為我友何時同舍究殘經陋巷入巷無溝水不流庭坳積潦拍堦浮塵埃乆隔陂塘凈雲霧新和竹樹幽汛汛坐知雙鵲喜滔滔行想萬人憂今年吳㑹多秔稻廊廟應須念有秋張居士手種梧桐斵素琴新開墨沼寫來禽人間日日朱門别江上年年碧草深勾漏丹砂慚自乞鹿門夫子願同尋我今五十身多病翹首南雲望故林送揚州方教授煬帝宫前錦纜舟江都不是古揚州船中鏡鑄芙蓉月橋上簫吹楊栁秋芹藻有歌來士子魚鹽無賦到田疇戴憑重席男兒事莫向淮南怨白頭送四弟元學南歸吳松江水是蓴羮汝獨南歸不憶兄問訊泥塵騎馬出曽如簫鼓擢船行潮通海浦鱸先到雨濕書芸蠧未生好葺鴨欄當宅後吾來同汝醉春城寄王繼學亷使班超生入玉門關聖徳如天逺賜還已有聲華通北斗又將詞賦動南山薇垣春滿雲猶溼荔浦秋生月更彎京國故人星散去病來題字不能刪寄簡西碧縣尹桃源縣令無齋馬秋日吟詩江水頭錢少陸機猶賃屋才多王粲更登樓之官便是民如子趨府還知郡有矦襦袴歌謡今在路軺車徵聘侍宸旒送薩天錫南歸千里鍾陵路不遥銀河可惜未通潮龍江擬去浮三翼鴈嶺翻來給一軺愧有簡書煩逺使恨無詩句詠前朝清溪水漲荷花滿留水一作日永南牀再見招題京師山堂夫君家住五雲邉却愛青山近几筵養得池魚通鳯沼飛來宫鳥認鷗天風篁戞玉香飄粉雨石生苔錦作錢我亦江東借官舍烟霞堆裏屋三椽送湖廣御史楚徳爾江漢清秋萬里天繡衣持斧正當年瀧溪船上芙蓉水合浦珠還牡蠣田臺樹霜寒飛白簡庭蘭日暖䕶青毡百城官屬勞重問自古難知即墨賢喜小孫誦書弋釣為生不負丞江關詞賦屬徐陵舊傳仙訣能飡玉新試官箴合飲氷坐上看雲秋渺渺夣中聽雨夜澄澄淮天七月猶多暑喜見兒孫學聚螢光山縣尹孔凝道作縣有聲鄉人為圖光山近在故山西樹滿江頭稻滿畦隣屋讀書相教授社祠醉酒共提携水牛礪角嫌耕少野繭抽絲喜價低春雨行田無從吏獨騎齋馬畏青泥無題四首瓦溝銀竹曙翻江閬苑凉風滿石幢葛令寄來丹臼一陶公歸去酒瓢雙梧桐寂寞陳公井薜荔扶疎玉女忩天畔帝車呼小鳯桂花流水夜淙淙鶴城十二疊瑶光琪樹懸秋四面香蛺蝶染花生粉白玻璃著酒煖金黄熏爐舊夣憑荀令燭釦閒吟屬沈郎南國鴈來書不至江樓誰為製荷裳三湘瀟洒恨無潮烏鵲填河願有橋丹穴鳯來龍樹逺海門魚去蜃樓遥已知京兆誇高髻不信章華鬭細腰船尾横江春水急長年無事醉吹簫愛酒書生白髮垂鸞膠獺髄豈能醫漢宫鬭草端陽節唐殿穿針七夕時竹上蠣房真可買石間芝箭似難移揚雄擬奏河東賦但乞君王酒一巵次前韻岷峨山下錦城江好買𤣥都翡翠幢竹種篔簹千萬个鳥飛鸂鶒兩三雙銅龍漏下春生水金馬神來霧入忩花落天台招小隠胡麻飯熟石淙淙切玉龍刀寳氣光袷羅半臂麝臍香荔枝嚢宻嫣嫣紫盧橘圑金顆顆黄秦氏故矦更漢主石家小婦嫁孫郎江心誰鑄芙蓉鏡照見嫦娥織翠裳錢塘八月水生潮邛筰千年竹架橋簟織龍鬚天路近衣裁蟬翼渚宫遥府中丞相魚垂帯閫外將軍箭揷腰無奈黄金閒買賦雲間學得鳯凰簫樂部韋娘舞小垂病來能召翰林醫嗔人書奏三千牘勸客歌詩十二時金谷花枝隨雨盡石城江水逐潮移世間若有神仙術西去瑶池醉酒巵大明殿進講畢侍宴得詩二首勸講京闈咫尺天聖恩留侍大明筵東風律應軒轅樂左个陽開月令篇春動仗旗囬綵暈日浮忩鎖炫華錢百珍水陸難名品因笑傳柑詫昔年漢殿千門飾寳瑶直郎先奏進經朝諸儒泥古言雖固明主思賢道已昭飲酒敢同魚藻賦制詩真過栢梁朝小臣槖筆詞垣側白日無翰遡赤霄龍門萬壑奔流一峽開君王嵗嵗御龍來人間塵土常相隔天上星辰到此逥草木四時承午日風雲半夜束春雷自慚曽奏長門賦跋馬徬徨念暴鰓還過龍門紫塞秋高鳯輦廻龍門有客去還來蕩摩日月崑崙坼吐納風雲混沌開天帝有神司主宰地靈無力戴崔嵬誰知石瀨成飛雨不使時人汚酒杯次韻繼學桑乾嶺雲間酒斾掲高竿蒼翠烟霞屋下看一逕似腸縈鳥道幾人如艇泛松瀾龍門有路天津濕劒閣無銘石骨寒便欲乗風凌倒景八公先到我劉安次韵送上官伯圭二首閶闔風吹雨一作向别州才華生世重前旒終軍關右須乗傳王粲荆南不上樓黄鶴白雲鸚鵡夢金陵江水鳯凰遊東船載雨瀟湘北柿葉題詩寄十洲笛聲吹徹古梁州人自天南望扆流絲雨縈空黄篾舫瀏風清署一作暑錦江樓武昌魚美三年别司馬文髙萬里遊急買秫田多釀酒重來袍色映滄洲次韻李行齋集賢二首仙掌髙承玉露和夜凉如水曉生波鴈門鉄騎横秋出象郡金輿映日多月落無烏啼石樹天低有客泛星河玉京斗酒錢三百醉倚鰲峰一曲歌英聲藉甚著天門詩句年來與我論沙磧翳雲歌北塞稻畦分水夣東屯秋風八月欺茅屋夜雨三更注酒盆明日桑乾須繫馬翠華過處看承恩寄姚叅政上都南薰清暑上京居六月凉亭正好魚雨嶺火明山芍藥風田金動草一作早又作水芙蕖甘泉曉仗臨前殿京兆秋塵待屬車侍從文臣行不送舊寮偃蹇意何如弔王儀伯左丞生平不肯學時人死後如今毁譽真下惠獨全周士貴董生猶比漢儒醇中山舊宅詩書滿庚水荒阡草樹新身達位通心未遂傷哉誰識魯西麟偶成二首自愛屋南芳樹林十朝暑雨翠沉沉地清詎知無棲鳯烟合時復有鳴禽讀書草堂生曙彩望野古城留夕隂莫道楚鄉風物陋文章屈宋到如今出京不寄入京書淮水南邊有舊居官比馬曹過騎省文因狗監愧相如西岩仙杏終來鳯東谷湯泉亦戲魚豈是髙情能放逸山中蘿桂正扶疎送宋顯夫南歸琵琶溝北識君初藉甚才華二十餘欲賦兎園干孝邸不因狗監進相如瀟湘路熟逢知已韋杜天低望故居携㓜歸來拜丘壟南遊莫戀武昌魚駕發上京蒼龍對闕夾天閽秋駕凌晨出國門十里貔貅騎騕褭一雙日月繡旗旛講蒐獵較黄羊圈賜宴恩沾白獸尊赫奕漢家人物盛馬卿有賦在文園和袁伯長待制送虞伯生博士祠祭嶽鎮江河后土二首芙蓉仙掌坐中低后土霄光闕可齊棧路繞雲山有閣蜀天常漏石無泥岐陽過馬應聞鳯陳寳停輈莫信鷄使者才華似楊馬題詩應近草堂西房闥歌兒翠黛摧不禁夫婿陟崔嵬一春花好人相别四月梅黄雨又來酒酌玉缸酣臉暈香消銀葉蠧爐灰祠官好致君王意蚤奉神休馬首囬賀王淡齋韻就為壽雕鑱萬物巧無餘嵗晚天教閉户居鉅鹿無人問難字濟南有子授亡書且隨野老籠沙帽莫遣山童借筍輿淮北風流似西洛耆英今見此邦初次吳真人梅花韻羅浮庾嶺大荒濱燕薊氷姿好寄身地勝不招金谷客賦成重寫洛川神碧忩逗日留私煦丹井呼泉漬古春草木有知應自喜白衣如我是山人次𤣥徳真人韻岡巒四合偃長虹寳閤鶱然上御風萬里山河開日月九州茅土錫王公麒麟織罽年年出騕褭䭾金嵗嵗同京國光隂清似水茶甌醒睡笑書空寄贈揚州王鍊師仙客吹笙踏月輪因遊淮海悞尋真松花擣月分貧士柿葉題詩寄逺人清水有潮留載酒春雲不雨取裁巾江都千樹隋宫栁曽見先生綠髮新菊枕東籬采采數枝霜包裹西風入夣凉半夜歸心三徑路一作月一囊秋色四屏香牀頭未覺黄金盡鏡裏難教白髮長幾度醉來消不得卧収清氣入詩腸琉璃簾吳儂巧製玉玲瓏翡翠蝦鬚迥不同萬縷横陳銀色界一塵不入水晶宫月華逺射離離白燈影斜穿細細紅相隔神仙纔咫尺靈犀一㸃若為通野興滄洲梅發月生波屋角寒藤半掛蘿孤石隠林真似馬亂雲渡水却如鵞步隨野老逢人少閒過隣家有酒多轉憶淮南粳稻熟夜歸衝雨借田蓑石田文集卷三
