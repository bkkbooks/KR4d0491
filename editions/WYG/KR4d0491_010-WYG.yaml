body:
  text: 石田文集卷十元馬祖常撰碑誌大興府學孔子廟碑昔我太祖皇帝受命興邦金人孫于汴太祖即以全燕開大藩府制臨中夏維時已有定都之志矣故太宗皇帝首詔國子通華言迺俾貴臣子弟十八人先入就學時城新刳於兵學官攝於老氏之徒世祖皇帝教命下始正儒師復官學廟事孔子歸壖垣四侵地勒石具文作新士子至元二十四年既成今都立國子學位於國左又因故廟為京學京師雜五方俗尹治日不給廟之牆屋弊壊將壓以毁講席之堂粗完泰定三年今大尹曹侯上視廟貌祠位皆不如制割稍入為寮寀倡然後大家富室合貲以聚財者有焉釋子方士分食以它徙者有焉施施于于咸樂於成延兩廡五十有二楹締搆塗飾工良物辦象従祀諸賢百有五人妥靈惟肖威儀有容又懇請於朝得廩餼弟子員百人受學於師復其身不勞以事於是天下首善之教興焉廟肇自唐咸通中遇遼金燕為都邑故嘗用天子學制選舉升造與南國角立亦一時之盛也而太宗皇帝當雲雷經綸之世聖訓諄切以徳賞喻父師以夏楚懲子弟飢焉粟肉渴焉酒醴力焉僕使恩義甚備其養賢勸善之誠固已髙出百王之上矣世祖皇帝立極作則人文宣明登用儒臣躬親講學故當時勲賢之裔以及宿衛之臣固不以揖讓俎豆之為懿顓蒙昏庸之為恥也而三代國學黨序遂庠家塾之等秩然羅列於上下才學經術用世之士踵武而出暨仁宗皇帝賔興大比四方舉進士凡登賢書䇿名禮部者京師屢倍於外郡非列聖仁涵義揉百年之禮樂文物推而致之歟燕自虞夏為武衛之服召公之化尚矣昭王築臺以徠賢士鄒衍樂毅劇辛至有稱於世韓嬰以詩易為一家師孔穎達博綜五經卓然庶㡬醇儒今多士游歌在庭樞衣在廟將見魯鄒之美矣若嬰穎達宜所不道矧衍毅辛之徒哉夫儒者之學詩書六藝之文以至施之天下之道無有二也後世教不明家異人殊各溺於所習以相詆訾由上之教無以一之也嗟夫古者小學大學之師弟子之傳皆本於道徳仁義之實著於詩書六藝之文非有教有授則不敢以傳也傳焉而龎雜不經則上有刑也是故風淳而氣同由上文教有以一之也而王國多士逢文明之㑹肄業有學學有師春秋禮其先聖先師者又有廟有位入有食以處出有貴於衆所以報稱列聖教化之徳而應賢侯承宣之志者必冠上或有彈字而起矣提舉學事崔居中教授賈良弼正張禎録司視以狀請曰廟之成前尹瑪蘇庫實能始之今尹曹偉實能終之經歴王孝祖薛讓警巡按院烏徳美使李權且能考工於下也余既為言正兖郕沂鄹四公配食東鄉位其来請遂為銘詩不辭詩曰皇元有赫奄受大國于月之􅀈于日之域京邑翼翼莫不来極予誕敷文徳新都有嗟辟雍峩峩􅋒弁之瑳濟爾象犧鍧爾絃歌新宫則那舊廟如之何皇帝在御百度咸若海輸維柟河浮厥柏是尋是斵虞庠嶽嶽式光我上國云一作至聖儀儀𤣥紘襲衣衎我先師既右享之采茒于地薦此明犧用介我蕃釐蕃釐伊何彼美多士克明克類克諒厥事以登膴仕以媚于天子有鏗華鐘路鼔逢逢言燕于公有翼有顒多士既同天府是庸維曹侯之功曹侯誾誾迺承迺宣御劇迺專虞庠連連王士安安祇國維賢天子萬年安豐路孔子廟碑泰定元年東平岳侯經歴安豐路事相路學孔子廟皆不稱謀所以大而新之告其長属一府盡傾意樂成大者割財小者奏力咸出名姓以来就功二年總管拜珠君上謁廟又先發稍入㑹錢遣學正及生二人作雅樂諸器於吴中於是安豐路學祠事先聖先師廟位樂器秩有序列矣四年教授官許士淵以狀走京師請曰安豐全楚東境州来之郊其土廣衍其物阜大其民質實力穡而勤宋失國南播江表嘗恃其人以扼兵衝故百年間人俗獷悍當是時雖有聰明秀俊之資生於其鄉無師以傳業無友以講學士因亦不得稱於世斯豈吾民之罪哉國家覆被蒸庶涵育生遂重熈累洽薰為泰和薄海外内詩書禮樂之教興父兄子弟老老幼幼日趨於化矣而安豐為郡在今綏服之内密邇天子聲名文物之盛民生衣食仰於田桑無靡習雜好以遷其耳目視聴其志專一而易教而吾經歴君總管君協恭在官勸民以學子備纂注之職可不記以示人乎祖常拜而為書曰孔子道大天地日月不可象也然古之學者入學必祀其先聖先師後世廟孔子於學春秋天下通祀之所謂推本其始而喻之以義也今二君守官知教民不在笞辱奔走而在於爼豆揖讓不以小法苛急而以大道磨厲先使之入學矣而又使之習禮器且有所尊敬焉嗚呼有官者皆視其民如二君則天下有不治乎飾屋製器用錢中統鈔㑹之凡七百一十四定一十五貫用食工米麥凡二百一十石髹漆黝堊陶瓦材木磚石篾枲之具輪山航流無脛各致二君才諝之施於民者它可卜矣祖常旁州之民也聞鄰州之士鼔篋而游歌于廟于學章甫而逢掖于鄉樂其州有愷悌之政而為鄒魯之俗也詎得已於言乎遂為詩曰桐柏囓囓淮水中潏左峙楚都安豐之揭殖我禾麥有顒者民田田宅宅奠居飽嬉弗大厥知官師維良開黌納之嗟我士民天徳元善昔逢不辰胄而不弁今天子聖俊乂咸事嘉生靈應駢入遝至泰和至順庠序聿興詩書禮樂喤焉古聲古聲喤喤簴敔瑟琴侑薦豆籩求神陽隂我神降嘏多士在學賔興於鄉其光嶽嶽二良民庸作民維同鐫辭伐石上於考功光州達嚕噶齊烏瑪喇公去思碣初内侍臣烏公繇杭州司稅長以承務郎監守陳州於今為民吏稱誦時余弟祖孝以進士倅是邦故知公為詳至治癸亥復階前資来治光光甸淮右民物頗阜壤土袤沃未易理也公至之日一以誠恪姦宄絀信索民所宜為則易置之躬率以勤制亷直急官事猶理家凡執意論列曹吏俯首將命寮亞允協執筆署紙尾唯謹威徳濟洽惠利遂行初政甫期年而治行卓然為淮蔡稱首淮南北聞公名靡不爭為鼔譽以故農職畎畝民就禮俗健骨一作兒皆竊伏田里以事其業比屋充庶弦誦之聲相聞氓負襁子来者袂如雨及至則如歸州東南境百里而逺属縣曰固始先時有羣無賴疇相詆訐者以産白金盜執民地誣上官儌譽毒民左狙右掠不得則死繼之民縁是往往破業甚則決身虵虎之吻訟連蔓數嵗公惻然為建言白政府罷之居民至撫手道慰雖前日之跳踉倖望者亦莫不奔走来同焉兹非所謂因民之所利而利之者歟大定丁夘冬公為州之五年也余自京師歸淮南展先子墟墓而公始以終更罷光人之賢有言者持狀来取文以表公恵嗚呼世之吏以能稱者殆不多見而矯䖍者往来相属視先王禮樂教化為腐樞則姑汲汲乎告聴論訴之政曰施化易也失在於政則曰民不變也為國者求人如弗及而彼將訖無成功余所以重有感於烏公也然則公視彼非有素飭之材而操一切按致之法者盖異等矣述其理道㕘之古能吏其庶㡬乎後来讀此文者尚亦有百年文獻之思也耶光州孔子新廟碑光州既新作孔子廟乃以圗来徵文於州人馬祖常曰爾先子為政於此州州有學以教人有田以養士有廟以事先聖先師矣今又圮不治廟四出無垣登降無階肖象之設五采之服不彰妥靈之位不嚴配侑之序不飾室屋欂櫨周廡重門及籩豆禮器之類一切敝舊取具假借嵗春秋釋奠官及属師及弟子致齊無次某等一二人辱守兹土割其稍入入民之錢粟筏木陶瓦木材陶良以錢鳩工以粟傭力丹漆黝堊金銅施色之物皆集作於天厯二年七月九日成於至順元年八月十有八日凡廟位象設稱乎南面而為王者之居昔之不治者今皆治矣昔之無有者今皆有矣爾先子為政于此州爾又以文名于時爾宜為文告来者庶謹之而毋毁也祖常三為典禮之官習於先王之禮而學于聖人之徒陳跡往轍不敢煩州人之聴獨以我朝有道之世告我州人始憲宗皇帝都和寧遣國子二十人就學今都之南城孔子廟旁㫖意訓誨刻載廟中世祖皇帝潛王邸召學士王鶚因幄中設主陳爼豆觀祭孔子儀武宗皇帝詔天下若曰世嘗知尊孔子矣而皆未至也其進封至聖文宣王孔子為大成至聖文宣王今上皇帝正位制若曰孔子大聖推本父母未極褒崇父叔梁紇可封啟聖王母顔氏可封啟聖王夫人命以璽書告闕里廟庭猗歟盛哉夫天下既富而教興焉興教必於學學必有所師師莫若聖聖莫若孔子則廟而事之者學者宜莫先焉且既富而教雖三王之治未有不富而能教者吾州介江淮之交生殖甚寡然少長安於朴俗衣服飲食給於田蠶弋釣之力工商給於粗完男女婚嫁養生送死質而有節其人已㡬於淳厚故易富而易教弗如他州之必待厚藏而後富近刑而後教也是以見其大夫賢欲有所興起於善而又應之之速也如此誣天下以難治者豈君子哉國家以文化成四海考郡縣之績當以吾州為首焉兹敘其實而又繫之以詩俾州人歌新廟之成而不忘州大夫之徳也詩曰於穆聖師降我新廟几筵維飾象設維肖四瞻周廟載基載築雅雅鱗鱗靈御之肅靈御之肅衣裳我人俾不為羣而即於倫埏埴萬類同仁于天匪言莫宣匪文莫傳六藝百家咸質于經我維受之日化于成大帝在位翕以敷施考妣啟聖而追王之四海作則文明式昭我州易教作廟維喬楩柟梓柏弗雕而斵陶瓦髹漆施色丹渥麗牲在門春秋蠲吉官属師徒端弁以入其容鏘鏘其神洋洋牖兹顓蒙闇而日章維巘諸谷㑹流為潢南薄其郛州名為光光在北城瘠土寡殖維人易教衣食耕織則既衣食又學為士學士有師先聖是祠州俟一作侯徳勸我民豈忘之光州固始縣南岳廟碑五岳奠五方之地而名神於其人於其人三字上下疑有脫誤風雨日月之交有年榖之順成民物之疵癘焉南岳祝融之墟距固始計里二千然皆古楚封域是其神必靈於一方無疑也神而靈能變化佐天地主宰萬物流行蕩摩又豈闗於一隅哉傳有曰山澤通氣氣坱圠旁礴扶輿充兩間者大而不可以擬言衆人狹中而咸私其鄉神則罔不通也神而通則雖廟祀於他邦亦宜哉予嘗被命代祠衡岳且辱祖白一作祝宗之職矣知典禮咸秩無文岳瀆上之所蠲吉有事者也僣有厲禁非民之所得禮也國家以治天下示民大同斥雕譁而不用凡山林丘陵墳衍之神能福於人鄉人得祠之俾或禱而得年榖焉得無疵癘焉兹亦上之所願推施於天下者不禁也地又匪天子嵗時遣使之位禱又不大爽於禮禁廟無煩官司而民樂相之居民上者又忍不因其俗而順恱之乎是三者皆應記也廟事有成悉汝南民李聚之力鳩材庀徒百工並興富者入貲窶者奏技盖聚當病若有物憑之者自言爾作廟則愈今聚年七十矣衣結躡屨北走京師繪廟之圗介昭公萬戸總使府副使劉文秉御史臺管勾王珪拜馬祖常丐文歸而刻諸廟中載考廟屋為閣者五間為廡者二十間為後殿者三間為門者為列室者大小凡若干間皆象神儀于其中外鑿二池瀦水植蓮客来游者憩息有亭東為石矼周為繚垣對樹嘉木合隂成列已蔚然而稱神棲矣固始吾州之属邑也父老子弟吾之所愛敬者也既来請文夫何讓焉乃為詩以侑邑人迎送神之詞信民生太平之樂愷也詩曰南山隮兮興雲雨我田兮賴我神君神君降兮水渚幢駢羅兮夾以斧威不祥兮無疵癘順年榖兮吾食汝吾食汝兮何報鼔以一作獻夕牲兮蘋芼来連舞兮樂予廟翼翼兮邑一作揖予趨載擊鼓兮問年秔盈疇兮秫盈田富夀愷兮衆咸熙自今始兮樂民時維兹邑兮孔休神福汝兮多来牟記布濩兮霈四海充無垠兮勑賜𢎞濟大行禪師創造福州南臺石橋碑銘至治三年今天子嗣大厯服慈仁儉勤思與元元共迪天休惟浮屠意義廣大迺嘗詔詞官咸秩厥祀凡其徒功行峻潔者特褒寵之踰年改元大定宣政使臣伊埓特穆爾以福建平海頭陀禪録行業修著宜錫恩渥謹上言曰師王姓法助名也世為泉南農家母感異夢而生生十二年而為沙門又一年而受沙彌戒又七十五年而殁殁三年而葬葬又九年倘無以表異之非天子廣愛推恩褒寵功行之㫖也師天性圓悟善心自然始執下有禮字於靈應師再㕘諸毗尼師不業泥不拘無有障礙惟以發明已事為究竟故研窮内典洞了佛乗日發猛勇以畢至願嘗見舟濟西汪一作洋者即惻然曰是必及於難報止之弗聴卒之暴􅄓母溺又嘗為埭於海濵水嚙蝕埭且崩師麾以翣潮為縮云身以百結木食澗飲更嵗時寒燠不懈盖道益勤而心無怠年益邁而志彌篤此其行甚髙福唐一作當粤閩之㑹城三面距江其水皆自髙而下石錯出其間若騎布獸伏迅湍回洑旁折千里匯而為南臺江昔以舟櫛比連大縆為浮梁以濟每潦漲卒至則縆絶舟裂於兩碕民多溺焉師將橋江以利涉者先命弟子吴道可走京師因圓通𤣥悟大闡師李公聞於上天子嘉其意詔師卒成之既被命矣衆愈弗疑於是大姓割其財小夫奏其力閩鹽轉運使王某且率其属合治之不一年得錢為貫者數百萬迺為墩二十八植材木礱密石納木腹而基之工未告具而師化矣後二年其徒曰嗣土法喜法秀徳遇嗣永實終成之長一百七十丈有竒仍積其贏資及故端明殿學士王君某田之嵗入岸南北為亭北岸之東為寺御史中丞曹公扁曰萬夀橋寺如橋之扁師所至人爭趨之故居泉則有毗藍庵彌勒庵居興化則有嵩山院寳塔院居南安則有星聚堂崑崙堂凡為庵為堂為院為亭為塔為陂為埭為杠為大橋為三門佛殿總一百八十有六狀皆瑰詭殊絶而南臺萬夀橋其尤鉅者也此其功甚大先是師未殁之二年仁宗皇帝賜璽書加號引濟大行禪師帝師亦授衣一襲為傳法本其所以寵賚光大之者匪自今矣嗚呼一真如界復何假於人天小果也夫然相以表性非象不彰故彌勒之華嚴阿育之寳塔遍於十方豈真為偉卓觀美而已今之學佛者昩於此或離乎真或蔽乎物倀倀焉㡬無以存其身而大戾厥教視師為可愧矣是其功行皆可褒崇奏聞有制曰可其命史臣為文以刻諸石銘曰菩提大士諦真如假象現法表道樞𢎞濟禪師迺其徒心如摩尼形槁枯洞開五藴觀空虛究竟三乗超有無食糲衣卉損豐腴精勤好用行不踰閩人歡喜歌以趨鉢錫隨地成屋廬作杠截流載大塗車跡步武乾無濡萬猊蹲蹲䕶浮圗長􅍻下入龍蛟區磅礴山骨積重跗中鑿水空通尾閭居者行者若賜酺坎其擊鼓吹笙竽師歸冥冥衆為吁百神導引幡幢紆海國田良陂有員一作租稚齒生長耋耄娱史臣為銘承帝俞世世無圮視其郛石田文集卷十
