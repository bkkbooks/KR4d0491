body:
  text: 石田文集卷十四元馬祖常撰碑誌勑賜太師秦王佐命元勲之碑元有佐命元勲之臣曰太師秦王中書右丞相巴延𢎞乂帝室有猷有烈輔理旬宣弼諧寅亮小心夙夜幾三十年人用榆誦延兹休聲葢古所謂社稷之臣也上即位之明年制詔御史中丞馬祖常若曰臣巴延有勲徳于世宜文諸石以勸有位爾言不誣其令有司具其翊我文宗中興之賢勞及其世閥行治序次之臣祖常受詔百拜退為文以進曰初文皇帝以武廟之子出居南服民臣咸思依歸焉王時以平章政事佩虎符節制江淮諸軍鎮汴故太師太平王右丞相臣雅克特穆爾建義迎文皇帝于邸使以告王王即檄下諸郡縣便宜發民丁給衛士聚芻糗金帛驛輸之用不足則貸商人貨約償倍息又許民折來嵗賦充上供殺諸不用命者奪之官日櫛盥介胄坐省中指笇釐劃節警近廣儲峙浚湟壘堞剥缺完治使堅夜臨按盡五鼓下不遑寐雖葦礫械鑰之微服饍饌享之具必曲磾其心力别募虓勇五十人徃扈蹕于道始扎拉爾者有二子上屬乗傳來京師遣部人蒙古布哈伊埒台羅壘蘇克殺之尉氏館平章竒爾右丞伯竒特穆爾以私持時鋭鈍疑沮王王手刺死之榜于衆以舉義事戒有司奉行毋忽民翕然引領幸上之來朝夕急而參政圖卜台萬户明安岱爾欲連兵圖不利圖卜台手刃坐王下數數晲幾刃王王起拔劒擊之走追砍其右臂殺之以徇取所佩符節整齊其部兵得驛馬千二百騎下明安岱爾獄使聞上悦甚遣薩里布哈拜王河南行省左丞相是年秋八月卄日大駕臨御汴王擐擐貫也一作挽强橐鋒率汴父老子弟導上至汴邸參階下諸陪從官率卒吏賞予各有差百給物罔有纎鉅畢取如寄而汴人且謳吟市不易殆不知載體之大而勞也明日上解所被鎧御服寳刀及海東白鶻文鶻為賜王趣勸上曰神器虚乆請亟北轅以主宗社迺毖車徒嚴約令麾罼羅絡扈上渡河度道計日以息至則頓遞供張靡一不具士無敢譁以怠而民扶携望拜歡呼如恐後越七日駕還宫以九月十三日正皇帝位詔天下改年天厯大業遂定加王銀青榮禄大夫河南行省左丞相尋拜太尉賜黄金二百五十兩白金一千兩楮幣二萬五千緡加開封儀同三司録軍國重事御史大夫中政使明年正月拜太保加儲慶使尋又賜白鶻文豹降虎符加忠翊侍衞親軍都指揮使時上以天下讓明皇帝居東宫拜太子詹事太保官階勲職悉仍故八月拜中書左丞相九月加儲政事三年正月拜知樞宻院事至順元年特命王有大勲勞於天下凡飲宴賜以鄂宻竒之禮以示尊寵也王定大難誅戮既多宜防不測賜集賽台百人摩哩齊百人阿斯罕百人俾朝夕宿衛王左右以備非常仍賜黄金兩龍符其文曰廣忠宣義正節振武佐運功臣繫以寳帶令世為明券又命庫庫楚王之孫女二年八月進封浚寧王加侍正府侍正十月加昭公萬户都緫使十二月加宣毅萬戸府萬戸忠翊侍衛親軍都指揮使佩故金符三年十月加徽政使元統元年六月今上踐祚以翼戴定䇿之勲越二日拜太師中書右丞相上柱國監脩國史兼奎章閣大學士領學士院太史院總囘紇漢人司天監事八月加領經筵事十一月改封秦王二年正月加威武衞親軍都指揮使太師緫餘職佩符領軍如故王昔十有五嵗成宣宗命侍武宗于藩飭躬盡瘁不自暇逸勞任愾使必先諸御人仁宗王明宗于周命王為周王常侍四年拜江南行䑓御史中丞五年拜御史大夫六年拜江淛行省平章政事三年拜河南行省平章政事在汴所至索政所宜施利害與民舉除之而宿奸碩豪異時常矯䖍以毒民者徃徃裭魄去懼罪之將及已故四海之人靡不相為鼓頌而被惠之邦尤嗟其來之暮而以不久留為嘆且望也父曰闕武宗加愛焉大徳五年從武宗北征與海都軍戰特濟庫地戰哈喇台哈逹地斬虜最諸將十年部將烏魯斯實巴爾䓁遁王追擊之實巴爾格鬭不下王數戰力至錫喇布拉克地實巴爾降即不殺十一年武宗自和林入纘大統錫名曰巴圖爾拜吏部尚書巴圖爾國語雄武也至大元年改尚服使其年十一月拜御史中丞二年十一月拜尚書平章政事特賜龍虎符領右衞親軍都指揮使三年正月加官特進延祐三年錦濟勒緫宿衞興聖太后宫皇贈懐忠秉義毓徳衍慶惠迪功臣太師開府儀同三司上柱國追封鄭王諡忠懿妣楊珠竒納鄭王夫人大父曰青哈故領軍百户從憲宗平宋攻合州釣魚山戮力王事以殁皇贈守忠翊正効節宣力功臣太師開府儀同三司上柱國追封河南王諡莊順妣呼喇濟河南王夫人曾大父曰塔瑪噶舊給事宿衞皇贈服勤翊衞秉信基徳功臣太傅銀青榮禄大夫上柱國追封陽翟王諡敬簡妣呼圖克章陽翟王夫人元統二年上猶以恩禮為未稱也令有司更議進封曽大父曰服勤翊衛履信基徳功臣太師開府儀同三司上柱國追封淮陽王諡忠靖妣淮陽王夫人大父曰推忠宣力同仁効節勤逺功臣追封淮王諡忠襄職階勛如故妣淮王夫人父曰推誠秉義協恭保徳翊運功臣階勲爵諡悉如故咸有褒辭以示殊禮正室夫人哈塔錦氏加封秦王夫人故丞相額森布哈女故太傅右丞相圖古勒之女弟兄四人長伊蘇都爾平章政事留守次蘇尼台次雅克特穆爾中政使次嘉琿達尚服使皆世弟二人巴延台蚤卒次瑪札爾台今御史大夫子男二人長巴拉錫哩次沙克嘉錫哩咸備宿衛世黙爾吉濟特氏夫以王之忠清粹徳輔翊累朝孝友於家嘉靖于國禮以自持義以立功董萬事之紀成熈洽之治為一代之臣宗而又有捍王定䇿之大勲著在我國家信史有載鼎銘是刋宜也矧又秉國鈞覃化澤佐我天子於未艾則夫爵有王土極此光耀寵榮以爍休美於後世不其尤宜哉古稱有社稷臣者王之謂矣國家平康百有餘年君臣之際於斯為盛天子名碑首曰佐命元勲臣祖常文其敢辭謹齋沐而獻銘曰赫矣文帝龍奮于南雲雷經綸家難用戡梁奠中夏八方之樞一有梟獍則柅我徒豈柅我徒民胥于痛匪直民痛將斁我大謨有嶷秦王殿師于梁襲甲于裳斬其無良合兵在郛秣馬在廐以迓我元后則罔不奔走元后戾止耄倪郊迎弓矢鈇鉞象箙鸞弸大勞兵士牛酒金帛賈謌于區農嬉于陌艤舟河滸謹帝之來神工授能瞬兹濟而帝曰王賢汝久服事相與有家式殫勤瘁予聖考武皇惟王之嘉大毒收指氣無留遮外官蕃垣焱其鷹揚奉予一人征徒皇皇虎旗龍章日月之光帝車載安言留上國廟見告主配天建極迺肆大眚乃旌有徳王實左右以毗以翼皇帝曰嘻晝日三接鎧服寳刀金篆符節徃緫予揆施我民禔獰者以恬呻者以恞孰降割于下鼎湖攀號時定大䇿王實焦勞肆聖天子文皇帝是似乃圖王封繹彼世祀山川土田南國之涘曰佐命元勲惟王實有天子詔臣臣揭碑首臣辭不誣庻以永後作秦王考以續周卣太師太平王定策元勲之碑皇帝御興聖殿制詔中書省臣曰惟太師太平王中書右丞相臣雅克特穆爾以忠孝世臣載于中興功在社稷其令臣祖常文於碑以昭于無極焉臣聞帝王受命天必儲瓌偉絶世之資將相之才與之㑹遇以成大業如我太祖世祖英傑智謀之士聨裳充庭以為一世之用者豈非天哉天厯九年戊辰皇帝將正大位天人合應丞相臣雅克特穆爾以八月四日甲午率勇士十七人兵皆露刃建大義於禁中乃誓於衆曰武宗皇帝有聖子二人孝恭仁文天下大統當歸之今爾一二臣敢紊邦紀有不順者斬手捽平章額卜徳埒勒巴延徹爾縛之分命勇士執諸疑貳者咸下獄待罪籍府庫錄印符空百司皆入内以聽命其日屬學士臣明埒克棟阿䓁乗遽迎皇帝于中興路宻以意諭河南省臣而稱臣勸進者接踵於道左矣癸夘弟薩敦子騰吉斯皆棄其妻孥來皇帝以是月之甲辰發中興以丁巳至京師比至浹旬之間兩以左右矯稱使者南來者云駕已次近郊諸王及河南省臣萬户各以兵從民勿譁驚北來者云皇帝大兄且至於是中外翕悦而衆志定矣九月庚申諸侯王王禪將北軍軍榆林西丞相出師彼未及陣趣薩敦馳入營壁衆潰退之懐來戊辰敵入千門鎮闗薩敦赴之戰東薊敗之十有三日壬申上即皇帝位于大明殿受百官朝甲戌進開府儀同三司上柱國録軍國重事中書右丞相監脩國史知樞宻院事賜黄金五百兩白金二千五百兩中統楮幣一萬錠金織雜采二千疋白鶻一青鶻一文豹二承詔將大軍東出薊討圖們特穆爾平章即日就道乙亥宿三河夜二鼓偵者報王禪兵奪居庸闗畧六口丙子裹糧趨榆河未戰聞大駕出宫親督將士亟請見上奏事曰凡軍事一以付臣願陛下班師撫安黎庶上旋宫明日丁丑指揮使呼圖克布哈塔海特穆爾同知台哈布哈隂搆變未發事覺械三人送闕下斬之己夘與王禪前軍戰榆河勦之追殘兵于紅橋北阿拉克特穆爾鎗刺馬前盤馬斬之刀中左臂部曲華善斫呼都克特穆爾亦中臂二人皆驍健將也㑹日脯就宿戰所庚辰上聞之遣使賜御衣一襲慰勞甚渥兩軍隔紅橋木為營辛巳合兵鏖戰白浮之野大敗之手刃七人夜二鼓盡呼裨將阿拉克特穆爾博囉齊伊勒吉使將百騎風上大譟亂以鉦鼓箭射營中敵自蹂躪至旦始悟壬午天霧王禪等得棄甲北走癸未兵復集我軍列白河行伍立如植木敵不敢犯其夜又命薩敦出其後南向巴圖爾托克托穆爾出其前北向鼔譟大呼吹銅角雜人馬聲彼營軍不知計又皆夜相射旦乃西走巴圖爾者華言猛士也甲申襲王禪兵于昌平北上遣賜上尊酒諭㫖曰丞相毎與敵戰親冒矢石脱不虞奈宗社何以大將旗鼓督戰可也丞相曰凡戰臣先之敢後者臣論以軍法是日斬首數千級降者萬餘人乙酉去衣履徒跣求生者又萬餘人王禪遂單騎亡入北山發伊蘇岱爾額伯埒薩敦追之是日還至昌平南敵将凖台庫庫攻破虎北口掠石槽民丙戌先令薩敦進以大兵㑹諸侯王兵轉戰四十里至牛頭山獲博囉特穆爾蒙古達實伊實特穆爾薩里台四大將縛兩手載于馬鞍獻上天子斬之降者萬人餘兵四散夜遣薩敦托克托穆爾遮虎北口要其歸途丁亥諸侯王額森特穆爾及圖們岱爾驅萬人薄我畿甸跳梁通州城下十月己丑朔日晡彼方憩馬我軍直擣之不及抽一矢東渡潞水而逃庚寅各面水陳兵不戰辛夘宵遁我軍渡潞水襲之癸巳再與諸侯王太平額森特穆爾多羅岱及圖們岱爾塔海血戰擅子山棗林騰吉斯從殺太平於陣中餘夜遁甲午薩敦托克托穆爾將兵追捕乚未諸侯王呼喇岱指揮使阿拉克特穆爾安圖自紫荆闗口犯良鄉丙申我軍循北山而西士皆馬上食馬以囊盛草粟繫馬口且行且食至盧溝呼喇岱兵潰凱還都人觀者拜者填道入見天子無矜容焉上大悦己亥進封達爾罕太平王以其地為食邑降製褒美功名烜耀刻黄金為印章以寵賚之珠對衣寳帶一具達爾罕華言貸之也圗們岱爾復入虎北口戰檀州南殱之萬户路喇諾海以戱下兵降殺圗們岱爾函首京師誅呼喇岱阿拉克特穆爾安圗圖嚕岱塔海於國門之外齊王伊埒特穆爾元帥布哈特穆爾乃起兵嚮開平曰皇帝正大統於大都矣汝等知乎姦臣道拉實囚首請死十月卄有二日庚戌奉皇帝璽來上大業遂定明年己巳上固讓位於大兄明宗皇帝命侍御史臣薩題致讓奉迎三月戊辰丞相䕶皇帝璽於北土明宗皇帝嘉之拜太師官階如前迨明廟上賔皇帝洊昇大位一嵗之間為天子佐命兼揖讓征伐之事而使中外清謐華夏乂寧者兹非天儲其才使與授命之君㑹遇以成大業者歟文來奏上詔贈定䇿元勲名碑嗚呼盛哉臣祖常拜手稽首而獻銘曰皇帝應天赫矣龍奮風庭不驚受命啟運曰皇帝武皇御極惟昌靈在天惟祥神在廟惟享祐厥聖子弗畋以克克一作荒弗燕于室海上浴日車還周逵隂隲我民上帝監觀儲兹師臣維兹師臣出將入相戴我天子征伐揖讓桓桓于于有亟有徐露刃袒呼虎旅疾趨建義禁中羣疑未同縛二三臣誓言於公君君一作曰大統之傳武皇帝有子天序秩秩孰敢干紀聖祖明訓封建伯叔分地車旗屏翰列服孶臣萌芽交搆我家神怒而憤民恫而嗟于徒于旅闞其如虎仗忠履順有弗義者斧地官金帛司馬介胄于時廷臣先事恐後大車出之軍容大施扼其重闗使不得突馳羅絡森峙戰守攻具潢池弄兵悉衆來赴載同我馬東北之野斬鯢戮鯨血衊地赭裭衣跣徒日降萬夫號泣草間丐其完膚皇帝曰嘻丞相汝勞晝日三錫寳帶珠袍丞相稽首是皆帝祉驍將賈勇及我弟與子十月日吉來上玉璽姦臣蹙顛泥首就死奠兹海㝢登世萬千矢辭貞石元勲之宣元勛之宣開國江堧子孫保之維善慶弗衍故貞節贈容國夫人賛布凌氏碑銘夫人贊布凌故大㫁事官伊囉斡齊之女孫故江淮等處行中書省平章政事阿爾彬之女故贈榮禄大夫大司徒上柱國容國公特穆爾布哈之妻今朝列大夫治書御史阿嚕呼圖克之母也夫人生有淑徳懿行未大顯著詔令臣祖常製其碑辭始夫人歸故樞宻追封昇王圖圖爾哈家時王方躬荷干戈宣威萬里拓土開疆為國虎臣貴盛光寵旌節焜耀夫人若常人女婦上堂執婦道親進盥櫛無失容也已而特穆爾布哈出領建康廬州饒州等處食封户達嚕噶齊夫人隨之江南知民間衣食生業愈自抑損貴習大徳丙午特穆爾布哈卒夫人年甫卄有九也哭泣䘮服葬具有法既有䘮亦不事塗澤面髪殆如槁者以儉率下其家能完居卄有六年夫人將六十矣建康府上事行御史䑓行中書省公牘交上中書下尚書准律可旌其門曰貞節又十年為至順辛未夫人既卒矣子阿嚕呼圖克請于朝追封容國夫人子四人曰圖嚕曰華善曰額琳沁並不仕而殁一今治書侍御史也痛其母之早寡能以禮衞其身又教我使知讀書有所樹立於時銜哀具儀告其寮友馬祖常曰吾母真節方諸古烈婦無以尚也今幸有詔命汝為文以揭於碑祖常曰諾義宜為文矧我明天子有詔乎臣聞有道之世比屋可封葢民化矣焉用所謂刑哉國家列聖治平重熈累洽其男子多公卿將相之才其女子徃徃天資之以專靜貞順之徳然不為世所知者衆矣夫人子賢乃得暴白之也謹按夫人于闐人祖伊囉斡齊充大斷事官者國初官制未遑立凡軍國機務悉决于斷事官斷事官行治在燕鸞輿尚駐和寧中原數十百州之命脉繫焉非今日𨽻于省院者也父阿爾彬以不附權臣而坐法故書夫人之行而并著其祖考之實所以表其積善之徴亦孝子慈孫之志也傳稱周南召南刑家以及國則婦人之相其夫子者多矣天子屬臣載於文者詎非廣教化之意歟臣祖常乃奉詔百拜稽首而獻銘曰有貞節淑女早嬪大家節其珩璜不服於奢上堂問姑下堂事夫進與與一作饌主饋婉婉愉愉夫官江南實臨食封夫人喪髽哀戚靡容積年彌堅弗隨弗遷有司騰書表於里廛豈惟女師以義迪子秉憲内外震讋逺邇始即泉丘夫人開國藋茀光華令善惟飾舅尊為王夫榮為公子為䑓臣何憾於終溧水之陽大江北紆栢松亭亭有碑龜趺命勒銘詩天子所施今曰宜之世之女師石田文集卷十四
