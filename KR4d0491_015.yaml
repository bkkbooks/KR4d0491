body:
  text: 石田文集卷十五元馬祖常撰行狀贈亞中大夫順德路總管董君行狀君諱元姓董氏趙州柏鄉縣進德里人也考世增世服農畝喜文字孝事父母鄉井以善稱妣夏氏生三子長曰貞次曰成君其季子也君剛毅體幹魁岸逮金室之亂兄貞等各逃難避徙君獨留養親不去雖蹂于兵戈之衝而奉親之衣衾酒食必以時進或有暴于鄉者則率衆以禦之以是寇懼不敢相犯而鄉境帖然作業無虞逮聖元戡定華夏寵綏流亡民日漸離愁苦思土著而在所豪猾乘時劫奪單弱以自利君尤憫之族黨有逃亡而復歸者君即以完産而分給之微至井臼不棄毁也由是人益髙其義其年調民赴雲州冶銀坑有司持民急甚君亦在行中又被檄督役其年故丞相淮安王使者入見上因命護工悉君執事恪謹及報政乃以其衆别著籍焉皇后位為綿戶仍署君為户長益優之也居無幾棄之還里中家居課子孫讀書為儒生俾將有用於世也君平日務質朴不事靡習不與人角利常以理諭人不使之有爭鬬獄訟割財以周人之急每語人曰吾始以孤童遭世運屯難出萬死之厄而長逢天下治康而諸稚頗慧若將有成人之望噫天其所以相我耶至元草九年病卒于家享年七十有五葬于先塋北葬之日執紼泣送者二千餘人後以孫訥貴贈亞中大夫順德路總管輕車都尉趙郡侯夫人夏氏追封趙郡夫人遂考於禮之意而合葬焉有男子四人長曰進以子訥貴贈嘉議大夫禮部尚書配文安趙氏封趙郡太夫人次和次福次祐女子六人長適郭讓次適薛寬次適番禺縣主簿孟瑛禮部有子二人長曰訥以儒起家辟為燕南道亷訪書吏嘗以大節自任轉拜監察御史力擊太師右丞相特們德爾在廷不敬震動一時由是揚歷顯要政譽日隆今官登大中大夫吏部尚書次早卒女四人長適耿氏次適孟氏次適尹鐸次適趙德和有子一人曰世傑提領順德等處雜户女二人長適楊祥道次適霍祿福有子一人曰誼女三人長適郭明次適王隆次適猾端祐有子二人曰諒曰誠吏部子二人曰衍資夙悟績文有緒已而不年曰維盤女二人皆幼按董氏世出逺古而至廣川漢江都仲舒名最顯廣川為今河間地於柏鄉圻壤犬牙郡侯豈其苗裔耶不然名德之盛又何以異於自斬艾者哉初郡侯純篤力慕善道殊不知責報於天而必其子孫昌熾於後也但德巨器大者福祿之所歸爾豫每觀世之大人長者多不能僞兹豈非人所積歟若郡侯可謂求福不回者也豫與吏部同官于朝而又同志于古也吏部屬狀其先世之行豫奚辭焉願立言之君子重有以著於文俾孝子慈孫之志得昭其祖考之光美於罔極者是亦善善之道而春秋之教也謹狀傳息氓傳淮北堧有州曰息先息國也居申蔡沈頓胡黃之間自古國有南北分則受𠞰焉以是地大壤曠蓬茅聿興天元視四海為堂陛力田之氓多就墾焉有氓媯姓於凡氓中最稱善播種事致殷厥家然大都世之靡麗竒瓌淫冶纎艷可酣可嗜者一切無所好俄為子求婦氓翁謀於其媪曰今兹東家女清婉靜淑姿美甚年且盛可當吾兒須召媒氏通殷勤頃之果召媒氏往問媒氏乃過女父母家匿所過事隂覘女子病癭腫至不辨頸頷背如負箕腹下垂如斗目黑白不分色漆墨蓋自項及踵無一善相媒氏竟去報聘子婦者曰所問女不足當郎君萬一具言狀其翁媪反訾媒氏謂間諜兩好且稱女子有柔德能女工不論色也仍召他媒氏往他媒氏性駔儈善佞承戒過女家既見女父母詫陳國媯氏聖舜苗裔今家同姓之國淮西堧有畝粟千鍾地百頃資巨萬其子復丰姿容多才藝門下女妾熟知儻毋靳賄我俾二姓合好則門下女専有其家父母如所請期受聘金日半相餽他媒氏還報曰女子玉色豐頰巧笑美目騰光古毛嬙西子不敢近又刺繡剪縷􅌜臇芼臘極天下之工味願亟聘無怠否則為王侯夫人翁媪喜不任比聘女先出束帛勞他媒氏乃别奉白玉二㲄黃金十鎰純繡采稱是請日納聘凡翁媪內外族暨里閈所善聞之皆竊笑相與圖告翁媪云他媒氏言貌于情先媒氏乃摘實耳翁媪俱不聽命其子遂婚迎成禮女子既歸夫家諗舅姑不我陋偵夫之覿我之不灼也讐族里之宿毁囓我也大肆專妬日陵其夫凡夫黨之登其門者壺漿亦不饋焉惡聲彰著醜狀百出雖夫之女兄弟佩履聲過戶外亦罣恨不解居半嵗舅姑怒於堂夫惡於室諸所與無不欲速其夫之出之也久之沉憂積無所寄托於天地之間屬淮濵大水因自溺死世之女子至今羞道焉太史公曰傳稱西子蒙不潔則人皆掩鼻而過之雖有惡人齊戒沐浴則可以祀上帝吾徴諸古君子可信使此女幽閒貞懿以組紃為事不害其為賢也庶幾尚德之君子亦娶之矣何乃用媚道賄媒進於夫夫初不灼見厥醜久鮮不敗彼舅姑者擯良媒不聽信聾於他媒氏納陋婦終致貌行不可掩積怨交惡稔禍室家宜乎世之出婦也多矣王氏傳唐縣董堅妻王氏同縣人王瑄之女僉江南浙西道亷訪司事世安之女弟初王氏嫁堅時年十五堅父母在王氏居於室執婦道非饋食堂上履不過寢門委委諸弟姒間衣弊舊不補綴十百空不棄或蠶得紈素即問舅姑孰與舅姑不與人乃縫夫衣久之堅襲父職為均州翼管軍百户戍兩浙王氏留侍舅姑所至元丙子堅將麾下兵從戍交趾與黎蠻戰死瓊州海上王氏年甫二十七聞夫死喪哭三年堅父母不忍婦哀甚恐且死常慰唁之王氏悉脫簮珥不塗澤面髮修婦女容日手緝麻枲作纑布間剪刻采繪象四時草木敷花俾人持入里巷區舍易有滋味物食事舅姑益恭舅姑死王氏葬之棺衾服布不貰貸於人且有二子鞠保盡慈稍長使從鄉先生學古義二子後果有樹立為文吏知名今王氏年六十七矣縣令丞上其事丞相府丞相府下郡國曰有令旌其門可延祐甲寅三月翰林侍讀學士清河元公為表曰貞節王氏之門嗚呼真丈夫女也贊曰劉向叙列女傳曺大家注不失義世傳此書又列之漢藝文志女道於君子不翅十百倍何文學論著不已也今唐縣王瑄女方諸古烈女何嗛其傳信無疑節婦髙氏傳畿內屬縣永清為夥南直村違永清之治所積以里者若干土衍而民朴其男子率能力田慕義不敢弛教而近刑故永清一縣居畿甸五方雜俗之中獨稱為鄉多善士然在男子之勸學迪德固其所宜而何足尚也若夫婦人女子之行有能卓然不為時俗之所移嶷然禔身以節孝之美而無始終之異此雖縉紳君子猶或難之况婦女乎哉况婦女乎哉髙氏者永清南鄉漆里村髙澤之女也笄而嫁同縣南直村里之王用嫁九年而用死有二嬰女哇哇以泣兩舅姑衣履日穿漏視髙氏抱持二嬰心怦怦內悲我子已死婦有女子無丈夫子婦一旦必棄王氏去後髙氏紡績給養兩舅姑益謹比及老髙氏事之過其夫用初死時比其終髙氏謀棺衾葬且一如大家身自表率二女習女工閨門之中出入有限今長適某次適某自是闔永清之人悉以髙氏為女師而尊敬之如此者四十年矣縣書其狀列上於大府請褒奬厥德藉用為勸府牒御史覆實禮部考制吏牘相徴無害於文然後命有司署表里門不役以事嗚呼俗之不善有司之過也兹永清之縣大夫知以善俗之意為政得請於上可謂有治民之術者矣故因髙氏之行而并及其官焉石田文集卷十五
