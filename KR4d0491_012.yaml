body:
  text: 石田文集卷十二元馬祖常撰碑志致仕禮部尚書邢公神道碑銘泰定二年四月十四日致事禮部尚書邢公卒六月朔葬于安陽度置之原越二年致和元年戊辰二月嗣子溫毁瘠纍然喪服持工部侍郎胡彛行狀告其友浚儀馬祖常曰先考衣衾棺槨飾終之禮庶幾無悔溫不孝惟是墓道之碑無文以昭之敢以是托於子焉按狀公諱秉仁字守仁父姫姓邢氏世居安陽契丹女真擾中夏士族譜牒存者蓋寡故安陽邢氏始顯交口里大父諱植不仕有隂德贈亞中大夫彰德路總管輕車都尉追封河間郡侯大母李氏追封河間郡夫人父諱德裕有政事材志不得奮發卒小官贈嘉議大夫上輕車都尉追封河間郡侯母王氏追封河間郡夫人繼母郭氏封河間郡太夫人弟四人曰秉義秉禮秉智秉信四人皆後夫人郭氏出前夫人王氏獨生公一人兩世用是貴得加封光華甚榮公起家辟署河南廉訪司曹屬進御史府史又進丞相東曹掾滿考授承務郎平江路推官未上改承直郎濟南萊蕪等處鐵冶等提舉俄遷承德郎江西行中書省左右司都事升朝列大夫為太醫院都事選充廣平彰德等處鐵冶都提舉官中議大夫外臺各以名薦尋為撫州路總管加亞中大夫廣平路總管凡十選以禮部尚書致事階承務郎至嘉議大夫凡六轉出入中外率稱官守初提舉濟南諸冶賦民不急逋逃復業都事江西行省婉書直辭贊協上下議遣官出廪米五十萬石賑貸屬州飢衆難之公請異日有擅發罪秉仁願獨坐萬齒斷斷斷斷疑誤待餔以活者不可指數也都提舉廣平彰德等諸冶差户程功礦火悉給縮賈值俱以利於農治辦為最總管撫州専使臨門賜馹之官撫境地稅户部賦木綿織布民病非所産即令輸直吏不得舞手取賄公私俱便之小旱禱輒兩嵗連大穰俗頗譁訏未幾民恥健訟移廣平路教學者以雅樂祠事先聖孔子立鄉校七百各有弟子師課樹桑億萬計絲纊用饒民有婦妬妾妊而以妾妻奴者夫死而族人欲有其家訟不決乃以子生月逆計母妻奴之時得實其民遂有後闔郡號神明盜偽以小鈔貫文作大鈔貫文加錢取鋊一作賂然詿誤七十人止以首坐勸醫講皇帝越人書躬視惠民藥餌比去官民鮮夭死者賦有寸帛之羡立歸之主為政具有方略要以惠恤元元為本既致仕益礪志讀書強記不怠字書多楷法尤工古𨽻有子二人長子溫由中書檢校官拜監察御史吏部中書左司二郎中總管大名河間都轉運使丁公艱家居次子簡門蔭補承事郎監大名路商稅夫人蕭氏于氏祔葬並追封河間郡夫人享年七十有六嗚呼行聞于鄉政聞于時為子而上賁其親為父而垂裕于後可謂完也己為善人者可不以邢氏為徵耶是宜銘銘曰爾車薄薄爾馬蹻蹻勿驅我隧域時君子宅有繹爾蘇有樵爾芻毋犯我松與蔞時君子居若廣漢之明弗鈎距以傾若黃霸之惠弗飾異以詭時豫有元之循吏孫子奕奕時昌時赫時善維吉時視子貞刻僉燕南河北道肅政廉訪司事趙公神道碑相州安陽縣之趙氏有起郡掾為僉燕河南北道肅政廉訪司事以殁者諱思恭以吏治見於世其葬在安陽之吳村原葬之三十九年有子天綱亦起憲府掾為監察御史乃始請刑部郎中蘇天爵狀其行拜而乞銘于浚儀馬祖常其序曰趙氏世家安陽金有徙磁之滏陽者諱秉文仕至禮部尚書别為滏陽趙氏其留安陽者族世逺不能譜公曽祖諱德德生溫溫生仁仁起家同知鈞州公鈞州之子尚書之從孫也少讀書通其理亂得失之大旨尤愛治刑名書律欲以其所為思一有所奮成名迹于世當是時天下甫定權貴人多出功戰為士者寡公獨於問學辨説法制數度上下委折之微有足徴者年十九聲聞于鄉郡侯髙鳴辟掾郡中稱其廉平久之貢中書刑部曹轉大司農掾其立志施事詳於利人而略於便已以故一時名公卿咸禮譽焉至元十六年始官從事郎宣徽照磨管勾架閣未幾為主事尋升經歷宣徽掌凡內饔外饔天子儲后侯王卿士食飲膳羞酒醴酺修醢醬之共事素叢劇公在職十年所為問義理何如不毫髮顧計絲考粒潔以參核出內姦弊無所逞臺臣上公之材擢拜燕南河北提刑按察司判官階承德郎居官號為辦治入拜監察御史時山北嵗凶公請亟發粟賑貸廷議檄公就行至則施民所宜便曲賙繼之賴以活者至萬數人其所論於上多同列所不敢言者其已嘗言則不綴以言曰無撓法害治足矣然排幸貴黨佞為獨切所言有以警世者嵗二月八日京師迎佛解祠于城西流外諸司集與其役織染局使儲普華倚時相受賕公紏以法時相怒召公政事堂詰曰國家嵗祠佛以僥善利若獨沮不虔邪公具事質從容論其罪時相為歎息許之俾治如律先是宰相以户曹金榖工曹興役簿書浸溢吏滋多不法請御史雜治之公分治工曹蓋纍月而後理或曰君敢為而能敏今若此何滯緩也公笑曰是固人之所易能也而我則不能且是舉也朝廷豈以為他亦曰慎財用黜冗節浮而己今不深察其源委而茍簡以為之人雖以我能敏後有不勝其弊者已而果用文吏覆核無錙銖舛衆始服公識慮之周密也除大司農司經歷轉奉政大夫嘗與其長議務農重本十事入陳上前上獨顧公令即施行之草八年詔改提刑按察為肅政廉訪司擢公僉河北河南道肅政廉訪司事頃之移燕南河北至元元貞之間四海久平繩吏法寬縱吏相習為沉浮幸終更去或按一吏則羣詆以刻暴職是事積不治而弊日以及民矣公僉事兩道約其民以聽古靈陳氏之訓按其吏獨嚴法無所假恕聽其訟必詰折得其情所為者使自服訟以故少人以故無所寃其巡察都邑必躬率博士弟子員謁孔子庭升堂誦説導以禮治以故其所至不獨吏有所畏而民亦樂有勸焉其事親能得其歡其遇人和易質厚不為畦穽其處宗戚疏近有恩於其先世田廬獨取其磽敝而完饒者推以與諸弟姪於拯人之窮汲汲若有不獲自奉衣服飲食尤儉以約既老讀書不去手尤喜陸宣公奏議真文忠公大學衍義曰是真臨官治民事君曰益者故其發為論議措之事為多為世所稱其嘗所慕好若魯齋許公靜修劉公悉當世豪傑拔特之士其嘗所薦引若保定郭貫張仲實滏陽安祐洺水劉賡者後尤有聞于時其字仲敬其壽五十有八其殁以元貞二年十一月望日在大名之官舍其葬以是年十二月八日其妣張氏其配焦氏焦金世大家代有聞人後公草五年殁壽八十合葬公墓其子男三人侃早卒天綱由御史大夫掾為浙東廉訪司經歷拜江南行臺監察御史入拜監察御史清慎端慤為世名人天經補公廕主獲嘉縣簿調兾寧録事卒女二人適主簿王尉浙西廉訪僉事傅汝礪其孫男三人曰植天曰構為江浙行省掾史曰楷讀書未仕孫女一人適士子咱某嗚呼三代瞽宗米廪教養之制既壞人人不得成其材久矣漢以來時有赴功立事之會則材臣辨士技謀知譓之人比迹同世若恆有餘時或至用無其會則往往瑰偉雄竒之人亦且無見於世蓋其窮厄委逸於草澤市里之中者豈少哉若公之材識器術及其德善如此且當赴功立事之會嘗有位于朝而不得極其志以駿暴於世抑豈非其命也夫然公殁而有子為名御史嚮時用豈其碩大光顯又將在兹歟若公者亦可謂特見自立之士矣銘諸石使知公之不大顯以極其志也銘曰時需厥人用或乖應適其會否能諧公躬智藝稱世材發聞秋官耀中臺驅磔虺蜮勍􅀈豺蟠信瘦蘇培厥栽謂極其志乃中摧其生可嘉死足哀有懿孫子瑶與瑰殖是福祿公所開忠名孝績宜無涯噫乎公乎鬱余懷山朝于躋下維隈刻碑高原貽後來敕賜贈參知政事胡魏公神道碑皇帝御咸寧殿御史大夫臣某侍御史臣布哈奏言侍御史臣彛服勞官常夙夜殫忠力以稱所使蒙陛下器選為臺臣秩第二品得贈其父官中奉大夫職江浙等處行中書省參知政事勛護軍爵魏郡公蓋所以慰寵胡氏以昭其先人之善者既鴻奕已臣彛將敘緝其家之望郡系世及其父祖妣之休聞實澤刻書于碑圖久不泯以侈陛下之賜以賁其鄉里以勸其後孫子於亡極彛惶懼未敢以聞惟陛下哀憐之制曰可乃敕臣祖常為製其辭臣昧死敘列以進曰胡氏逺出于舜周武王時有封於陳為舜後者曰胡公至春秋之世楚滅陳子孫轉徙因氏胡為肇姓其後仕於漢曰建曰廣者以勛名著歷魏迄唐代有聞人金之末鄢陵之胡氏徙相州之安陽縣公諱景先字彥眀相州安陽人也少端默有逺操內自修飾不求當世之譽樂其所守謂窽一作竊又作衒術求榮不多於竭力以供子職枉已逐物不賢於隱居以遂吾志故事親為學力田業生以終其世於富貴寵炎未嘗動于意兄殁侍寡嫂嶽尤盡禮畜其孤某如己子里人有貸錢為本業子本相將至萬千數貧莫能償主責之棘户自經公捐資與償之里人謝為券質公所公火其券嵗大祲出廪實以賑其鄉既匱又賣田繼之至熟人將酬之不受鄰有喪子弱貧無所有公為具飯含衣被棺木以斂藏之恤其孥既長俾有家願傭以報不許盜有竊其牛羊者又竊所乘馬公知賊處一不問人嘗具饌奉公公肉一作食而甘召庖人問之曰燔能澤濡能燋味奚是適庖對以法上下釜皆新鑄合肉其中密其欵頂迹加火焉公曰得毋釜損乎味于適而器于敝吾弗忍其平居恂恂恭謹遇人無戚疏豁然無機疃或欺罔之不以變春秋髙矣出入閭里嘗却車馬不御與故人父老遊或具几杖亦不扶以故鄉人皆德其善而嚮其莊不忍以字稱之尊之謂翁其長者語其子弟必教以公為法曰為人若胡翁足矣其殁也惸寡飢饉難亟患厄之人相值必曰胡公之亡俾吾無所控恃政和元年二月六日方與親戚高會言笑如平時忽舉手謝客匡坐而殁得壽八十以其年五月十日葬安陽縣孝明村之原初封奉訓大夫載封朝請大夫同僉大常禮儀院事騎都尉安定郡伯進封翰林直學士亞中大夫輕車都尉安定郡侯纍贈魏郡公夫人王氏亦鄢陵望族慈孝貞靜處親戚逺近長幼間盡其宜嚴饋祀親紉縫浣濯至老而無懈容事夫能成其志教子能成其材彛官于朝閭里以為夫人榮而卒不見其喜彛官歸以貧匱不足於養為憂輒喜曰此吾所以教子也彛居魏公艱服起除拜陜西行臺治書御史辭就養夫人止之曰侍西臺臨四省四憲朝廷以為重地且秦中嵗飢是辭豈義之急病讓夷者而忘而父之訓耶後公三年六月六日卒祔公墓纍贈魏郡夫人臣嘗銘其壙子一人曰彛由丞相掾起家為工部主事官十轉為中奉大夫職十有二遷為侍御史曰規兵部曹女三人適鄭某王某李某皆士族孫二人敬伯侍儀舍人柏壽尚幼孫女二人適大司農侯公孫某樊某臣嘗聞彛為河南行省左右司員外郎時河南大飢使告發廪者如繹省臣以格未即許彛時代判省牘乃專發米三十二萬石所活五十餘萬人其為河西隴右僉憲隴右地極邊吏往往闊略乾沒無所顧彛按摘繩姦賕墨坐者十有一人釋濫繫者八人沒贓四百五十萬緡其為右司都事有以西域僧卜兆言釋重囚以解除者中貴人傳旨引富人子當死者至內廷將脫械彛白宰相置之獄其為御史為員外郎左司所言於上悉同寀所不能且不敢言者臨事裁決引大體略細故矯矯無所屈又聞其為尚書户部也天子入正大統故典親王宗臣庶官衛士錫豫之數為金幣榖幣以萬萬計時浹月間舉故典者再執事者請括金民間以充用時廷臣多是其議彛獨以為不便乃稽諸內府之隱核郡縣上供之實與內帑嵗積之羡不給則令鹽商入銀以準幣大朝會遂無闕事臣攝官御史中丞知經筵事實與彛同署又見其闡翼憲紀紏繩官邪入侍講幄考質經義究觀前世之變而至夫理亂興壞之際必委悉焉此彛之事臣得之于目覩者士論咸以誦彛而彛之語臣必曰魏公之教不敢忘嘻觀彛之事而質以其言蓋可以知公矣考諱用璋疏逹明信不肯為自欺以德行化其鄉曲鄰有棗樹秋嵗實積墜舍傍地命左右拾以歸其主與人交不矯矯以異亦不翕翕以同以故人莫能親疏之居嘗自號曰陶然翁嘗語公謂胡氏之先世大業有藴德未發當後有食其報者至彛果顯用為賢臣妣祝氏修身理家有懿則其智識德量過人逺甚畜馬有夜亡者僮擅面謾市人取直以媚夫人遽還其直且謝曰僮不以實言而輒汝紿吾不忍也以彛貴皇贈嘉議大夫吏部尚書上輕車都尉魏郡侯祝氏魏郡夫人嘻觀公考妣之事而徴以公之善尤足以知公世德之逺哉初吏部與其晜弟起鄢陵提家北絶河來相晜弟皆還鄢陵而吏部獨考室於相焉其先嘗繼為宋金顯官而天興剽剃之餘雖鄢陵葬有塋塋有碑石剝泐文不可識故其世莫得而詳然胡氏陳胡公之後於陳氏國分姓也昔漢陳太丘之仁鬱抑于當世而紀諶羣貴顯者數世豈秦魏公之先既有榮名而子孫逢時不祥又有翳善晦德如太丘者乎不者何後世之碩大蕃興若是臣又知彛之孫子貴顯尚未艾也臣奉詔以國子博士臣沂原大敷懿之狀考公子之所履以求公之世而得公之言行如此于是謹為之銘曰周有胡公賔王纘聖陳墟姓别昉氏安定曰建曰廣漢樹顯聞亦有威奮蜚聲魏晉彌宋涉唐代奕其揚子孫世食占徙靡常既又益振一作抑厄載遷安陽維安陽里其承有煒吏部之孫魏公之子讜儀侃侃稱天子使天子曰嗟彛侍御史王協于極邦肅于紀咨豫爾嘉懋正厥事彛拜稽首臣昔筮仕左右致養以官就侍天子之仁既多受祉臣罪不榖失我怙恃帝閔臣孤賚之慶貤有爵有官秩躋第二生則孔榮殁顯亦熾維昔魏公殖善弗匱備樂孝養亦又多譽發祥在彛實興佐時維皇好德是緝公熙肆厚厥有乃永其貽繩繩胤似勿替承之鄢陵之野既封既樹相城北西亦有新墓帝錫之碑昌此文壽百世其延庸朂爾胄安定夫人王氏墓志銘夫人王氏故贈翰林直學士安定郡侯胡公諱某之夫人陜西諸道御史行臺治書侍御史彛之母也世為浚都鄢陵人父諱貞伯始宅安陽兄諱榖由地官屬出主襄陽榖城二縣簿夫人在父母家時雖鍾愛于其親而食與衣常後於兄嫂及歸胡氏事安定公持婦道終其身無懈容親紡績組紃之工弗好世之侈靡華飾以儉以勤相安定公家政卒能有成慈睦仁祥族姻芘之夫人有子二人長即治書次規業儒山東憲府辟署書吏補典寶監令史治書甫丱夫人謂安定公曰是兒資頴悟可令早就學也遂求經師講先王禮樂詩書之義善屬文未冠令譽日著起家為大都路儒學録大都四方髦俊輻輳於是治書學益碩大名益光顯矣省臺交薦于上歷監察御史右司都事左司員外郎工部侍郎丁安定公艱吉服浹月即拜今官使者及門致禮意敦請治書以侍夫人榮養為辭夫人曰兒來前吾有訓汝承吾志吾逮事舅姑汝先考及我教汝胡氏之宗事其在汝乎今國家命汝為臺臣西南四省四憲府之評議屬之汝其速行毋以我養為辭焉治書上事半月夫人訃至徒御不戒號泣東出及安陽喪次銜哀具書告其友馬祖常曰彛不孝先妣安定郡夫人以至順元年六月六日卒將以七月三日祔葬於先考安定郡侯之墓里人杜愚為之狀矣請吾友為埋銘以刻之嗚呼人之生有男女焉幸而為男子或有所樹立於世則不與百物俱盡幸而為男子矣無所樹立使人惡之惟恐其久生而何死之恤也夫人女子也為女而能賢為婦而能孝為母而能慈從其夫子有官有封其所樹立殆過男子矣宜乎富貴壽考享厚生之福也歟祖常與治書同學古文使為銘義不讓乃銘而授諸來者銘曰在相安陽有貞慈母啓封湯沐賦安定畝煒其輝光夫人象服柔嘉有儀百麗于福少也稚弱玉節閨房歸於夫家組紃含章教子爼豆不繫于迂弗雕其全而人成夫詩書禮樂六藝之師起其施施居其孜孜乃成治書懋官臺臣又成典寶克昌克寅克昌克寅亦既多淑善後無疑譬彼種稑我稼則穫且痔錢鎛洹泉出山紆流相西鬱鬱柏松薈蔚之隮允矣安定幽宫是域夫人祔之協其龜食孫子爰殖我銘不泐故榮祿大夫大司農卿郝公墓志銘公諱某字景文霸州信安人也弱冠起家給事裕皇邸以才知名至元二十年擢揚州路治中二十二年遷同知淮西道宣尉司事又遷江淮等處財賦總管江淮使牘有令察司不按劾公受命陛辭懇請許察司按劾財賦吏牘然後臣敢行詔奬喻而從之未幾丁太夫人艱扶柩歸葬斬衰哭泣居墓廬哀毁過常制近臣以聞成廟遣使賜品食憫勞焉縉紳大夫咸榮美之服除會兩淮鹽法壞吏因緣大賈相為姦田畝單弱操錢售不得食鹽益翔貴州縣上狀詔公行户部尚書乘傳往治既至督淮南轉運司漕挽廪鹽之在官者輸倉氏主之閲其書之次以為先後販者不得賄吏破其囊橐均利于衆大德八年正授工部尚書改户部尚書至大元年拜中書參知政事二年遷尚書參知政事階榮祿大夫公固辭不允乃就職嵗餘以疾力辭杜門家居後中書省臣果有罪伏辜公愈以能退自喜獨雍容灌園種樹無資則持器物鬻之八年履迹不過中門遊從之士已知其無志於一世矣屬延祐天子思用有經術之臣命中書即家起公為大司農卿間又病免上以侍醫視藥存問公雖病猶以國憂而其言語未嘗及其私也延祐七年三月十一日終于所居之正寢享年六十有二公祖某贈資德大夫尚書右丞諡康靖考某贈榮祿大夫司徒諡孝懿並追贈薊國公祖妣賈氏妣弭氏並追封薊國夫人夫人李氏先公十年卒男子二人長曰升次曰謙早世女子二人皆幼按郝氏出太原郝鄉所謂以鄉為氏者也其世之或仕或學列于史官者尚矣然以才諝選進而為股肱之臣者幾何人哉進而為股肱施替一作克贊襄其謀畫者又幾何人哉則郝氏之世自公尤顯矣公少俊偉慷慨能國語長博通古今經世之學發用之應驗如占筮稽考先王宗廟朝廷鍾鼎欵識旁及百家之書而親愛族黨撫摩其孤者又純篤無偽嗚呼書傳所傳愷悌大雅之君子舍公其誰歟今亡矣悲夫其子升將以是月二十一日葬公於都城西山之麓之原祖常知公實深敢不哭而為銘曰雲為雨星為石星石何由名不斁嗚呼善人保窀穸石田文集卷十二
