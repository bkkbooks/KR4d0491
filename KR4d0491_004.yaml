body:
  text: 石田文集卷四元馬祖常撰五言絶句雪中登郡城西亭十首躡雲上層臺娟娟撫修林雜佩遺江妃逺響聽幽禽澗谷垂寒藤氷光見魚影嵗暮風雪交敲瓶煮茶茗梅蕋發寒樹孤芳寄江沙忽得雲母屏光色陵嵗華燎桂熏我衣出逢嵗寒友澗壑多幽隂觴酒且擊缶飛花堕横塘鏡影照宫額天路韶華管吹香慰幽客石路屐齒滑天風吹高寒花明喜珠綴竹瘦愁露漙日讀種樹書自喜豐年瑞籃輿行田間相勞興嗣嵗兎跡行可尋馬力寒亦勁馳獵意已銷獨坐有嘯咏楚甸無層氷霡霂土膏濕更憐三角湖澄澈瑩寒碧濛濛翳江嶼艤船夜問酒路逢白髪翁憔悴看魚笱聞笛昔在楚江上笛聲來夜舡江深魚龍動明月下髙天題嵓屏隠士採藥緣山去彈琴傍澗居隠君多道意曽得茂陵書弔節婦白日松臺閟青山石槨沉空餘哭夫淚下入九泉深題四皓圖二首不聽高皇召還來太子宫阿㜷人彘禍吾恨紫芝翁鴻鵠歌雖壯長門事可憂高名紫芝客終不似巢由蜀葵風簾晝浮艷露庭曙含滋不見牧羝翁漢節空葳蕤崞州判官王善父家望岳亭眉目凛松桂肘腋凌烟霞終慚隠君子歸去西移家僧院蜀葵紫暈成丹景黄旉綴綠幢何因女冠子却近老僧忩間題樹葉上秋意鳯城多凉飈奈夜何題詩滿霜葉不見洞庭波題子昻承㫖墨竹汲澗思連筒發船思長篙春雨篔簹孫㑹長拂雲梢李夫人畵竹夫人閨房秀手洒千畝雨不見蒼梧妃彈瑟瀟湘浦馬户日午吹烟起人家半是農賣田當保馬無褐過三冬桐江青山圍縣郭碧樹出旗亭千里桐江水分明是醁醽朝歌霧黯山沉樹風號路起塵朝歌醉王死周室又歸秦墨竹扇頭氷紈已却暑况此碧琳琅好伴玉麈尾凉颸滿高堂山水圖石壁雲生樹濤江雨闇船居人屬仙籍長負免丁錢謝杏子杏子黄金色筠籠出薊丘味甘醒午寢可是督詩郵乞扇二首端午蒲葵扇郎官冩贈人如何老供奉不得障清塵紈扇裁團月當知織素人撲螢還有妬障面却無塵李陵臺二首故國關河逺高臺日月荒頗聞蘇屬國海上牧羝羊蹛林聞野祭漢室議門誅辛苦樓蘭將凄凉太史書歐陽原功銘馮少府墓古鼎刻龍文新銘少府君欲聞蒿里挽零露濕秋墳畵鷹側視窺霄漢低飛近草萊金韝時一脱肉飽更須囬題猿圃江渚無來鴈山樊有宿猿秋高盧橘熟巴月樹連村送客西歸陸機初入洛王粲却歸秦春草無愁思楊花送逺人偶成山中木葉落江上水波生自是年年事漁樵不必驚黄河塵海東南下雲山西北高黄流蕩中潏萬里費波濤舟泊徐州河發崑崙水天吹廣莫風徐州城下宿一日過淮東真節馬氏天上圓月虧人間歡喜離千年哭夫處即是結褵時節婦張氏磨笄山月寒織素機石冷閨深鏡塵奩泉咽水結井龍眠十六賢圖林下石床方溪邊竹影凉高人千載意山水寄餘光送邵從聖官臨淮四首白髮滄洲叟今為漢㦸郎逢君淮上去竚立看歸艎素月生淮浦青山對縣門勸農明府在種樹長兒孫春水淮魚美秋田楚稻香翰林多故事君莫棄書囊少小淮邊住蠙珠不易求因知新縣令齋馬問春疇四愛圖蘭蓮菊梅湘纍能楚辭猗蘭為之佩千載得涪翁幽姿未憔悴瑩膚中含滋鮮彩外發藻晚紅詠池酣晝鉛敧岸裊的歴黄金華秋日媚堦徑南山種秫翁飲酒不得盡鐡色僵萬木江南梅有花枯蘚纈古錦明英冠春葩獨石秋瀨喧石梁臨流不肯渡與客坐忘歸山寒日將暮題王氏樓二首岑樓臨曲水小檻背重城懶慢淮南客終須掉臂行乳燕穿花去倉鸎拂樹來淮天春又夏獨立意徘徊七言絶句節婦馬氏二首織素鳴機曙未分寒風吹裂嫁時裙官家莫去催租賦孀女無心刺綉文老姑白髮垂肩短新婦青眉照鏡長四十年來門户好風流今見兩兒郎楊妃墓漢廟衣冠照碧燐唐陵翁仲作黄塵馬嵬坡上棠梨樹猶占秦原㡬日春帥臣子劉宗道藏其父之詩請跋將家子弟讀兵書欲斬樓蘭換印魚獨有劉郎偏醖藉阿翁詩句作儲胥鎖院獨坐書事口號七首松門行屋無人到恰似篷船泊浪中午夜風聲敲雨㸃夣囬錯認是漁翁玉署之西松㡬樹那知當日是誰裁若在山中濯雨霧更有鶴巢無數來蜀相功業少陵知萬古千秋更有誰瀘水東流奏嗚咽褒中春草亦離離東山百尺瀑布泉跳珠濺玉鳴夜弦綠樹㝠㝠野花落鶯啼春曙雨晴天門前栁枝垂碧絲閨中怨女惜春時剪衣自縫寄征鴈不對粧奩畵黛眉洛陽酒債斗十千高樓青旗真可憐牡丹芍藥趂時節王孫買笑擲金錢吳娃梳粧趙女妬楚王置酒章華臺走馬還宫張夜樂誰知樂極却生哀南城二首城南牡丹一百本翰林學士走馬來渡水楊花逐飛燕薊中芳草送春逥粟侯亭前花一園客來日日費金錢明朝碧樹春城合恨不江東問酒船與庫庫子山郎中時祈雨長春宫中郎齋沐醮星官風馬雲車下石壇深夜步虗詞更響要將靈雨溼春乾題劉伯宣挽詩楊子橋邊水正波蘼蕪秋草徧陂陀江潮日日風波急似為孤臣賦九歌送文璋甫入蜀省幕蜀國海棠紅似錦况在濯錦江水邊見君西去飲君酒恨無成都賣卜錢慶陽苜蓿春原塞馬肥慶陽三月栁依依行人來上臨川閤讀盡碑詞野鳥飛鱺山三首繡嶺春來緑樹圓東風吹影入溫泉華清夣斷飛塵起玉鴈銜香堕野田玉女泉邊翠藻多石池涵影媚宫娥可憐繡嶺啼春鳥猶似梨園弟子歌華隂道士長松下留我煎茶看古碑衣上征塵都莫洗天風一夜為君吹洛中二首龍門三月洛波清正是花時過故京樽酒不來芳樹逺碧雲初合暮山横東望梁園是故鄉懷歸夜夜夢池塘春城碧樹淮南路飲酒當年似漫郎河湟書事二首隂山鐵騎角弓長間日原頭射白狼青海無波春鴈下草生磧裏見牛羊波斯老賈度流沙夜聽駞鈴識路賖採玉河邊青石子収來東國易桑麻七夕舟中苦熱嘗憶銀床桐泣露更思玉椀蔗流漿天孫初嫁龍綃薄却恐秋河入夜凉戲馬臺將軍一叱靡一作廢千人未可掀髯便笑秦枉築高臺閒戲馬漢王將地擬功臣春日即事梨花白罷海棠紅誰為韶光次第工小閤捲簾春事晚竚看蝴蝶過庭東題擕壺圖席㡌遮頭過野橋詩筒酒榼亦蕭蕭黔婁吟罷還清渴欲問先生借一瓢歌風臺祖龍無廟托孤䰟羽泣妖姬死更奔獨有沛中隆凖客歌風臺上望鄉村集袁王二學士詩為首二句祖常足成之石城月落鴉西堞秋浦天清鴈拂簷春送亂紅浮酒面山飄空翠溼書籖送鄂通蘇蘇副河南憲二首絳闕雲低白晝遲芙蓉露下倚秋池船逢打雨淇門岸却憶京華把酒巵河下渾黄積石來大梁城下怒如雷今年宿麥深何許使者行田看㡬囬送胡古愚還越四首越江秋水得霜清夜夜天南婺女明客子布衣風又急世間無用是才名壮風吹鴈不成行客子江邊上夜航剡紙題詩三百首人來為我説錢塘秋樹紅時客欲歸江寒潮小鷺空飛東陽有酒賖來飲莫問桐廬借釣磯送客歸山天正霜吳江蠏美橘初黄上林千樹櫻桃熟莫戀金華是故鄉過故相宅二首故相門閒草自春宅基一半屬他人可憐掉臂當時客盡是風吹路上塵瓦墜當簷燕不來白頭老妾買花栽舊時小吏今身貴羞近門西上馬臺題賈氏卷風樹纒悲墟墓哀野人一日赦蒿萊雍門不用空彈淚曽見漢家翁仲來題水仙花圖帝子湘南住白瑶苔生釵股織龍綃蕊香金粟誰分劑閒鬭蘭苕上翠翹龍眠畫馬海國秋生漢使槎麝煤誰畫濯龍騧只今聖主如文帝留待時巡駕鼔車孝子徐生卷署表誰封孝子門徐生刲股兩親存翁㜷白髪他年去相對含飴喜弄孫閩浙之交五首月出山頭犬吠雲隔林鍾磬鶴應聞老僧見客閒㽞坐風落松花滿寺門閩嶠人居罨畫圖客行只欲望京都筍輿軋軋相思嶺秋雨空濛呌鷓鴣九曲清溪下見魚雲林濯濯對高居南朝文物今都盡惟有先生㡬卷書路入閩中盡翠㣲家家蕉葛作秋衣石墻遮竹松圍屋時有丹禽哺子歸山溪秋瀨急飛淙萬斛跳珠濺石矼閩女唱歌來漂苧素馨花揷髻丫雙桐廬縣江上船歸暮雨疎山中木落草秋初天寒沽酒桐廬縣醉擬嚴光絶漢書跋扇頭郝隆晒書圖腹笥便便貯五經天過夜半失文星蠧魚不覺芸香苦肯信膓中有汗青出都至治元年春夏交二首京塵冉冉嵗華新重向都門問去津西日銜山沙水晚通州城下雨沾巾潞水年年沙際流都人車馬到沙頭獨憎楊栁無情思送盡行人天未秋雲坳亭八月淮南鴈又來雲坳亭畔菊初開莫言野客渾無事臨水閒行日㡬囬趙氏宗室畫水石生平已識趙王孫竹素何年畵石根萬里南雲秋似水直容艇子到柴門和王左司韵三首仙官紫府醉霞觴不信人間白髮長走筆題詩三百首敲門先送大中郎紫槖詞臣詠羽觴巴牋十幅筆花長却嫌嗜酒揚雄惡苦向當年作㦸郎松醪灔灧泛瑶觴玉署承恩化日長阮籍一生都為酒步兵當與晒褌郎贈王左司二首崇真仙酒初相送明日禪僧又見招那似中郎深閉閣終朝對雨寫甘焦觥船送酒溼宫袍供奉新詞白雪高却念故人天近處奏書千牘坐東曹上都翰林院兩壁圖寒江釣雪秋谷耕雲欲賣韓家舊石淙釣魚竿底是寒江淮南十月蒹葭岸曾見氷花到小忩突兀秋雲不可耕槎牙老樹半枯榮上京玉暑清凉境閒伴鰲峯作弟兄調繼學左司七字詩高畫不如直從龍頷摘明珠朝行自避郎官貴豈是今朝見大巫題左司帖郎中扇頭縹禽閒上海棠枝彷彿江南二月時蘭署名郎心似水氷紈底事送凉颸獨立玉署凉生試裌羅堦庭新兩長青莎睡醒獨擬三都賦不換人間瑞錦窠題華嚴僧筠軒李渉閒時過竹院虞郎行處賦筠軒山中兩閣晝含碧𤣥鶴飛來印石痕誚燕二首萬户千門取意過銜泥葺補舊時窠飛鳴上下渾無事只為新雛避雀羅風雨池塘鬭頡頏春來秋去一生忙世間多少寛閒境辛苦營巢傍屋梁送焦徳元先還大都監金經及首問家事二首塞嶺松濤撼鳥窠歸人天際裊鳴珂氷盤丹果維摩室百斛金泥寫貝多到家紗縠已熏香浴罷披襟對晚凉千樹碧梧隂滿地不思仙館日偏長送廬山周道士崆峒移得三珠樹獨向江邊種未成南國祗應仙露少却來天上瀉金莖送侯嵓亮西南萬里青山路君在峩眉第㡬重莫愛平羌江上水明年京國約相逢贈道士謝草池昨日西宫謝道士獨抱古琴歸洞房半晴半雨天氣潤不出山門秋晝長五月芍藥紅芍花開端午時江南遊客苦相疑上京不是春光晚自是天家日景遲潘居士施飯飯飽千僧洗鉢歸生臺飢鳥拂簷飛山中丈室維摩病獨向長松掛衲衣𢎞州孫同知禱雨神龍分雨掣靈旗一夕銀河注野陂山下龜田禾黍滿州人歌舞太平時駿馬圖天馬西來入帝閑風騣霧鬛駁文班房星一夜光如水却怨龍媒萬里還李伯時陽關圖自古人生苦别離邊頭征戍更堪悲渭城客舍無楊栁閒怨當年李伯時瑪魯侍郎父監宣城禱雨應名郎文采動儀曹却是宣城有鳯毛聞説當年靈雨應山田六月水連糟一作槽驪山圖萬户千門春殿開温泉花發翠華來可憐十月無陽節獨見浮波玉鴈囬赤壁圖三國周郎赤壁西江山雖好夕陽低他年銅雀分香妓猶恨囬船戰炬迷貢院次曹子真尚書韻四首漢家束帛聘諸儒狗監何須奏子虛大比南宫誰第一白袍當殿賜銀魚龍門雷鼔響豐隆百箭穿楊技不同大上河魚還繫水退飛宋鷁豈摶風杏園三月換銀袍燕子西飛背伯勞賦罷長楊傳唱急天門金榜日華高紅綾餅啖出宫闈賜宴恩榮玉殿西白髮詞臣曽射策榜名欣見武都泥第一塲觀進士入院畫省春風滿禮闈綵繒雙表日暉暉文章筆槖三千士爛爛奎星近太微和史參政韻目錄作殿試和李參政韻五雲天近晝香殘紅白花枝滿藥闌一夜東風吹小雨殿頭持卷隔簾看題道友舒貴和扇吳蚕八繭素絲多乞與天孫織扇羅氷雪地清天不暑月中仙子種桫欏宋高宗書光武度田圖漢家自有雲臺像誰取丹青晝度田宋主欲興江左業却將書字送長年流鶯喬木繁隂晝景舒檀欒綠色滿堦除京都三月花飛盡纔聽流鶯一囀初暑雨凉生紗縠玉秋清雨氣霏霏滿鳯城湖上荷花雲錦爛不能臨水一閒行沛縣水村霜氣漸寒河未氷野雲抺空起層層略彴橋邊沽酒市夜深篝火看魚罾淮上初見吳牛二首五年衣上屬車塵自向澄江一洗新長角吳牛尾黒色仰鳴知我是耕人獨愛江邊黒牡丹新編龍具不知寒春來高價如金貴背上童兒爾好看雨霽五月天氣雨霽時千門楊栁綠參差日斜暑氣清如水手拂雲光下鳯池官曹供氷方氷一尺石盤光氷玉流澌每一作出上方何但竹林堪避暑京華白日似年長蜀道士歸儒青城羽客燒丹罷要近東家問六經却笑山隂痴道士白鵞閒覔寫黄庭題柯敬仲乃父手澤三十昻藏一丈夫阿翁手澤宛如初梁園奏賦雙枚健趙括空能讀父書功徳使薩木丹巴勒藏英宗皇帝所賜御書中有御制詩云月色清吾心日光照吾民十字大哉君人之言也又云明仁殿書賜旦謹賛詩四句于後英宗朝坐明仁殿賜旦新書日月中河漢昭囬光氣在凄凉空抱小臣弓畫牛二首龍具春來掛屋厫清泥過腹雨耕勞田間獨仰聽風鼻不信空山野兕號江岸騎牛襏襫翁夕歸對婦詫田功世間無客曽相識惟見驚飛㡬鴈鴻丁夘上京四絶山雨晴時已是秋苑中行殿日華浮長楊十萬旌旗宿不使飛霜入畫樓離宫秋草仗頻移天子長楊羽獵時白鴈水寒霜露滿騎奴猶唱蹋歌詞海國名鷹豈鶻胎渥洼天馬是龍媒明時不惜黄金賜只欲畨王萬里來持槖詞垣已賜金對衣侍拜更恩深何如坐索長安米只有詩歌滿翰林贈故人短檠曽共雪忩書誰謂西河乆索居青眼忽逢人更好白頭相見意何如參議府坐贈左右司郎官西曹東一作清峻東曹劇綠水紅蓮兩幕開獨有議郎官似我手持書字近三台寄王師魯乆憶辟雍王博士新詩不寄一篇來忽逢驛使天邊去欲折梅花恨未開春風御馬圖二首龍種權竒十二閑進來新自玉門闗連錢赭白生珠汗天子長楊羽獵還春風楊栁華山陽肥澤都能照地光天下太平無汗血還堪立仗事君王樞府書事官氷一尺石盤光丹果秋來雨後香幸喜太平書檄少坐聞清露滴清商蔡琰圖二首邉月還如漢月圓龍堆沙水咽哀弦文姬此夕穹廬夣應到春閨舊鏡前蹋歌誰唱木腸兒頗念中郎哭女時衛霍不生陵不死望鄉臺畔盡相思贈温徳亨平章致仕二首射虎原頭白草秋將軍年少已封矦老來髀肉都消盡無奈黄狐上野丘玉帶金魚舊相臣集仙殿裏寄閒身長安三月花如錦對酒休愁白髪新昭君旃車百輛入單于不恨千金買畫圖争似山中揷花女傍家只嫁一田夫御溝春日偶成四首御溝流水曉潺潺直似長虹曲似環流入宫墻才一尺便分天上與人間拍拍春波滿玉溝酒濃花艶栁枝柔江淹空有文如錦不得千金買莫愁春波十頃碧琉璃白日樓臺照影時好為畫船都載酒半酣西望碧參差水南沙路雨清塵桃李花開蛺蝶春三月京華寒食近東風十里酒旗新題墨竹山雨瀟瀟溼翠旌雲中仙度鳯吹笙苔衣坐滿空林石放鶴歸來獨自行題徽政院畫壁脉脉晴光夜硯池午忩冬暖日光移畫屏十幅丹青古山水亭臺是處宜寒林積雪圖畫角樓前初一疊隴山寒色已飛雪樹槎鱗皴老籠立青林何年烟雨溼送天錫秀才月宫丹桂三千樹都是嫦娥手自栽誰折一枝江上種秋風不到也花開道士堦下生竹渭川淇園有閒地如何曲屈在丹房應是葛陂化龍種空教詩客詠篔簹道士山房高梧疎竹清秋裏過鴈流雲細雨中石蘚漫堦連碧綉肉芝緣壁長丹紅鶴索詩引頸長鳴戲以荅之一聲清唳九臯秋竹裂松摇不自由老衲彈琴來度曲粼粼沙水枕門流趙中丞折枝圖牡丹芙蓉石榴山茶洛陽春雨溼芳菲萬斛胭脂染舞衣帳底金盤承蜜露東家蝴蝶不須飛乗槎使者海西來移得珊瑚漢苑栽只待綠隂芳樹合蕊珠如火一時開館娃宫裏醉西施不覺秋生水殿時酒病却嫌丹粉惡洗粧天上影蛾池火齊珠紅拂翠翹石家步障曉寒消千枝臈炬燒春夜羯鼓催花打六幺代悼亡為陳云嶠作燕子樓空花不開綉簾天晚月初來手痕㽞在紅牙板猶有餘香妬落梅調虞伯生聞君儤直奎章閣朝馬偏從小海過衣上落花紅雨滿馬鞍桞絮更如何次王叅政延福宫韻八首五粒松脂下石扉山花春鳥拂簷飛道人自煮青精飯學得仙方上馬歸仙子新開白鶴亭畫雲十二列山屏簾光香轉凉颸細坐對南華問大庭蕊珠宫闕畫雲扉幺鳯桐花白日飛氷水藕絲清暑宴偷桃方朔醉忘歸唐家漲水望雲亭三月千花隔障屏不似仙人華綠洞雙笙吹鳯五芝庭太乙神來月轉扉石壇秋冷葉初飛丹方可是無消息遼鶴千年始一歸道士南來説敬亭雲林千疊翠光屏寫書更問瀛洲叟㡬日丹牀滿後庭翠瓦金鋪白玉扉松堦五色鳯凰飛夣中不覺神仙境却是彤庭得奏歸草𤣥誰到子雲亭莫笑童烏短似屏學士横經趨虎觀將軍躍馬出龍庭宿相府閒題二首宫垣北對大長秋官醒瑶缾㶑灔浮王府白頭老中尉興來求酒不須謀楊花宛轉燕初飛江上春歸客未歸宫府晝長官事少鳯池人逺見還稀題吳娃圖二首金蓮燭下看蛾眉應是吳王半醉時一自館娃宫壞後仙䰟都上落花枝千兩金盤浴小兒玉釵雙堕燕差池綉忩白日無針線却笑羅敷不畫眉秋鴈送客千里清淮秋鴈飛山人歸去芰荷衣明時莫怨身無用獨向天南占少微雜賦四首水村山店屋横斜行盡長淮恰到家雨雨風風六十日年光多少在天涯空江木落月輪高千里清光見羽毛喚起長年夜吹笛右持杯酒左持螯古城猶説漢期思土蝕苔堦楚相祠乞得寢丘人不奪千里一作年渒水入荒陂寒雲漠漠暝烟深溪上檀欒有樹林艇子囬時雙打槳却如賀老在山隂到家山房百本梅花發盡是先生手自栽不似旗亭楊栁樹迎人未了送人囬鴛鴦比翼鴛鴦金縷衣沙頭雙立對晴暉情知愛此清江水不向南湖北澗飛宋徽宗畫蠏秋橙黄後洞庭霜郭索横行自有匡十里女真鳴鐵騎宫中長晝畫無膓道士彈琴圖龍門千尺高桐樹天上移來石上栽斵得春雷鳴玉澗青鸞黄鵠一時囬送王秀才南歸梁園賦雪漢枚臯不去江南左把螯聽得吳船溪上發恨無青竹截長篙贈盧應奉五更風雨送春歸人向天涯念别離忽得參差楊栁句還如張緒少年時吳宗師送牡丹二首仙家分得上林春淺白深紅間色勻走送隣翁還有意恐隨風雨落風塵十五年前花發時仙翁邀賞醉瑶池如今頭白無情思只見瑶池花滿枝寄王繼學八詠樓高風月清故人持節駐江城老來不覺俱多病藥裹隨身處處行題墨梅花開不占洛陽春野店山橋雪月新豈是嵗寒偏偃蹇還愁金谷墜樓人題舒真人鶴峯山中道士索題詩柿葉千層寫好詞不見籠鵞空揖去此生雖老可臨池楊村霜明野水曉鄰鄰蘆葉黄時少白蘋船上忽逢吳客子牽衣雙手拂征塵絶句三首春雲五色建章西流水平橋兩岸低客子年光偏易失御溝楊栁又鸎啼一春不得見花開何况飛紅堕酒杯今日城南花萬樹看花不肯放春囬九陌初晴拂紫埃春衣花滿趂春囬丫丫小女相傳語昨日堂前燕子來雜詠林石蒼蒼嵗暮天花禽竹鹤占苔錢欲知丞相園亭好自斫溪藤付釣船畵竹海霧溟濛暗珠浦宫雲杳靄連玉田借力重截十二管吹引鸞鳯都下天姚子中墨竹高堂秋聲星滿河𤣥雲洒雨參差多江中頭角蛟龍子夜風裂石將如何舟中送干同知朱縣丞南歸二首青天鶴子秋風骨飛來鳷鵲觀上鳴留得商聲滿京國又將雲影過江城青山白鳥坐中没渭樹江雲别後思四海同年㡬兄弟知君日有寄來詩絶句十六首儂家姑蘇閶門外能唱春風白紵詞為君艶歌三五曲只愁别後苦相思吳王蓮宫夜張樂急管哀絲翠簾幙可憐西子眉少顰坐使長洲百花落西江畵舸販鹽郎白紵輕衫兩袖長不肯一錢遺貧士却拚雙玉買歌娼維舟夜泊青泥渚楊栁千行八九家長年三老作吳語笑我烏紗角半斜十嵗馳騎北地子八嵗善泅越人孫魯國家家學絃誦西方在在講沙門天上氷蠶白雪絲裁成紈扇好題詩南風恰住西風起莫道班娘有怨詞閉門靜聽山鳥闕蒙籠草樹弄晴光汨汨野塘流細水娟娟菡萏浴斜陽初嫁郎時正盛年畵眉塗頰鬭嬋娟只知百嵗專房寵誰料君恩不似前丹竈茶牀䑕飜倒香爐經卷鶴為看一片孤雲無侣伴此君得得下仙壇綠樹交隂亂鳥啼花工次第入紅葵日長棋局誰相稱睡起茶甌我亦宜南溪荷花漲雲錦北堤楊栁絆晴烟留連禪客與詩客飄泊魚船與酒船江南女兒年十五兩䯻丫丫面粉光小紅船上採蓮葉北客初來應斷膓盈盈小客抱琵琶歌舞王孫帝子家彈得開元教坊曲金錢還只當泥沙道人何愛青山住為愛青山有雲樹一聲樵斧白雲中幾箇山禽自飛去翡翠明珠載畵船黄金腰帶耳環穿自言家住波斯國只種珊瑚不種田甬東賈客錦花袍海上新収翡翠毛買得吳船載吳女都門日日醉東醪戲荅王繼學金錢賭酒夜走馬玉帶贈客春看花山中少年貴公子年年塞北慣風沙閒題二首視草堂闕白晝遲瀛洲仙子到來時閣鈴不響文書靜相對鼇峯日賦詩上京七月燕雛飛紫菊花開露入衣雨霽關河秋意滿南都應望翠華歸薛𤣥卿華山隐二高道士過訪不及見南城道士供朝飯借馬凌塵去趂鍾北館羽衣還覔我歸來自掃雪行蹤再荅薛𤣥卿并謝墨二首京塵冉冉朝天馬辟糓仙人竹滿齋自冩烏絲吟白紵好風吹我到無懷崇真宫裏秋風起海上人來見隐君㽞得麝煤三百劑天邊呼伴散𤣥雲李老峪李老峪中山繞屋半空嵐翠撲人衣倚忩不睡夜將靜欲倩松風送我歸鵰窩山中騎馬又連朝秋雨初収暑尚驕誰借星橋横兩頂天風吹動髮蕭蕭孟陽逸士洛陽季子一裘敝東郭先生兩履穿秋雨清泥過馬腹長鑱白柄斸山田憶江南江上鱸魚三尺長蓴羮千里入船香人家石岸都平水媚嫵吳娃出後堂載酒堂春來海國荔枝紅都屬儋州秃鬢翁載酒堂高天地小風流豈在百年中寄示男武子爛漫天孫織錦機春風吹雨洗芳菲香泥滿地臙脂溼只許新來燕子飛訪伯堂宗師不遇修竹庭深犬吠門蕭蕭蘭若似山村主人賣藥城中去落葉聲乾鶴夣喧寄栢堂金水橋西天竺寺一來一度石苔新劉郎莫怨𤣥都觀去後桃花見主人寄吳宗師謝古篆黄帝外臣仙籍史名香逺寄白雲峯山人焚罷談𤣥理散作仙霞一萬重題栁道傳詩卷九曲珠穿蟻度絲雙環鏡透月輪虧人間自有鵷鸞侣早奏簫韶見鳯儀次韻王繼學二首繼學前身乃楚州僧淮地瞿曇悞夙姿今生記得未生時轉羞薜荔無真説却訝芙蓉似近時三伏灤京酒醆同分飛鴻鴈怨秋風誰知上店前宵月只在盧仝草屋東題扇面兩汀對出寒蘆折一鳥高飛古木疎無影無聲何處鴈莫因菰米寄人書明月亭霜寒江渚生秋影星繞天河下露聲歸鴈夕陽佳句好題詩應自愧平生挽道士危公逺二首紫皇朝坐靈芝宫羽人往奏新宫銘笙簫不下鶴一去蓬萊洲上種黄精海風吹折三珠樹蜕骨胎仙上赤霄石室丹經塵不隔道人他一作臨又作傳寫寫甘蕉送牟景陽三首江東船去載丹橘天北人來問碧雲知是故家書滿室苕溪他日約平分清袍儒士漢淹留詞賦相如亦倦遊桂樹山中生滿石借船同去覔滄洲龍虎山邊是上饒山中羽服盡逍遥春來筍蕨應無數况有仙家送酒瓢和李彦方七首海碣盤盤楫一作接帝鄉東華日近見龍光太常馬惡愁齋酒曹務休分騎省郎寄書日日問滄洲莫打江鷗與海鷗春水滿溪畦稻發洛陽花好不須遊乞得閒官出謁遲讀書更不讀韓非京華楊栁千門日何處鳴蟬飲露肥龍門八節奏雲和竹管新聲怨恨多好向都城傳滿紙聮翩雕繢過隂何梁鴻杵臼北邙思百里令人賦扊扅王謝堂前雙燕好營巢了後更無為百花落地蜂翅閒萬樹生隂鶯語闌海舶水邊求玳瑁玉田石上長琅玕李白新裁杮葉書都人傳寫到天餘題詩崔顥今重見老蚌含珠對望舒桃花馬白毛紅㸃巧安排勾引春風上背來莫解雕鞍橋下浴恐隨流水泛天台石田文集卷四
